# $schema: https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.yaml
openapi: 3.0.3
info:
  title: JOSE Authority Server API
  version: "1.0.0"
  description: >
    REST API for JOSE (JSON Object Signing and Encryption) operations.

    Provides:
    - JWK (JSON Web Key) management: generate, store, retrieve, list, delete keys
    - JWKS (JSON Web Key Set) endpoint for public key distribution
    - JWS (JSON Web Signature) operations: sign and verify payloads
    - JWE (JSON Web Encryption) operations: encrypt and decrypt payloads
    - JWT (JSON Web Token) operations: create and verify tokens

    All cryptographic operations use FIPS 140-3 approved algorithms.
  contact:
    name: Justin Cranford
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /jose/v1
    description: JOSE Authority Server API v1

paths:
  # Elastic Key Endpoints
  /elastic-keys:
    post:
      summary: Create an elastic JWK
      description: |
        Create a new elastic JWK container that supports key rotation.
        Each elastic JWK can hold multiple material JWKs (key versions).
      operationId: createElasticJWK
      tags: [ElasticJWK]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElasticJWKCreateRequest'
      responses:
        '201':
          description: Elastic JWK created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElasticJWKResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List elastic JWKs
      description: List all elastic JWKs for the current tenant.
      operationId: listElasticJWKs
      tags: [ElasticJWK]
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
      responses:
        '200':
          description: Elastic JWK list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElasticJWKListResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /elastic-keys/{elasticKeyID}:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    get:
      summary: Get an elastic key
      description: Retrieve an elastic key by its ID.
      operationId: getElasticKey
      tags: [ElasticJWK]
      responses:
        '200':
          description: Elastic JWK retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElasticJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete an elastic key
      description: Delete an elastic key and all its material keys.
      operationId: deleteElasticKey
      tags: [ElasticJWK]
      responses:
        '204':
          description: Elastic JWK deleted successfully.
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-keys/{elasticKeyID}/material-keys:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Create a material key
      description: Create a new material key for an elastic key.
      operationId: createMaterialKey
      tags: [MaterialKey]
      responses:
        '201':
          description: Material JWK created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Maximum material keys reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List material keys
      description: List all material keys for an elastic key.
      operationId: listMaterialKeys
      tags: [MaterialKey]
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
      responses:
        '200':
          description: Material JWK list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKListResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-keys/{elasticKeyID}/material-keys/active:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    get:
      summary: Get active material key
      description: Get the currently active material key for an elastic key.
      operationId: getActiveMaterialKey
      tags: [MaterialKey]
      responses:
        '200':
          description: Active material JWK retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-keys/{elasticKeyID}/rotate:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Rotate material key
      description: Create a new active material key and retire the current one.
      operationId: rotateMaterialKey
      tags: [MaterialKey]
      responses:
        '201':
          description: Material JWK rotated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Maximum material keys reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Material Key by ID
  /elastic-keys/{elasticKeyID}/material-keys/{materialKeyID}:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
      - name: materialKeyID
        in: path
        required: true
        description: Material Key ID.
        schema:
          type: string
          format: uuid
    get:
      summary: Get a material key by ID
      description: Retrieve a material key by its ID within an elastic key.
      operationId: getMaterialKey
      tags: [MaterialKey]
      responses:
        '200':
          description: Material key retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # Top-level Material Keys
  /material-keys:
    get:
      summary: List all material keys
      description: List all material keys across all elastic keys for the current tenant.
      operationId: listAllMaterialKeys
      tags: [MaterialKey]
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
      responses:
        '200':
          description: Material key list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKListResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Cryptographic Operations (scoped to elastic key)
  /elastic-keys/{elasticKeyID}/generate:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Generate a new key
      description: |
        Generate a new JSON Web Key with the specified algorithm within an elastic key.
        Supported algorithms: RSA (4096/3072/2048), EC (P-521/P-384/P-256), OKP (Ed25519), Symmetric (128-512 bit).
      operationId: generateKey
      tags: [CryptoOps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWKGenerateRequest'
      responses:
        '201':
          description: Key generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /elastic-keys/{elasticKeyID}/encrypt:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Encrypt a payload
      description: |
        Create a JWE (JSON Web Encryption) by encrypting the provided plaintext
        with the active material key in the specified elastic key.
      operationId: encryptPayload
      tags: [CryptoOps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWEEncryptRequest'
      responses:
        '200':
          description: Payload encrypted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWEEncryptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /elastic-keys/{elasticKeyID}/decrypt:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Decrypt a JWE
      description: |
        Decrypt a JWE (JSON Web Encryption) using the matching material key
        in the specified elastic key.
      operationId: decryptPayload
      tags: [CryptoOps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWEDecryptRequest'
      responses:
        '200':
          description: JWE decryption result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWEDecryptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-keys/{elasticKeyID}/sign:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Sign a payload
      description: |
        Create a JWS (JSON Web Signature) by signing the provided payload
        with the active material key in the specified elastic key.
      operationId: signPayload
      tags: [CryptoOps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWSSignRequest'
      responses:
        '200':
          description: Payload signed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWSSignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /elastic-keys/{elasticKeyID}/verify:
    parameters:
      - name: elasticKeyID
        in: path
        required: true
        description: Elastic Key ID.
        schema:
          type: string
          format: uuid
    post:
      summary: Verify a JWS
      description: |
        Verify a JWS (JSON Web Signature) using the matching material key
        in the specified elastic key.
      operationId: verifyPayload
      tags: [CryptoOps]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWSVerifyRequest'
      responses:
        '200':
          description: JWS verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWSVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # JWKS Public Endpoint
  /jwks:
    get:
      summary: Get JWKS (public keys)
      description: |
        Returns a JSON Web Key Set containing all public keys.
        This endpoint is typically used for token verification by relying parties.
      operationId: getJWKS
      tags: [JWKS]
      responses:
        '200':
          description: JWKS retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'

components:
  schemas:
    # JWK Schemas
    JWKGenerateRequest:
      type: object
      required: [algorithm]
      properties:
        algorithm:
          type: string
          description: Algorithm for key generation.
          enum: [RSA4096, RSA3072, RSA2048, ECP521, ECP384, ECP256, OKPEd25519, Oct512, Oct384, Oct256, Oct192, Oct128]
          example: ECP256
        use:
          type: string
          description: Intended use of the key (sig=signing, enc=encryption).
          enum: [sig, enc]
          example: sig

    JWKResponse:
      type: object
      required: [kid, algorithm, kty, created_at]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID (UUIDv7).
          example: "019377a8-4f00-7000-8000-000000000001"
        algorithm:
          type: string
          description: Algorithm used for the key.
          example: ECP256
        use:
          type: string
          description: Intended use of the key.
          example: sig
        kty:
          type: string
          description: Key type.
          enum: [RSA, EC, OKP, oct]
          example: EC
        public_jwk:
          type: object
          description: Public key in JWK format.
        created_at:
          type: integer
          format: int64
          description: Unix timestamp when the key was created.
          example: 1733313600

    JWKS:
      type: object
      description: JSON Web Key Set (RFC 7517).
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            description: JWK public key.

    # Elastic JWK Schemas
    ElasticJWKCreateRequest:
      type: object
      required: [algorithm]
      properties:
        algorithm:
          type: string
          description: Algorithm for key generation (e.g., RSA/2048, EC/P256).
          example: RSA/2048
        use:
          type: string
          description: Intended use of the key (sig=signing, enc=encryption).
          enum: [sig, enc]
          example: sig
        max_materials:
          type: integer
          description: Maximum number of material keys (default server-side).
          minimum: 1
          example: 10

    ElasticJWKResponse:
      type: object
      required: [kid, tenant_id, kty, alg, use, max_materials, current_material_count, created_at]
      properties:
        kid:
          type: string
          description: Key ID.
          example: "019377a8-4f00-7000-8000-000000000001"
        tenant_id:
          type: string
          description: Tenant ID for data scoping.
          example: "019377a8-4f00-7000-8000-000000000002"
        kty:
          type: string
          description: Key type (RSA, EC, OKP, oct).
          example: RSA
        alg:
          type: string
          description: Algorithm.
          example: RSA/2048
        use:
          type: string
          description: Key use (sig or enc).
          enum: [sig, enc]
          example: sig
        max_materials:
          type: integer
          description: Maximum material key versions.
          example: 10
        current_material_count:
          type: integer
          description: Current number of material keys.
          example: 3
        created_at:
          type: integer
          format: int64
          description: Unix timestamp when the elastic JWK was created.
          example: 1733313600

    ElasticJWKListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ElasticJWKResponse'
        total:
          type: integer
          format: int64
          description: Total number of elastic JWKs.
          example: 5

    # Material JWK Schemas
    MaterialJWKResponse:
      type: object
      required: [material_kid, elastic_jwk_id, active, barrier_version, created_at]
      properties:
        material_kid:
          type: string
          description: Material key ID.
          example: "019377a8-4f00-7000-8000-000000000003"
        elastic_jwk_id:
          type: string
          description: Parent elastic JWK ID.
          example: "019377a8-4f00-7000-8000-000000000001"
        public_jwk:
          description: Public key in JWK format (when decrypted).
        active:
          type: boolean
          description: Whether this material key is currently active.
          example: true
        barrier_version:
          type: integer
          description: Barrier encryption version.
          example: 1
        created_at:
          type: integer
          format: int64
          description: Unix timestamp when the material JWK was created.
          example: 1733313600
        retired_at:
          type: integer
          format: int64
          description: Unix timestamp when the material JWK was retired (null if active).

    MaterialJWKListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MaterialJWKResponse'
        total:
          type: integer
          format: int64
          description: Total number of material JWKs.
          example: 5

    # JWS Schemas
    JWSSignRequest:
      type: object
      required: [kid, payload]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID to use for signing.
          example: "019377a8-4f00-7000-8000-000000000001"
        payload:
          type: string
          description: Payload to sign (string or base64url-encoded).
          example: "Hello, World!"

    JWSSignResponse:
      type: object
      required: [jws]
      properties:
        jws:
          type: string
          description: Compact JWS serialization.
          # cspell:disable-next-line
          example: "eyJhbGciOiJFUzI1NiIsImtpZCI6IjAxOTM3N2E4LTRmMDAtNzAwMC04MDAwLTAwMDAwMDAwMDAwMSJ9.SGVsbG8sIFdvcmxkIQ...."

    JWSVerifyRequest:
      type: object
      required: [jws]
      properties:
        jws:
          type: string
          description: Compact JWS to verify.
          example: "eyJhbGciOiJFUzI1NiJ9...."
        kid:
          type: string
          format: uuid
          description: Optional key ID to use for verification.

    JWSVerifyResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          description: Whether the signature is valid.
          example: true
        payload:
          type: string
          description: Decoded payload (if valid).
          example: "Hello, World!"
        kid:
          type: string
          format: uuid
          description: Key ID used for verification.
        error:
          type: string
          description: Error message (if invalid).

    # JWE Schemas
    JWEEncryptRequest:
      type: object
      required: [kid, plaintext]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID to use for encryption.
          example: "019377a8-4f00-7000-8000-000000000001"
        plaintext:
          type: string
          description: Plaintext to encrypt.
          example: "Secret message"

    JWEEncryptResponse:
      type: object
      required: [jwe]
      properties:
        jwe:
          type: string
          description: Compact JWE serialization.
          example: "eyJhbGciOiJBMjU2S1ciLCJlbmMiOiJBMjU2R0NNIn0...."

    JWEDecryptRequest:
      type: object
      required: [jwe, kid]
      properties:
        jwe:
          type: string
          description: Compact JWE to decrypt.
          example: "eyJhbGciOiJBMjU2S1ciLCJlbmMiOiJBMjU2R0NNIn0...."
        kid:
          type: string
          format: uuid
          description: Key ID to use for decryption.
          example: "019377a8-4f00-7000-8000-000000000001"

    JWEDecryptResponse:
      type: object
      properties:
        plaintext:
          type: string
          description: Decrypted plaintext.
          example: "Secret message"
        kid:
          type: string
          format: uuid
          description: Key ID used for decryption.
        error:
          type: string
          description: Error message (if decryption failed).

    # Error Schemas
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message.
          example: "Key not found"

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

tags:
  - name: Health
    description: Health check endpoints
  - name: JWK
    description: JSON Web Key management operations
  - name: ElasticJWK
    description: Elastic JWK container operations (key rotation support)
  - name: MaterialJWK
    description: Material JWK operations (key versions within elastic JWKs)
  - name: JWS
    description: JSON Web Signature operations
  - name: JWE
    description: JSON Web Encryption operations
  - name: JWT
    description: JSON Web Token operations
