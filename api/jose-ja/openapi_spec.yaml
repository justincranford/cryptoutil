# $schema: https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.yaml
openapi: 3.0.3
info:
  title: JOSE Authority Server API
  version: "1.0.0"
  description: >
    REST API for JOSE (JSON Object Signing and Encryption) operations.

    Provides:
    - JWK (JSON Web Key) management: generate, store, retrieve, list, delete keys
    - JWKS (JSON Web Key Set) endpoint for public key distribution
    - JWS (JSON Web Signature) operations: sign and verify payloads
    - JWE (JSON Web Encryption) operations: encrypt and decrypt payloads
    - JWT (JSON Web Token) operations: create and verify tokens

    All cryptographic operations use FIPS 140-3 approved algorithms.
  contact:
    name: Justin Cranford
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: /jose/v1
    description: JOSE Authority Server API v1

paths:
  # Health Endpoints
  /health:
    get:
      summary: Health check
      description: Returns the health status of the JOSE Authority Server.
      operationId: getHealth
      tags: [Health]
      responses:
        '200':
          description: Server is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /livez:
    get:
      summary: Liveness check
      description: Returns OK if the server is alive.
      operationId: getLivez
      tags: [Health]
      responses:
        '200':
          description: Server is alive.
          content:
            text/plain:
              schema:
                type: string
                example: OK

  /readyz:
    get:
      summary: Readiness check
      description: Returns OK if the server is ready to accept requests.
      operationId: getReadyz
      tags: [Health]
      responses:
        '200':
          description: Server is ready.
          content:
            text/plain:
              schema:
                type: string
                example: OK

  # JWK Endpoints
  /jwk/generate:
    post:
      summary: Generate a new JWK
      description: |
        Generate a new JSON Web Key with the specified algorithm.
        Supported algorithms:
        - RSA: RSA4096, RSA3072, RSA2048
        - EC: ECP521, ECP384, ECP256
        - OKP: OKPEd25519
        - Symmetric: Oct512, Oct384, Oct256, Oct192, Oct128
      operationId: generateJWK
      tags: [JWK]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWKGenerateRequest'
      responses:
        '201':
          description: JWK generated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jwk/{kid}:
    parameters:
      - name: kid
        in: path
        required: true
        description: Key ID (UUIDv7 format)
        schema:
          type: string
          format: uuid
    get:
      summary: Get a JWK by Key ID
      description: Retrieve a JSON Web Key by its Key ID. Returns public key information only.
      operationId: getJWK
      tags: [JWK]
      responses:
        '200':
          description: JWK retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a JWK by Key ID
      description: Delete a JSON Web Key by its Key ID.
      operationId: deleteJWK
      tags: [JWK]
      responses:
        '204':
          description: JWK deleted successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /jwk:
    get:
      summary: List all JWKs
      description: List all stored JSON Web Keys with metadata.
      operationId: listJWKs
      tags: [JWK]
      responses:
        '200':
          description: JWK list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKListResponse'

  /jwks:
    get:
      summary: Get JWKS (public keys)
      description: |
        Returns a JSON Web Key Set containing all public keys.
        This endpoint is typically used for token verification by relying parties.
      operationId: getJWKS
      tags: [JWK]
      responses:
        '200':
          description: JWKS retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWKS'

  # Elastic JWK Endpoints
  /elastic-jwks:
    post:
      summary: Create an elastic JWK
      description: |
        Create a new elastic JWK container that supports key rotation.
        Each elastic JWK can hold multiple material JWKs (key versions).
      operationId: createElasticJWK
      tags: [ElasticJWK]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElasticJWKCreateRequest'
      responses:
        '201':
          description: Elastic JWK created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElasticJWKResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List elastic JWKs
      description: List all elastic JWKs for the current tenant.
      operationId: listElasticJWKs
      tags: [ElasticJWK]
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
      responses:
        '200':
          description: Elastic JWK list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElasticJWKListResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /elastic-jwks/{kid}:
    parameters:
      - name: kid
        in: path
        required: true
        description: Elastic JWK Key ID.
        schema:
          type: string
    get:
      summary: Get an elastic JWK
      description: Retrieve an elastic JWK by its Key ID.
      operationId: getElasticJWK
      tags: [ElasticJWK]
      responses:
        '200':
          description: Elastic JWK retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ElasticJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete an elastic JWK
      description: Delete an elastic JWK and all its material JWKs.
      operationId: deleteElasticJWK
      tags: [ElasticJWK]
      responses:
        '204':
          description: Elastic JWK deleted successfully.
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-jwks/{kid}/materials:
    parameters:
      - name: kid
        in: path
        required: true
        description: Elastic JWK Key ID.
        schema:
          type: string
    post:
      summary: Create a material JWK
      description: Create a new material JWK for an elastic JWK.
      operationId: createMaterialJWK
      tags: [MaterialJWK]
      responses:
        '201':
          description: Material JWK created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Maximum material keys reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List material JWKs
      description: List all material JWKs for an elastic JWK.
      operationId: listMaterialJWKs
      tags: [MaterialJWK]
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
      responses:
        '200':
          description: Material JWK list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKListResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-jwks/{kid}/materials/active:
    parameters:
      - name: kid
        in: path
        required: true
        description: Elastic JWK Key ID.
        schema:
          type: string
    get:
      summary: Get active material JWK
      description: Get the currently active material JWK for an elastic JWK.
      operationId: getActiveMaterialJWK
      tags: [MaterialJWK]
      responses:
        '200':
          description: Active material JWK retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /elastic-jwks/{kid}/rotate:
    parameters:
      - name: kid
        in: path
        required: true
        description: Elastic JWK Key ID.
        schema:
          type: string
    post:
      summary: Rotate material JWK
      description: Create a new active material JWK and retire the current one.
      operationId: rotateMaterialJWK
      tags: [MaterialJWK]
      responses:
        '201':
          description: Material JWK rotated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MaterialJWKResponse'
        '401':
          description: Missing tenant context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Maximum material keys reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # JWS Endpoints
  /jws/sign:
    post:
      summary: Sign a payload
      description: |
        Create a JWS (JSON Web Signature) by signing the provided payload
        with the specified key.
      operationId: signJWS
      tags: [JWS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWSSignRequest'
      responses:
        '200':
          description: Payload signed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWSSignResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jws/verify:
    post:
      summary: Verify a JWS
      description: |
        Verify a JWS (JSON Web Signature) and extract the payload.
        If no key ID is specified, all keys in the store are tried.
      operationId: verifyJWS
      tags: [JWS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWSVerifyRequest'
      responses:
        '200':
          description: JWS verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWSVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # JWE Endpoints
  /jwe/encrypt:
    post:
      summary: Encrypt a payload
      description: |
        Create a JWE (JSON Web Encryption) by encrypting the provided plaintext
        with the specified key.
      operationId: encryptJWE
      tags: [JWE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWEEncryptRequest'
      responses:
        '200':
          description: Payload encrypted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWEEncryptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jwe/decrypt:
    post:
      summary: Decrypt a JWE
      description: |
        Decrypt a JWE (JSON Web Encryption) and return the plaintext.
      operationId: decryptJWE
      tags: [JWE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWEDecryptRequest'
      responses:
        '200':
          description: JWE decryption result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWEDecryptResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # JWT Endpoints
  /jwt/create:
    post:
      summary: Create a JWT
      description: |
        Create a JWT (JSON Web Token) with the provided claims,
        signed with the specified key.
      operationId: createJWT
      tags: [JWT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWTCreateRequest'
      responses:
        '200':
          description: JWT created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /jwt/verify:
    post:
      summary: Verify a JWT
      description: |
        Verify a JWT (JSON Web Token) and extract the claims.
        If no key ID is specified, all keys in the store are tried.
      operationId: verifyJWT
      tags: [JWT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JWTVerifyRequest'
      responses:
        '200':
          description: JWT verification result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTVerifyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    # Health
    HealthResponse:
      type: object
      required: [status, time]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
          example: healthy
        time:
          type: string
          format: date-time
          example: "2025-12-04T12:00:00Z"

    # JWK Schemas
    JWKGenerateRequest:
      type: object
      required: [algorithm]
      properties:
        algorithm:
          type: string
          description: Algorithm for key generation.
          enum: [RSA4096, RSA3072, RSA2048, ECP521, ECP384, ECP256, OKPEd25519, Oct512, Oct384, Oct256, Oct192, Oct128]
          example: ECP256
        use:
          type: string
          description: Intended use of the key (sig=signing, enc=encryption).
          enum: [sig, enc]
          example: sig

    JWKResponse:
      type: object
      required: [kid, algorithm, kty, created_at]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID (UUIDv7).
          example: "019377a8-4f00-7000-8000-000000000001"
        algorithm:
          type: string
          description: Algorithm used for the key.
          example: ECP256
        use:
          type: string
          description: Intended use of the key.
          example: sig
        kty:
          type: string
          description: Key type.
          enum: [RSA, EC, OKP, oct]
          example: EC
        public_jwk:
          type: object
          description: Public key in JWK format.
        created_at:
          type: integer
          format: int64
          description: Unix timestamp when the key was created.
          example: 1733313600

    JWKListResponse:
      type: object
      required: [keys, count]
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JWKResponse'
        count:
          type: integer
          description: Total number of keys.
          example: 5

    JWKS:
      type: object
      description: JSON Web Key Set (RFC 7517).
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            description: JWK public key.

    # Elastic JWK Schemas
    ElasticJWKCreateRequest:
      type: object
      required: [algorithm]
      properties:
        algorithm:
          type: string
          description: Algorithm for key generation (e.g., RSA/2048, EC/P256).
          example: RSA/2048
        use:
          type: string
          description: Intended use of the key (sig=signing, enc=encryption).
          enum: [sig, enc]
          example: sig
        max_materials:
          type: integer
          description: Maximum number of material keys (default server-side).
          minimum: 1
          example: 10

    ElasticJWKResponse:
      type: object
      required: [kid, tenant_id, kty, alg, use, max_materials, current_material_count, created_at]
      properties:
        kid:
          type: string
          description: Key ID.
          example: "019377a8-4f00-7000-8000-000000000001"
        tenant_id:
          type: string
          description: Tenant ID for data scoping.
          example: "019377a8-4f00-7000-8000-000000000002"
        kty:
          type: string
          description: Key type (RSA, EC, OKP, oct).
          example: RSA
        alg:
          type: string
          description: Algorithm.
          example: RSA/2048
        use:
          type: string
          description: Key use (sig or enc).
          enum: [sig, enc]
          example: sig
        max_materials:
          type: integer
          description: Maximum material key versions.
          example: 10
        current_material_count:
          type: integer
          description: Current number of material keys.
          example: 3
        created_at:
          type: integer
          format: int64
          description: Unix timestamp when the elastic JWK was created.
          example: 1733313600

    ElasticJWKListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ElasticJWKResponse'
        total:
          type: integer
          format: int64
          description: Total number of elastic JWKs.
          example: 5

    # Material JWK Schemas
    MaterialJWKResponse:
      type: object
      required: [material_kid, elastic_jwk_id, active, barrier_version, created_at]
      properties:
        material_kid:
          type: string
          description: Material key ID.
          example: "019377a8-4f00-7000-8000-000000000003"
        elastic_jwk_id:
          type: string
          description: Parent elastic JWK ID.
          example: "019377a8-4f00-7000-8000-000000000001"
        public_jwk:
          description: Public key in JWK format (when decrypted).
        active:
          type: boolean
          description: Whether this material key is currently active.
          example: true
        barrier_version:
          type: integer
          description: Barrier encryption version.
          example: 1
        created_at:
          type: integer
          format: int64
          description: Unix timestamp when the material JWK was created.
          example: 1733313600
        retired_at:
          type: integer
          format: int64
          description: Unix timestamp when the material JWK was retired (null if active).

    MaterialJWKListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MaterialJWKResponse'
        total:
          type: integer
          format: int64
          description: Total number of material JWKs.
          example: 5

    # JWS Schemas
    JWSSignRequest:
      type: object
      required: [kid, payload]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID to use for signing.
          example: "019377a8-4f00-7000-8000-000000000001"
        payload:
          type: string
          description: Payload to sign (string or base64url-encoded).
          example: "Hello, World!"

    JWSSignResponse:
      type: object
      required: [jws]
      properties:
        jws:
          type: string
          description: Compact JWS serialization.
          # cspell:disable-next-line
          example: "eyJhbGciOiJFUzI1NiIsImtpZCI6IjAxOTM3N2E4LTRmMDAtNzAwMC04MDAwLTAwMDAwMDAwMDAwMSJ9.SGVsbG8sIFdvcmxkIQ...."

    JWSVerifyRequest:
      type: object
      required: [jws]
      properties:
        jws:
          type: string
          description: Compact JWS to verify.
          example: "eyJhbGciOiJFUzI1NiJ9...."
        kid:
          type: string
          format: uuid
          description: Optional key ID to use for verification.

    JWSVerifyResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          description: Whether the signature is valid.
          example: true
        payload:
          type: string
          description: Decoded payload (if valid).
          example: "Hello, World!"
        kid:
          type: string
          format: uuid
          description: Key ID used for verification.
        error:
          type: string
          description: Error message (if invalid).

    # JWE Schemas
    JWEEncryptRequest:
      type: object
      required: [kid, plaintext]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID to use for encryption.
          example: "019377a8-4f00-7000-8000-000000000001"
        plaintext:
          type: string
          description: Plaintext to encrypt.
          example: "Secret message"

    JWEEncryptResponse:
      type: object
      required: [jwe]
      properties:
        jwe:
          type: string
          description: Compact JWE serialization.
          example: "eyJhbGciOiJBMjU2S1ciLCJlbmMiOiJBMjU2R0NNIn0...."

    JWEDecryptRequest:
      type: object
      required: [jwe, kid]
      properties:
        jwe:
          type: string
          description: Compact JWE to decrypt.
          example: "eyJhbGciOiJBMjU2S1ciLCJlbmMiOiJBMjU2R0NNIn0...."
        kid:
          type: string
          format: uuid
          description: Key ID to use for decryption.
          example: "019377a8-4f00-7000-8000-000000000001"

    JWEDecryptResponse:
      type: object
      properties:
        plaintext:
          type: string
          description: Decrypted plaintext.
          example: "Secret message"
        kid:
          type: string
          format: uuid
          description: Key ID used for decryption.
        error:
          type: string
          description: Error message (if decryption failed).

    # JWT Schemas
    JWTCreateRequest:
      type: object
      required: [kid, claims]
      properties:
        kid:
          type: string
          format: uuid
          description: Key ID to use for signing.
          example: "019377a8-4f00-7000-8000-000000000001"
        claims:
          type: object
          description: JWT claims.
          additionalProperties: true
          example:
            sub: "user123"
            iss: "jose-authority"
            aud: "my-app"
            exp: 1733400000
            iat: 1733313600

    JWTCreateResponse:
      type: object
      required: [jwt]
      properties:
        jwt:
          type: string
          description: Compact JWT serialization.
          example: "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9...."

    JWTVerifyRequest:
      type: object
      required: [jwt]
      properties:
        jwt:
          type: string
          description: Compact JWT to verify.
          example: "eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCJ9...."
        kid:
          type: string
          format: uuid
          description: Optional key ID to use for verification.

    JWTVerifyResponse:
      type: object
      required: [valid]
      properties:
        valid:
          type: boolean
          description: Whether the JWT signature is valid.
          example: true
        claims:
          type: object
          description: Decoded claims (if valid).
          additionalProperties: true
        kid:
          type: string
          format: uuid
          description: Key ID used for verification.
        error:
          type: string
          description: Error message (if invalid).

    # Error Schemas
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message.
          example: "Key not found"

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

tags:
