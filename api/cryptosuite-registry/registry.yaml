# Cryptoutil Entity Registry
# This is the machine-readable single source of truth for all suites, products,
# and product-services in the cryptoutil suite. Fitness linters read this file
# at runtime to validate architectural invariants.
#
# Port assignment formula (ENG-HANDBOOK.md Section 3.4):
#   Service tier:  base_port
#   Product tier:  base_port + 10000
#   Suite tier:    base_port + 20000
#
# Migration range assignment:
#   Framework (template): 1001-1999
#   Domain per PS-ID:     see migration_range_start / migration_range_end

suites:
  - id: cryptoutil
    display_name: Cryptoutil
    cmd_dir: cryptoutil/
    init_ps_id: sm-kms

products:
  - id: sm
    display_name: "Secrets Manager"
    internal_apps_dir: sm/
    cmd_dir: sm/
    init_ps_id: sm-kms

  - id: jose
    display_name: JOSE
    internal_apps_dir: jose/
    cmd_dir: jose/
    init_ps_id: jose-ja

  - id: pki
    display_name: PKI
    internal_apps_dir: pki/
    cmd_dir: pki/
    init_ps_id: pki-ca

  - id: identity
    display_name: Identity
    internal_apps_dir: identity/
    cmd_dir: identity/
    init_ps_id: identity-authz

  - id: skeleton
    display_name: Skeleton
    internal_apps_dir: skeleton/
    cmd_dir: skeleton/
    init_ps_id: skeleton-template

product_services:
  - ps_id: sm-kms
    product: sm
    service: kms
    display_name: "Key Management"
    internal_apps_dir: sm-kms/
    magic_file: magic_sm.go
    base_port: 8000
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54320
    migration_range_start: 2001
    migration_range_end: 2999
    api_resources:
      - /elastic-keys
      - /elastic-keys/{elasticKeyID}
      - /elastic-keys/{elasticKeyID}/material-keys
      - /elastic-keys/{elasticKeyID}/material-keys/{materialKeyID}
      - /elastic-keys/{elasticKeyID}/material-keys/{materialKeyID}/revoke
      - /material-keys
      - /elastic-keys/{elasticKeyID}/generate
      - /elastic-keys/{elasticKeyID}/encrypt
      - /elastic-keys/{elasticKeyID}/decrypt
      - /elastic-keys/{elasticKeyID}/sign
      - /elastic-keys/{elasticKeyID}/verify
      - /elastic-keys/{elasticKeyID}/import

  - ps_id: sm-im
    product: sm
    service: im
    display_name: "Instant Messenger"
    internal_apps_dir: sm-im/
    magic_file: magic_sm_im.go
    base_port: 8100
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54321
    migration_range_start: 3001
    migration_range_end: 3999
    api_resources:
      - /messages
      - /messages/{messageID}
      - /messages/send
      - /messages/receive

  - ps_id: jose-ja
    product: jose
    service: ja
    display_name: "JWK Authority"
    internal_apps_dir: jose-ja/
    magic_file: magic_jose.go
    base_port: 8200
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54322
    migration_range_start: 4001
    migration_range_end: 4999
    api_resources:
      - /elastic-keys
      - /elastic-keys/{elasticKeyID}
      - /elastic-keys/{elasticKeyID}/material-keys
      - /elastic-keys/{elasticKeyID}/material-keys/active
      - /elastic-keys/{elasticKeyID}/material-keys/{materialKeyID}
      - /material-keys
      - /elastic-keys/{elasticKeyID}/rotate
      - /elastic-keys/{elasticKeyID}/generate
      - /elastic-keys/{elasticKeyID}/encrypt
      - /elastic-keys/{elasticKeyID}/decrypt
      - /elastic-keys/{elasticKeyID}/sign
      - /elastic-keys/{elasticKeyID}/verify
      - /jwks

  - ps_id: pki-ca
    product: pki
    service: ca
    display_name: "Certificate Authority"
    internal_apps_dir: pki-ca/
    magic_file: magic_pki.go
    base_port: 8300
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54323
    migration_range_start: 5001
    migration_range_end: 5999
    api_resources:
      - /cas
      - /cas/{caID}
      - /cas/{caID}/crl
      - /enrollments
      - /enrollments/{requestID}
      - /certificates
      - /certificates/{serialNumber}
      - /certificates/{serialNumber}/chain
      - /certificates/{serialNumber}/revoke
      - /profiles
      - /profiles/{profileID}
      - /ocsp
      - /est/cacerts
      - /est/simpleenroll
      - /est/simplereenroll
      - /est/serverkeygen
      - /est/csrattrs
      - /tsa/timestamp

  # OAuth 2.1 Authorization Server — handles token lifecycle only.
  # MFA endpoints belong in identity-idp (authentication concern, not authorization).
  # See RFC 6749 (OAuth 2.0), RFC 9101 (OAuth 2.1), OIDC Core 1.0.
  - ps_id: identity-authz
    product: identity
    service: authz
    display_name: "Authorization Server"
    internal_apps_dir: identity-authz/
    magic_file: magic_identity.go
    base_port: 8400
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54324
    migration_range_start: 6001
    migration_range_end: 6999
    api_resources:
      - /oauth2/v1/authorize
      - /oauth2/v1/token
      - /oauth2/v1/introspect
      - /oauth2/v1/revoke
      - /.well-known/openid-configuration

  # OIDC 1.0 Identity Provider — handles user authentication including MFA.
  # MFA (TOTP, WebAuthn) is an authentication concern that verifies user identity,
  # which is the IdP's responsibility. Best practice (Keycloak, Okta, Azure AD)
  # separates token lifecycle (authz) from user authentication (idp).
  - ps_id: identity-idp
    product: identity
    service: idp
    display_name: "Provider"
    internal_apps_dir: identity-idp/
    magic_file: magic_identity.go
    base_port: 8500
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54325
    migration_range_start: 7001
    migration_range_end: 7999
    api_resources:
      - /oidc/v1/login
      - /oidc/v1/consent
      - /oidc/v1/logout
      - /oidc/v1/userinfo
      - /oidc/v1/mfa/totp/enroll
      - /oidc/v1/mfa/totp/verify
      - /oidc/v1/mfa/totp/backup-codes/generate
      - /oidc/v1/mfa/totp/backup-codes/verify
      - /oidc/v1/mfa/webauthn/register/begin
      - /oidc/v1/mfa/webauthn/register/finish
      - /oidc/v1/mfa/webauthn/authenticate/begin
      - /oidc/v1/mfa/webauthn/authenticate/finish
      - /oidc/v1/mfa/webauthn/credentials
      - /oidc/v1/mfa/webauthn/credentials/{userID}

  - ps_id: identity-rs
    product: identity
    service: rs
    display_name: "Resource Server"
    internal_apps_dir: identity-rs/
    magic_file: magic_identity.go
    base_port: 8600
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54326
    migration_range_start: 8001
    migration_range_end: 8999
    api_resources:
      - /resources
      - /resources/{resourceID}

  # OIDC Relying Party — consumes tokens from the IdP/Authz server.
  # Handles OAuth 2.1 callback flow, session management, and token refresh.
  - ps_id: identity-rp
    product: identity
    service: rp
    display_name: "Relying Party"
    internal_apps_dir: identity-rp/
    magic_file: magic_identity.go
    base_port: 8700
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54327
    migration_range_start: 9001
    migration_range_end: 9999
    api_resources:
      - /authn/login
      - /authn/callback
      - /authn/logout
      - /authn/session
      - /authn/refresh

  # Single Page App Backend-for-Frontend (BFF) — browser-facing OAuth 2.1 client.
  # Proxies authentication flows for SPA clients that cannot securely store tokens.
  - ps_id: identity-spa
    product: identity
    service: spa
    display_name: "Single Page App"
    internal_apps_dir: identity-spa/
    magic_file: magic_identity.go
    base_port: 8800
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54328
    migration_range_start: 10001
    migration_range_end: 10999
    api_resources:
      - /authn/login
      - /authn/callback
      - /authn/logout
      - /authn/session
      - /authn/token

  - ps_id: skeleton-template
    product: skeleton
    service: template
    display_name: "Template"
    internal_apps_dir: skeleton-template/
    magic_file: magic_skeleton.go
    base_port: 8900
    entrypoint: ["/sbin/tini", "--"]
    pg_host_port: 54329
    migration_range_start: 11001
    migration_range_end: 11999
    api_resources:
      - /items
      - /items/{itemID}

shared_services:
  - id: shared-postgres
    display_name: "Shared PostgreSQL"
    leader_port: 5432
    follower_port: 5432
    leader_databases: 30
    follower_databases: 16
    replication: logical

infra_tools:
  - id: shared-telemetry
    display_name: "Shared Telemetry"
    collector_grpc_port: 4317
    collector_http_port: 4318
    grafana_port: 3000
