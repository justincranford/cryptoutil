# Canonical structure manifest for internal/apps/__PS_ID__/
#
# Used by lint-fitness apps-ps-id-template linter to enforce structural consistency
# across all 10 PS-ID service directories. Violations are errors (blocking CI).
#
# Placeholder substitution: __SERVICE__ → service component of the PS-ID
#   sm-kms  → kms    jose-ja → ja     pki-ca → ca     identity-authz → authz
#   identity-idp → idp  identity-rs → rs  identity-rp → rp  identity-spa → spa
#   skeleton-template → template    sm-im → im
#
# ENG-HANDBOOK references: §5.1 (Service Framework), §10.2 (Unit Testing), §14.1 (Coding Standards)
#
# ROOT FILE RULE: ALL files at the PS-ID root MUST start with the __SERVICE__  prefix.
#   Correct:   kms.go, kms_usage.go, kms_cli_test.go
#   FORBIDDEN: swagger.go, testmain_test.go, http_test.go (any non-service-prefixed file)
#
# SEPARATION OF CONCERNS:
#   Root   → CLI integration only (entry point, usage string, CLI tests)
#   server/ → All server implementation, swagger, integration tests, lifecycle/port tests

required_root_files:
  # Primary service entry point - routes CLI subcommands (server, health, livez, readyz, shutdown)
  - __SERVICE__.go
  # CLI usage string - BuildUsageMain() from internal/apps-framework/service/usage/
  - __SERVICE___usage.go
  # CLI integration tests - verifies help, version, unknown-subcommand exit codes
  - __SERVICE___cli_test.go

required_dirs:
  # Server implementation directory (ALL server code, swagger, testmain, integration tests live here)
  - server

required_server_files:
  # Core admin server implementation
  - server.go
  # OpenAPI/swagger serving (NOT at PS-ID root — lives in server/ package)
  - swagger.go
  # Swagger serving tests
  - swagger_test.go
  # TestMain for server-package integration test setup (shared server/DB for server/ tests)
  - testmain_test.go
  # Lifecycle tests - start/stop/graceful-shutdown across dual public+admin ports
  - __SERVICE___lifecycle_test.go
  # Port conflict tests - verifies deterministic failure when ports already in use
  - __SERVICE___port_conflict_test.go

optional_server_files:
  # Public API server (present in 9 of 10; sm-kms uses a different legacy structure)
  - public_server.go

optional_dirs:
  # End-to-end Docker Compose tests (required for fully-migrated services; optional during migration)
  - e2e
  # HTTP client wrapper (only for services that expose a typed client, e.g., sm-kms, sm-im)
  - client
  # Test helpers shared across root-package tests (only for services with complex test setup)
  - testing
