# Canonical structure manifest for internal/apps/__PS_ID__/
#
# Used by lint-fitness apps-ps-id-template linter to enforce structural consistency
# across all 10 PS-ID service directories. Violations are errors (blocking CI).
#
# Placeholder substitution: __SERVICE__ -> service component of the PS-ID
#   sm-kms  -> kms    jose-ja -> ja     pki-ca -> ca     identity-authz -> authz
#   identity-idp -> idp  identity-rs -> rs  identity-rp -> rp  identity-spa -> spa
#   skeleton-template -> template    sm-im -> im
#
# ENG-HANDBOOK references: SS5.1 (Service Framework), SS10.2 (Unit Testing), SS14.1 (Coding Standards)
#
# ROOT FILE RULE: ALL files at the PS-ID root MUST start with the __SERVICE__ prefix.
#   Correct:   kms.go, kms_usage.go, kms_cli_test.go
#   FORBIDDEN: swagger.go, testmain_test.go, http_test.go (any non-service-prefixed file)
#
# SEPARATION OF CONCERNS:
#   Root      -> CLI integration only (entry point, usage string, CLI tests)
#   server/   -> ALL server implementation, swagger, testmain, lifecycle/port tests
#   server/apis/       -> HTTP handlers (package apis); OpenAPI-generated or hand-rolled
#   server/config/     -> Server-level config structs, validation, test helpers
#   server/model/      -> GORM-tagged domain models (package model)
#   server/repository/ -> DB access layer + //go:embed migrations (package repository)
#   server/repository/migrations/ -> SQL migration files (NNNN_name.{up,down}.sql)
#   client/   -> Typed HTTP client wrapper (package client); for inter-service calls
#   e2e/      -> Docker Compose-driven E2E tests (//go:build e2e); ALL files must have build tag

# =============================================================================
# ROOT-LEVEL REQUIREMENTS
# =============================================================================

required_root_files:
  # Primary service entry point - routes CLI subcommands (server, health, livez, readyz, shutdown)
  - __SERVICE__.go
  # CLI usage string - BuildUsageMain() from internal/apps-framework/service/usage/
  - __SERVICE___usage.go
  # CLI integration tests - verifies help, version, unknown-subcommand exit codes
  - __SERVICE___cli_test.go

# =============================================================================
# REQUIRED FIRST-LEVEL SUBDIRECTORIES
# =============================================================================

required_dirs:
  # Server implementation directory (ALL server code, swagger, testmain, integration tests live here)
  - server
  # Typed HTTP client wrapper (package client); required for inter-service calls.
  - client
  # Docker Compose-driven E2E tests with //go:build e2e on all package files.
  - e2e

# =============================================================================
# REQUIRED server/ FILES
# =============================================================================

required_server_files:
  # Core admin server implementation: AdminServer struct, admin port listener, livez/readyz/shutdown
  - server.go
  # OpenAPI/swagger spec serving (NOT at PS-ID root; lives in server/ package)
  - swagger.go
  # Swagger serving tests
  - swagger_test.go
  # TestMain for server-package integration test setup (shared server/DB for server/ tests)
  - testmain_test.go
  # Lifecycle tests - start/stop/graceful-shutdown across dual public+admin ports
  - __SERVICE___lifecycle_test.go
  # Port conflict tests - verifies deterministic failure when ports already in use
  - __SERVICE___port_conflict_test.go

optional_server_files:
  # Public API server (present in 9 of 10; sm-kms uses a different legacy structure)
  - public_server.go

# =============================================================================
# REQUIRED server/ SUBDIRECTORIES
# =============================================================================

required_server_dirs:
  # HTTP handlers (package apis): generated or hand-rolled request/response handlers.
  # Pattern: server/apis/handlers_*.go; package apis; imported by server.go.
  # EXCEPTIONS (sm-kms, pki-ca): legacy flat handler layout in server/businesslogic/ (pending V20 migration).
  # EXCEPTIONS (identity-*): pending Phase 2 migration from PS-ID root to server/apis/ (V19).
  - apis
  # GORM-tagged domain models (package model): entity structs, NullableUUID, json serializers.
  # Pattern: server/model/model.go; package model.
  # EXCEPTIONS (sm-kms, pki-ca): pending server/ subdirectory migration in V20.
  # EXCEPTIONS (identity-*): pending Phase 4 creation in V19.
  - model
  # DB access layer (package repository): GORM finders/creators/updaters + //go:embed migrations.
  # Pattern: server/repository/repository.go + server/repository/migrations.go.
  # EXCEPTIONS (sm-kms, pki-ca): pending server/ subdirectory migration in V20.
  # EXCEPTIONS (identity-*): pending Phase 4 creation in V19.
  - repository

optional_server_dirs:
  # Framework config structs (present in sm-im, jose-ja, skeleton-template; others use config/).
  - config
  # Legacy domain logic layer (sm-kms businesslogic/, jose-ja service/); refactor target in V20.
  - businesslogic
  # Inter-service middleware and rate-limit helpers.
  - middleware
  # Request routing setup (services that separate routes from handlers).
  - service

# =============================================================================
# REQUIRED server/config/ FILES
# =============================================================================

# Config structs, validation rules, and test helper factories for the service's server-level config.
# Package: config (same as directory name).
# Provides: ServerConfig (settings), Validate() (input validation), NewTestServerConfig() (tests).
# EXCEPTIONS (pki-ca, identity-*): config/ being created during V19 Phase 4.
required_server_config_files:
  - config.go
  - config_test.go
  # Test helper: NewTestServerConfig() factory (used in server/ *_test.go files).
  # EXCEPTIONS (pki-ca, identity-*): pending Phase 4 creation.
  - config_test_helper.go

# =============================================================================
# REQUIRED server/repository/ FILES AND SUBDIRECTORIES
# =============================================================================

# SQL migration source of truth for this PS-ID.
# Pattern: package repository; defines MigrationsFS (//go:embed migrations/*.sql) and MigrationsDir ("migrations").
# Builder registration: builder.WithDomainMigrations(repository.MigrationsFS, repository.MigrationsDir).
# Migration number range: from api/cryptosuite-registry/registry.yaml (domain range 2001+, unique per PS-ID).
# EXCEPTIONS (pki-ca, identity-*): pending Phase 4 creation in V19.
required_server_repository_files:
  - migrations.go

# SQL migration files directory; contains NNNN_name.up.sql and NNNN_name.down.sql.
# At least one migration (initial schema init) is required.
# EXCEPTIONS (pki-ca, identity-*): pending Phase 4 creation in V19.
required_server_repository_dirs:
  - migrations

# =============================================================================
# REQUIRED e2e/ FILES
# =============================================================================

# ALL e2e/ files MUST carry //go:build e2e build tag (enforced by cicd-lint lint-go-test).
# TestMain pattern: start Docker Compose, wait for health endpoints, set up typed clients, call m.Run(), defer Compose down.
# Smoke test pattern: at minimum — GET /service/api/v1/health returns 200; one API round-trip.
# Reference implementations: internal/apps/sm-im/e2e/, internal/apps/jose-ja/e2e/, internal/apps/sm-kms/e2e/
# EXCEPTIONS (pki-ca, identity-{idp,rs,rp,spa}): pending Phase 6 creation in V19.
required_e2e_files:
  # TestMain: Docker Compose lifecycle, typed client setup, m.Run() integration.
  - testmain_e2e_test.go
  # Smoke tests: health check + at least one API round-trip (issuance, lookup, or key operation).
  - __SERVICE___e2e_test.go

# =============================================================================
# OPTIONAL FIRST-LEVEL SUBDIRECTORIES
# =============================================================================

optional_dirs:
  # Test helpers shared across root-package tests (only for services with complex test setup).
  - testing
