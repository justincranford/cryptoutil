# Canonical PS-ID template manifest used by apps-ps-id-template.
#
# Required entries below define the instantiated PS-ID target files under
# internal/apps/{PS-ID}/ after template expansion. They do not need to match
# template source file extensions in api/cryptosuite-registry/templates/.

required_root_files:
  - __SERVICE__.go
  - __SERVICE___test.go

required_dirs:
  - client
  - server

required_server_files:
  - testmain_test.go
  - __SERVICE___lifecycle_test.go
  - __SERVICE___port_conflict_test.go
