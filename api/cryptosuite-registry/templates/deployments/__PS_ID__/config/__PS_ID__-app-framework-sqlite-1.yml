# __PS_ID__ Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the '__PS_ID__-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:__PS_PUBLIC_PORT_SQLITE_1__"
  - "https://127.0.0.1:__PS_PUBLIC_PORT_SQLITE_1__"
  - "https://[::1]:__PS_PUBLIC_PORT_SQLITE_1__"

otlp-service: __PS_ID__-sqlite-1
otlp-hostname: __PS_ID__-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-sqlite-1/private-https-mutual-entity-__PS_ID__-sqlite-1.crt
server-admin-tls-key-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-sqlite-1/private-https-mutual-entity-__PS_ID__-sqlite-1.key
server-admin-tls-ca-file: /certs/__PS_ID__/private-https-mutual-issuing-ca-__PS_ID__-sqlite-1/truststore/private-https-mutual-issuing-ca-__PS_ID__-sqlite-1.crt
