# __PS_ID__ Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the '__PS_ID__-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:__PS_PUBLIC_PORT_PG_1__"
  - "https://127.0.0.1:__PS_PUBLIC_PORT_PG_1__"
  - "https://[::1]:__PS_PUBLIC_PORT_PG_1__"

otlp-service: __PS_ID__-postgresql-1
otlp-hostname: __PS_ID__-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/__PS_ID__/postgres-tls-client-entity-leader-__PS_ID__-postgres-1/postgres-tls-client-entity-leader-__PS_ID__-postgres-1.crt
database-sslkey: /certs/__PS_ID__/postgres-tls-client-entity-leader-__PS_ID__-postgres-1/postgres-tls-client-entity-leader-__PS_ID__-postgres-1.key
database-sslrootcert: /certs/__PS_ID__/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and explicitly require-and-verify client certs for the private admin API.
server-admin-tls-cert-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-postgres-1/private-https-mutual-entity-__PS_ID__-postgres-1.crt
server-admin-tls-key-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-postgres-1/private-https-mutual-entity-__PS_ID__-postgres-1.key
server-admin-tls-ca-file: /certs/__PS_ID__/private-https-mutual-issuing-ca-__PS_ID__-postgres-1/truststore/private-https-mutual-issuing-ca-__PS_ID__-postgres-1.crt
server-admin-tls-client-policy: require-and-verify

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/__PS_ID__/otel-collector-contrib-https-client-entity-__PS_ID__-postgres-1/otel-collector-contrib-https-client-entity-__PS_ID__-postgres-1.crt
otlp-tls-key-file: /certs/__PS_ID__/otel-collector-contrib-https-client-entity-__PS_ID__-postgres-1/otel-collector-contrib-https-client-entity-__PS_ID__-postgres-1.key
otlp-tls-ca-file: /certs/__PS_ID__/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve the public server cert and explicitly require-and-verify client certs.
server-public-tls-cert-file: /certs/__PS_ID__/public-https-server-entity-__PS_ID__-postgres-1/public-https-server-entity-__PS_ID__-postgres-1.crt
server-public-tls-key-file: /certs/__PS_ID__/public-https-server-entity-__PS_ID__-postgres-1/public-https-server-entity-__PS_ID__-postgres-1.key
server-public-tls-ca-file: /certs/__PS_ID__/public-https-client-issuing-ca-__PS_ID__-postgres/truststore/public-https-client-issuing-ca-__PS_ID__-postgres.crt
server-public-tls-client-policy: require-and-verify
