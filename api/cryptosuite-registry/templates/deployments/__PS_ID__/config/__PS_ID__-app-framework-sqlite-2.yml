# __PS_ID__ Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the '__PS_ID__-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:__PS_PUBLIC_PORT_SQLITE_2__"
  - "https://127.0.0.1:__PS_PUBLIC_PORT_SQLITE_2__"
  - "https://[::1]:__PS_PUBLIC_PORT_SQLITE_2__"

otlp-service: __PS_ID__-sqlite-2
otlp-hostname: __PS_ID__-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and explicitly require-and-verify client certs for the private admin API.
server-admin-tls-cert-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-sqlite-2/private-https-mutual-entity-__PS_ID__-sqlite-2.crt
server-admin-tls-key-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-sqlite-2/private-https-mutual-entity-__PS_ID__-sqlite-2.key
server-admin-tls-ca-file: /certs/__PS_ID__/private-https-mutual-issuing-ca-__PS_ID__-sqlite-2/truststore/private-https-mutual-issuing-ca-__PS_ID__-sqlite-2.crt
server-admin-tls-client-policy: require-and-verify

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/__PS_ID__/otel-collector-contrib-https-client-entity-__PS_ID__-sqlite-2/otel-collector-contrib-https-client-entity-__PS_ID__-sqlite-2.crt
otlp-tls-key-file: /certs/__PS_ID__/otel-collector-contrib-https-client-entity-__PS_ID__-sqlite-2/otel-collector-contrib-https-client-entity-__PS_ID__-sqlite-2.key
otlp-tls-ca-file: /certs/__PS_ID__/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve the public server cert and explicitly require-and-verify client certs.
server-public-tls-cert-file: /certs/__PS_ID__/public-https-server-entity-__PS_ID__-sqlite-2/public-https-server-entity-__PS_ID__-sqlite-2.crt
server-public-tls-key-file: /certs/__PS_ID__/public-https-server-entity-__PS_ID__-sqlite-2/public-https-server-entity-__PS_ID__-sqlite-2.key
server-public-tls-ca-file: /certs/__PS_ID__/public-https-client-issuing-ca-__PS_ID__-sqlite-2/truststore/public-https-client-issuing-ca-__PS_ID__-sqlite-2.crt
server-public-tls-client-policy: require-and-verify
