# __PS_ID__ Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the '__PS_ID__-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:__PS_PUBLIC_PORT_PG_2__"
  - "https://127.0.0.1:__PS_PUBLIC_PORT_PG_2__"
  - "https://[::1]:__PS_PUBLIC_PORT_PG_2__"

otlp-service: __PS_ID__-postgresql-2
otlp-hostname: __PS_ID__-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/__PS_ID__/postgres-tls-client-entity-leader-__PS_ID__-postgres-2/postgres-tls-client-entity-leader-__PS_ID__-postgres-2.crt
database-sslkey: /certs/__PS_ID__/postgres-tls-client-entity-leader-__PS_ID__-postgres-2/postgres-tls-client-entity-leader-__PS_ID__-postgres-2.key
database-sslrootcert: /certs/__PS_ID__/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-postgres-2/private-https-mutual-entity-__PS_ID__-postgres-2.crt
server-admin-tls-key-file: /certs/__PS_ID__/private-https-mutual-entity-__PS_ID__-postgres-2/private-https-mutual-entity-__PS_ID__-postgres-2.key
server-admin-tls-ca-file: /certs/__PS_ID__/private-https-mutual-issuing-ca-__PS_ID__-postgres-2/truststore/private-https-mutual-issuing-ca-__PS_ID__-postgres-2.crt
