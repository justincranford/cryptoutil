# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# __PS_ID_UPPER__ Docker Compose Configuration
#
# SERVICE-level deployment for __PS_DISPLAY_NAME__.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: __PS_PUBLIC_PORT_BASE__-__PS_PUBLIC_PORT_END__):
#   - __PS_ID__-app-sqlite-1:      __PS_PUBLIC_PORT_SQLITE_1__
#   - __PS_ID__-app-sqlite-2:      __PS_PUBLIC_PORT_SQLITE_2__
#   - __PS_ID__-app-postgresql-1:  __PS_PUBLIC_PORT_PG_1__
#   - __PS_ID__-app-postgresql-2:  __PS_PUBLIC_PORT_PG_2__
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                        # All instances
#   docker compose -f compose.yml up __PS_ID__-app-sqlite-1 -d   # Single instance
#   docker compose -f compose.yml logs -f                      # View logs
#   docker compose -f compose.yml down -v                      # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:__PS_PUBLIC_PORT_SQLITE_1__/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml
    env_file: .env.postgres

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command:
      - sh
      - -c
      - |
        test -f /run/secrets/unseal-1of5.secret &&
        test -f /run/secrets/unseal-2of5.secret &&
        test -f /run/secrets/unseal-3of5.secret &&
        test -f /run/secrets/unseal-4of5.secret &&
        test -f /run/secrets/unseal-5of5.secret &&
        test -f /run/secrets/hash-pepper-v3.secret &&
        test -f /run/secrets/postgres-url.secret &&
        test -f /run/secrets/postgres-username.secret &&
        test -f /run/secrets/postgres-password.secret &&
        test -f /run/secrets/postgres-database.secret &&
        test -f /run/secrets/browser-username.secret &&
        test -f /run/secrets/browser-password.secret &&
        test -f /run/secrets/service-username.secret &&
        test -f /run/secrets/service-password.secret &&
        echo All secrets verified
    networks:
      - __PS_ID__-network

  # Build __PS_ID__ image from source.
  builder-__PS_ID__:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    build:
      context: ../..
      dockerfile: deployments/__PS_ID__/Dockerfile
      args:
        APP_VERSION: "__IMAGE_TAG__"
        VCS_REF: "local"
        BUILD_DATE: "__BUILD_DATE__"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Thorough Go binary secrets validation: verifies file presence, naming convention,
  # location (/run/secrets/), content length (>=43 chars), and format (base64url).
  # Runs after builder-__PS_ID__ so the binary is available, before pki-init.
  validate-secrets-__PS_ID__:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    command: ["/app/__PS_ID__", "validate-secrets"]
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    depends_on:
      builder-__PS_ID__:
        condition: service_completed_successfully
    networks:
      - __PS_ID__-network

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    command: ["/app/__PS_ID__", "init", "--domain=__PS_ID__", "--output-dir=/certs"]
    volumes:
      - ./certs:/certs:rw
    depends_on:
      builder-__PS_ID__:
        condition: service_completed_successfully
      validate-secrets-__PS_ID__:
        condition: service_completed_successfully
    networks:
      - __PS_ID__-network

  # __PS_ID__ server with SQLite backend (instance 1).
  __PS_ID__-app-sqlite-1:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    command: /bin/sh -c "exec /app/__PS_ID__ server --config=/certs/tls-config.yml --config=/app/config/__PS_ID__-app-framework-common.yml --config=/app/config/__PS_ID__-app-framework-sqlite-1.yml --config=/app/config/__PS_ID__-app-domain-common.yml --config=/app/config/__PS_ID__-app-domain-sqlite-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "__PS_PUBLIC_PORT_SQLITE_1__:8080" # HTTPS public
    volumes:
      - ./config/__PS_ID__-app-framework-common.yml:/app/config/__PS_ID__-app-framework-common.yml:ro
      - ./config/__PS_ID__-app-framework-sqlite-1.yml:/app/config/__PS_ID__-app-framework-sqlite-1.yml:ro
      - ./config/__PS_ID__-app-domain-common.yml:/app/config/__PS_ID__-app-domain-common.yml:ro
      - ./config/__PS_ID__-app-domain-sqlite-1.yml:/app/config/__PS_ID__-app-domain-sqlite-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-__PS_ID__:
        condition: service_completed_successfully
      validate-secrets-__PS_ID__:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/__PS_ID__", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: __HEALTHCHECK_START_PERIOD__
      interval: __HEALTHCHECK_INTERVAL__
      timeout: __HEALTHCHECK_TIMEOUT__
      retries: __HEALTHCHECK_RETRIES__
    networks:
      - __PS_ID__-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # __PS_ID__ server with SQLite backend (instance 2).
  __PS_ID__-app-sqlite-2:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    command: /bin/sh -c "exec /app/__PS_ID__ server --config=/certs/tls-config.yml --config=/app/config/__PS_ID__-app-framework-common.yml --config=/app/config/__PS_ID__-app-framework-sqlite-2.yml --config=/app/config/__PS_ID__-app-domain-common.yml --config=/app/config/__PS_ID__-app-domain-sqlite-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "__PS_PUBLIC_PORT_SQLITE_2__:8080" # HTTPS public
    volumes:
      - ./config/__PS_ID__-app-framework-common.yml:/app/config/__PS_ID__-app-framework-common.yml:ro
      - ./config/__PS_ID__-app-framework-sqlite-2.yml:/app/config/__PS_ID__-app-framework-sqlite-2.yml:ro
      - ./config/__PS_ID__-app-domain-common.yml:/app/config/__PS_ID__-app-domain-common.yml:ro
      - ./config/__PS_ID__-app-domain-sqlite-2.yml:/app/config/__PS_ID__-app-domain-sqlite-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-__PS_ID__:
        condition: service_completed_successfully
      validate-secrets-__PS_ID__:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/__PS_ID__", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: __HEALTHCHECK_START_PERIOD__
      interval: __HEALTHCHECK_INTERVAL__
      timeout: __HEALTHCHECK_TIMEOUT__
      retries: __HEALTHCHECK_RETRIES__
    networks:
      - __PS_ID__-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # __PS_ID__ server with PostgreSQL backend (instance 1).
  __PS_ID__-app-postgresql-1:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    command: /bin/sh -c "exec /app/__PS_ID__ server --config=/certs/tls-config.yml --config=/app/config/__PS_ID__-app-framework-common.yml --config=/app/config/__PS_ID__-app-framework-postgresql-1.yml --config=/app/config/__PS_ID__-app-domain-common.yml --config=/app/config/__PS_ID__-app-domain-postgresql-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "__PS_PUBLIC_PORT_PG_1__:8080" # HTTPS public
    volumes:
      - ./config/__PS_ID__-app-framework-common.yml:/app/config/__PS_ID__-app-framework-common.yml:ro
      - ./config/__PS_ID__-app-framework-postgresql-1.yml:/app/config/__PS_ID__-app-framework-postgresql-1.yml:ro
      - ./config/__PS_ID__-app-domain-common.yml:/app/config/__PS_ID__-app-domain-common.yml:ro
      - ./config/__PS_ID__-app-domain-postgresql-1.yml:/app/config/__PS_ID__-app-domain-postgresql-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-__PS_ID__:
        condition: service_completed_successfully
      validate-secrets-__PS_ID__:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/__PS_ID__", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: __HEALTHCHECK_START_PERIOD__
      interval: __HEALTHCHECK_INTERVAL__
      timeout: __HEALTHCHECK_TIMEOUT__
      retries: __HEALTHCHECK_RETRIES__
    networks:
      - __PS_ID__-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # __PS_ID__ server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  __PS_ID__-app-postgresql-2:
    image: __SUITE__-__PS_ID__:__IMAGE_TAG__
    command: /bin/sh -c "exec /app/__PS_ID__ server --config=/certs/tls-config.yml --config=/app/config/__PS_ID__-app-framework-common.yml --config=/app/config/__PS_ID__-app-framework-postgresql-2.yml --config=/app/config/__PS_ID__-app-domain-common.yml --config=/app/config/__PS_ID__-app-domain-postgresql-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "__PS_PUBLIC_PORT_PG_2__:8080" # HTTPS public
    volumes:
      - ./config/__PS_ID__-app-framework-common.yml:/app/config/__PS_ID__-app-framework-common.yml:ro
      - ./config/__PS_ID__-app-framework-postgresql-2.yml:/app/config/__PS_ID__-app-framework-postgresql-2.yml:ro
      - ./config/__PS_ID__-app-domain-common.yml:/app/config/__PS_ID__-app-domain-common.yml:ro
      - ./config/__PS_ID__-app-domain-postgresql-2.yml:/app/config/__PS_ID__-app-domain-postgresql-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-__PS_ID__:
        condition: service_completed_successfully
      validate-secrets-__PS_ID__:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      __PS_ID__-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/__PS_ID__", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: __HEALTHCHECK_START_PERIOD__
      interval: __HEALTHCHECK_INTERVAL__
      timeout: __HEALTHCHECK_TIMEOUT__
      retries: __HEALTHCHECK_RETRIES__
    networks:
      - __PS_ID__-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # postgres-leader SSL setup — extends shared-postgres service with mTLS cert setup.
  # Runs as root to copy certs into a writable directory, chown to postgres (uid 999),
  # then drops to postgres user via docker-entrypoint.sh.
  postgres-leader:
    user: "0"
    entrypoint:
      - /bin/bash
      - -c
      - |
        SSL=/var/lib/postgresql/ssl
        mkdir -p "$$SSL"
        cp /ssl-in/server.crt "$$SSL/server.crt" 2>/dev/null || true
        cp /ssl-in/server.key "$$SSL/server.key" 2>/dev/null || true
        cp /ssl-in/client-ca.crt "$$SSL/client-ca.crt" 2>/dev/null || true
        chown 999:999 "$$SSL/server.crt" "$$SSL/server.key" "$$SSL/client-ca.crt" 2>/dev/null || true
        chmod 600 "$$SSL/server.key" 2>/dev/null || true
        chmod 644 "$$SSL/server.crt" "$$SSL/client-ca.crt" 2>/dev/null || true
        exec docker-entrypoint.sh postgres -c config_file=/etc/postgresql/postgresql.conf
    depends_on:
      pki-init:
        condition: service_completed_successfully
    volumes:
      - ./certs/__PS_ID__/postgres-tls-server-entity-leader/postgres-tls-server-entity-leader.crt:/ssl-in/server.crt:ro
      - ./certs/__PS_ID__/postgres-tls-server-entity-leader/postgres-tls-server-entity-leader.key:/ssl-in/server.key:ro
      - ./certs/__PS_ID__/postgres-tls-client-issuing-ca/truststore/postgres-tls-client-issuing-ca.crt:/ssl-in/client-ca.crt:ro

networks:
  __PS_ID__-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
