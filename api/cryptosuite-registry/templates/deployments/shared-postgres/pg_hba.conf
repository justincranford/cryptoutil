# pg_hba.conf — PostgreSQL Host-Based Authentication
#
# Used by both leader and follower PostgreSQL instances.
# Phase 1-3: hostssl permitted (no clientcert requirement yet).
# Phase 4+: clientcert=verify-full added for app connections.
# Phase 5+: clientcert=verify-full added for replication connection.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD
# local connections (Unix socket — used by pg_isready healthcheck)
local   all             all                                     trust
# IPv4 loopback
host    all             all             127.0.0.1/32            scram-sha-256
# IPv6 loopback
host    all             all             ::1/128                 scram-sha-256
# Replication connections from follower (TLS required, no clientcert yet — added in Phase 5)
hostssl replication     all             all                     scram-sha-256
# App connections (TLS required, no clientcert yet — clientcert=verify-full added in Phase 4)
hostssl all             all             all                     scram-sha-256
