openapi: 3.0.3
info:
  title: Resource Server API
  version: 1.0.0
  description: |
    OAuth 2.1 Resource Server providing protected API endpoints.

    This server validates access tokens and enforces scope-based authorization
    for protected resources. Supports both public and protected endpoints.
  contact:
    name: CryptoUtil Identity Team
    email: identity@cryptoutil.dev
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://localhost:8400
    description: Local Development (SQLite or PostgreSQL)
  - url: https://rs.cryptoutil.local
    description: Production

tags:
  - name: resources
    description: Resource endpoints for protected data access

paths:
  /resources:
    get:
      tags:
        - resources
      summary: List Resources
      description: |
        List protected resources. Requires valid access token with
        'read:resource' scope. Returns paginated resource collection.
      operationId: listResources
      security:
        - BearerAuth:
            - 'read:resource'
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 50
          description: Page size
      responses:
        '200':
          description: List of resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /resources/{resourceID}:
    get:
      tags:
        - resources
      summary: Get Resource
      description: |
        Get a specific protected resource by ID. Requires valid access token
        with 'read:resource' scope.
      operationId: getResource
      security:
        - BearerAuth:
            - 'read:resource'
      parameters:
        - name: resourceID
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Resource identifier
      responses:
        '200':
          description: Resource details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Access token obtained from authorization server.
        Token must contain required scopes for the endpoint.

  schemas:
    ResourceResponse:
      type: object
      required:
        - id
        - data
      properties:
        id:
          type: string
          format: uuid
          description: Resource identifier
        data:
          type: object
          description: Resource data
        createdAt:
          type: string
          format: date-time
          description: Resource creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Resource last update timestamp

    ResourceListResponse:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResourceResponse'
        pagination:
          type: object
          required:
            - page
            - size
            - total
          properties:
            page:
              type: integer
              minimum: 1
            size:
              type: integer
              minimum: 1
            total:
              type: integer
              minimum: 0

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    Unauthorized:
      description: Unauthorized - missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        WWW-Authenticate:
          schema:
            type: string
          description: Authentication challenge

    Forbidden:
      description: Forbidden - insufficient scopes or permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
