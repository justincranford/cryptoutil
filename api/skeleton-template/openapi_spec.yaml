# $schema: https://raw.githubusercontent.com/OAI/OpenAPI-Specification/main/schemas/v3.1/schema.yaml
openapi: 3.0.3
info:
  title: Skeleton Template API
  version: "1.0.0"
  description: >
    REST API for the Skeleton Template service.

    Provides:
    - Item CRUD operations (create, read, update, delete, list)
    - Multi-tenant isolation with tenant context

    All operations support both browser-based (session auth) and
    service-to-service (JWT auth) access patterns.
  contact:
    name: Justin Cranford
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /browser/api/v1
    description: Browser client API (session-based auth)
  - url: /service/api/v1
    description: Service client API (JWT-based auth)

paths:
  /items:
    post:
      summary: Create a new Item
      description: Create a new item within the current tenant.
      operationId: createItem
      tags: [Items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: Item created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      summary: List Items
      description: List items for the current tenant with pagination.
      operationId: listItems
      tags: [Items]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Items retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /items/{itemID}:
    parameters:
      - $ref: '#/components/parameters/ItemID'
    get:
      summary: Get Item by ID
      description: Retrieve a specific item by its UUID.
      operationId: getItem
      tags: [Items]
      responses:
        '200':
          description: Item retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      summary: Update Item
      description: Update the name and description of an existing item.
      operationId: updateItem
      tags: [Items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Delete Item
      description: Permanently delete an item.
      operationId: deleteItem
      tags: [Items]
      responses:
        '204':
          description: Item deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    ItemID:
      name: itemID
      in: path
      required: true
      description: UUID of the item.
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      description: Page number (1-based, default 1).
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: false
      description: Items per page (default 50, max 1000).
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 50

  schemas:
    ItemCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Display name for the item.
        description:
          type: string
          maxLength: 2000
          description: Optional description.

    ItemUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Display name for the item.
        description:
          type: string
          maxLength: 2000
          description: Optional description.

    Item:
      type: object
      required:
        - id
        - tenantId
        - name
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique item identifier.
        tenantId:
          type: string
          format: uuid
          description: Tenant isolation identifier.
        name:
          type: string
          description: Display name.
        description:
          type: string
          description: Optional description.
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp.
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp.

    ItemList:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      required:
        - page
        - size
        - total
      properties:
        page:
          type: integer
          description: Current page number.
        size:
          type: integer
          description: Items per page.
        total:
          type: integer
          format: int64
          description: Total number of items.

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code.
        message:
          type: string
          description: Human-readable error message.
        requestId:
          type: string
          format: uuid
          description: Request tracking identifier.

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
