# alias_map.yaml — Import Alias Formula Registry
#
# Maps import import_path → required_alias for all aliased imports in this project.
# Used by the import-alias-formula fitness linter to validate that every Go file
# that imports one of these packages uses the canonical alias.
#
# golangci-lint (importas linter) enforces these rules at build time.
# This YAML is the single source of truth; golangci.yml reads from here via
# the fitness linter (or is kept in sync by the import-alias-formula linter).
#
# Format:
#   external_aliases:  third-party / stdlib packages
#   internal_aliases:  cryptoutil/… packages (formula: path segments → camelCase)

external_aliases:
  # JOSE libraries
  - import_path: "github.com/lestrrat-go/jwx/v3/jwe"
    alias: joseJwe
  - import_path: "github.com/lestrrat-go/jwx/v3/jwk"
    alias: joseJwk
  - import_path: "github.com/lestrrat-go/jwx/v3/jws"
    alias: joseJws
  - import_path: "github.com/lestrrat-go/jwx/v3/jwa"
    alias: joseJwa
  # Third-party
  - import_path: "github.com/google/uuid"
    alias: googleUuid
  - import_path: "encoding/json"
    alias: json
  - import_path: "encoding/xml"
    alias: xml
  - import_path: "net/http"
    alias: http
  - import_path: "github.com/gofiber/fiber/v2"
    alias: fiber
  - import_path: "github.com/stretchr/testify"
    alias: testify
  # Crypto stdlib
  - import_path: "crypto/aes"
    alias: aes
  - import_path: "crypto/ecdsa"
    alias: ecdsa
  - import_path: "crypto/hmac"
    alias: hmac
  - import_path: "crypto/rsa"
    alias: rsa
  - import_path: "crypto/sha256"
    alias: sha256
  - import_path: "crypto/sha512"
    alias: sha512
  - import_path: "crypto/rand"
    alias: crand

