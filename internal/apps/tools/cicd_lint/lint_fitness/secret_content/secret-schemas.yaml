# Secret Content Schemas — Canonical format patterns for all non-unseal secret files.
#
# Placeholders:
#   {PREFIX}    - hyphenated PS-ID or tier name (e.g., "sm-kms", "sm", "cryptoutil")
#   {PREFIX_US} - underscored variant for SQL identifiers (e.g., "sm_kms", "sm", "cryptoutil")
#   {B64URL43}  - exactly 43 base64url characters (no padding): [A-Za-z0-9_-]{43}
#
# tiers: list of tiers where the rule applies.
#   service - PS-ID level deployment (e.g., deployments/sm-kms/)
#   product - product-level deployment (e.g., deployments/sm/)
#   suite   - suite-level deployment  (e.g., deployments/cryptoutil/)
#
# value_pattern: Go regex template. Placeholders are substituted before compiling.
# never_content: exact string expected in .secret.never marker files.
#
# The 9 .secret file types (service + shared tiers) + 5 .secret.never types = 14 total.

# -----------------------------------------------------------------------------
# Shared across ALL tiers: service, product, suite
# -----------------------------------------------------------------------------
- filename: "hash-pepper-v3.secret"
  tiers: [service, product, suite]
  value_pattern: "^{PREFIX}-hash-pepper-v3-{B64URL43}$"
  description: "HMAC pepper: {PREFIX}-hash-pepper-v3-{43-char base64url nonce}"

- filename: "postgres-database.secret"
  tiers: [service, product, suite]
  value_pattern: "^{PREFIX_US}_database$"
  description: "PostgreSQL database name: {PREFIX_US}_database"

- filename: "postgres-username.secret"
  tiers: [service, product, suite]
  value_pattern: "^{PREFIX_US}_database_user$"
  description: "PostgreSQL username: {PREFIX_US}_database_user"

- filename: "postgres-password.secret"
  tiers: [service, product, suite]
  value_pattern: "^{PREFIX_US}_database_pass-{B64URL43}$"
  description: "PostgreSQL password: {PREFIX_US}_database_pass-{43-char base64url nonce}"

- filename: "postgres-url.secret"
  tiers: [service, product, suite]
  value_pattern: "^postgres://{PREFIX_US}_database_user:{PREFIX_US}_database_pass-{B64URL43}@shared-postgres-leader:5432/{PREFIX_US}_database\\?sslmode=disable$"
  description: "PostgreSQL DSN composed from the three above secrets"

# -----------------------------------------------------------------------------
# Service-tier only: browser and service credentials (not used at product/suite)
# -----------------------------------------------------------------------------
- filename: "browser-username.secret"
  tiers: [service]
  value_pattern: "^{PREFIX}-browser-user$"
  description: "Browser client username: {PREFIX}-browser-user"

- filename: "browser-password.secret"
  tiers: [service]
  value_pattern: "^{PREFIX}-browser-pass-{B64URL43}$"
  description: "Browser client password: {PREFIX}-browser-pass-{43-char base64url nonce}"

- filename: "service-username.secret"
  tiers: [service]
  value_pattern: "^{PREFIX}-service-user$"
  description: "Service-to-service username: {PREFIX}-service-user"

- filename: "service-password.secret"
  tiers: [service]
  value_pattern: "^{PREFIX}-service-pass-{B64URL43}$"
  description: "Service-to-service password: {PREFIX}-service-pass-{43-char base64url nonce}"

# -----------------------------------------------------------------------------
# Product-tier .secret.never markers (4 total — browser/service × username/password)
# -----------------------------------------------------------------------------
- filename: "browser-username.secret.never"
  tiers: [product]
  never_content: "MUST NEVER be used at product level. Use service-specific secrets."
  description: "Marker: browser-username prohibited at product tier"

- filename: "browser-password.secret.never"
  tiers: [product]
  never_content: "MUST NEVER be used at product level. Use service-specific secrets."
  description: "Marker: browser-password prohibited at product tier"

- filename: "service-username.secret.never"
  tiers: [product]
  never_content: "MUST NEVER be used at product level. Use service-specific secrets."
  description: "Marker: service-username prohibited at product tier"

- filename: "service-password.secret.never"
  tiers: [product]
  never_content: "MUST NEVER be used at product level. Use service-specific secrets."
  description: "Marker: service-password prohibited at product tier"

# -----------------------------------------------------------------------------
# Suite-tier .secret.never markers (4 total — browser/service × username/password)
# -----------------------------------------------------------------------------
- filename: "browser-username.secret.never"
  tiers: [suite]
  never_content: "MUST NEVER be used at suite level. Use service-specific secrets."
  description: "Marker: browser-username prohibited at suite tier"

- filename: "browser-password.secret.never"
  tiers: [suite]
  never_content: "MUST NEVER be used at suite level. Use service-specific secrets."
  description: "Marker: browser-password prohibited at suite tier"

- filename: "service-username.secret.never"
  tiers: [suite]
  never_content: "MUST NEVER be used at suite level. Use service-specific secrets."
  description: "Marker: service-username prohibited at suite tier"

- filename: "service-password.secret.never"
  tiers: [suite]
  never_content: "MUST NEVER be used at suite level. Use service-specific secrets."
  description: "Marker: service-password prohibited at suite tier"
