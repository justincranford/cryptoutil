# docs/required-propagations.yaml
#
# Lists every ENG-HANDBOOK.md @propagate chunk that MUST appear in at least one
# instruction/agent file as an @source block.
#
# Validated by: go run ./cmd/cicd-lint lint-docs
# Sub-linter:   validate-coverage
#
# Fields:
#   chunk_id:         The value of as="..." in <!-- @propagate ... as="CHUNK_ID" -->
#   source_file:      The ENG-HANDBOOK.md relative path (always docs/ENG-HANDBOOK.md)
#   required_targets: Files that MUST contain <!-- @source ... as="CHUNK_ID" -->
#
# Orphan detection: Any @propagate chunk in ENG-HANDBOOK.md not listed here
# causes validate-coverage to report an error.

