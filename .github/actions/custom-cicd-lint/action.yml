# $schema: https://json.schemastore.org/github-action.json
# Doc: https://docs.github.com/en/actions/creating-actions/metadata-syntax-for-github-actions
name: 'custom-cicd-lint'
description: 'Build cicd binary and run ALL custom linting and formatting checks (sequential)'
runs:
  using: 'composite'
  steps:
    - name: Build cicd binary for quality checks
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        go build -o cicd ./cmd/cicd
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "cicd binary built in: ${DURATION}s"

    - name: Enforce file encoding (UTF-8 without BOM)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-text
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-text completed in: ${DURATION}s"

    - name: Check Go package linters (circular deps, CGO-free SQLite)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-go
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-go completed in: ${DURATION}s"

    - name: Enforce Go test patterns
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-go-test
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-go-test completed in: ${DURATION}s"

    - name: Check Docker Compose files (admin port exposure)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-compose
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-compose completed in: ${DURATION}s"

    - name: Check port assignments (standardized ports)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-ports
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-ports completed in: ${DURATION}s"

    - name: Check GitHub Actions workflow versions
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-workflow
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-workflow completed in: ${DURATION}s"

    - name: Check Go direct dependency updates
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-go-mod
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-go-mod completed in: ${DURATION}s"

    - name: Validate golangci-lint config (v2 compatibility)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-golangci
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-golangci completed in: ${DURATION}s"

    - name: Validate documentation propagation
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-docs
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-docs completed in: ${DURATION}s"

    - name: Validate deployment structure and config files
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-deployments
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-deployments completed in: ${DURATION}s"

    - name: Run architecture fitness functions (includes cicd-coverage self-check)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd lint-fitness
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "lint-fitness completed in: ${DURATION}s"

    - name: Run Go code formatters (interface{} to any, copyloopvar)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd format-go
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "format-go completed in: ${DURATION}s"

    - name: Run Go test file formatters (t.Helper)
      shell: bash
      run: |
        START_TIME=$(date +%s)
        echo "Start: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        ./cicd format-go-test
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "End: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
        echo "format-go-test completed in: ${DURATION}s"