# $schema: https://json.schemastore.org/github-workflow.json
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax

# WORKFLOW: GitHub Actions Storage Cleanup
# PURPOSE: Automated cleanup of old workflow runs, artifacts, and caches
# DEPENDENCIES: gh CLI (pre-installed on GitHub-hosted runners)
# EXPECTED DURATION: 1-3 minutes
# TIMEOUT: 15 minutes
# CRITICAL PATH: gh CLI API calls (paginated, rate-limited)

name: CI - GitHub Cleanup
# CROSS-PLATFORM COMPATIBILITY: All file references in this workflow MUST use relative paths
# to support both GitHub Actions Ubuntu runners and Windows `act` local runner testing.

on:
  schedule:
    # Run weekly on Sundays at 3 AM UTC (after DAST at 2 AM)
    - cron: '0 3 * * 0'
  # checkov:skip=CKV_GHA_7:workflow_dispatch inputs are intentional for cleanup parameterization
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete items older than N days (default: 7)'
        required: false
        default: '7'
      keep_min_runs:
        description: 'Minimum successful runs to keep per workflow (default: 3)'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run mode (preview only, no deletions)'
        required: false
        default: 'false'
        type: boolean

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    name: GitHub Storage Cleanup
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      # https://github.com/actions/checkout/releases (v6.0.0, 2025-11-11)
      uses: actions/checkout@v6.0.0
      with:
        sparse-checkout-cone-mode: false

    - name: Begin Workflow Job
      id: begin-workflow-job
      uses: ./.github/actions/workflow-job-begin

    - name: Set up Go
      uses: ./.github/actions/go-setup
      with:
        go-version: ${{ steps.begin-workflow-job.outputs.go-version }}
        go-mod-download: true
        go-mod-verify: false
        go-mod-tidy: false

    - name: Run GitHub Cleanup
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        CONFIRM_FLAG="--confirm"
        if [ "${{ inputs.dry_run }}" = "true" ]; then
          CONFIRM_FLAG=""
          echo "Running in DRY RUN mode (no deletions)"
        fi

        MAX_AGE="${{ inputs.max_age_days || '7' }}"
        KEEP_MIN="${{ inputs.keep_min_runs || '3' }}"

        echo "Configuration: max-age-days=$MAX_AGE, keep-min-runs=$KEEP_MIN"

        go run ./cmd/cicd-lint github-cleanup \
          --max-age-days="$MAX_AGE" \
          --keep-min-runs="$KEEP_MIN" \
          $CONFIRM_FLAG

    - name: Cleanup summary
      if: always()
      uses: ./.github/actions/workflow-job-end
