# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# CRYPTOUTIL SUITE Deployment (SUITE-Level)
#
# Purpose: Complete suite deployment with ALL 10 services across 5 products.
# Deployment Level: SUITE (port range 28000-28999, SERVICE base + 20000 offset)
# Each PS-ID has 4 instances: 2 SQLite (dev/ci profiles) + 2 PostgreSQL (postgres profile).
#
# Port formula: SUITE_PORT = SERVICE_BASE + 20000
#   - sm-kms:             28000-28003  (SERVICE: 8000-8003)
#   - sm-im:              28100-28103  (SERVICE: 8100-8103)
#   - jose-ja:            28200-28203  (SERVICE: 8200-8203)
#   - pki-ca:             28300-28303  (SERVICE: 8300-8303)
#   - identity-authz:     28400-28403  (SERVICE: 8400-8403)
#   - identity-idp:       28500-28503  (SERVICE: 8500-8503)
#   - identity-rs:        28600-28603  (SERVICE: 8600-8603)
#   - identity-rp:        28700-28703  (SERVICE: 8700-8703)
#   - identity-spa:       28800-28803  (SERVICE: 8800-8803)
#   - skeleton-template:  28900-28903  (SERVICE: 8900-8903)
#
# Usage:
#   docker compose -f deployments/cryptoutil/compose.yml up --profile dev -d   # SQLite only
#   docker compose -f deployments/cryptoutil/compose.yml up --profile postgres -d  # All
#   docker compose -f deployments/cryptoutil/compose.yml down -v
#
# Architecture: Recursive includes + Approach C (!override) port substitution.
#   Product composes include PS-ID composes (which include shared-postgres, shared-telemetry).
#   This file overrides host ports to SUITE-level and secrets to suite-scoped paths.

include:
  - path: ../sm/compose.yml
  - path: ../jose/compose.yml
  - path: ../pki/compose.yml
  - path: ../identity/compose.yml
  - path: ../skeleton/compose.yml

services:

  # SUITE-level PKI init (overrides PRODUCT/PS-ID cert material).
  pki-init:
    image: cryptoutil-sm-kms:dev
    command: ["init", "--output-dir=/certs", "--domain=cryptoutil"]
    volumes:
      - ./certs/:/certs/:rw
    depends_on:
      builder-sm-kms:
        condition: service_completed_successfully
  # --------------------------------------------------------------------------
  # Port overrides: !override replaces the entire ports array from PS-ID composes.
  # Container port is always 8080 (matching PS-ID service definition).
  # --------------------------------------------------------------------------

  # SM-KMS: SERVICE 8000-8003 -> SUITE 28000-28003
  sm-kms-app-sqlite-1: {ports: !override ["28000:8080"]}
  sm-kms-app-sqlite-2: {ports: !override ["28001:8080"]}
  sm-kms-app-postgresql-1: {ports: !override ["28002:8080"]}
  sm-kms-app-postgresql-2: {ports: !override ["28003:8080"]}

  # SM-IM: SERVICE 8100-8103 -> SUITE 28100-28103
  sm-im-app-sqlite-1: {ports: !override ["28100:8080"]}
  sm-im-app-sqlite-2: {ports: !override ["28101:8080"]}
  sm-im-app-postgresql-1: {ports: !override ["28102:8080"]}
  sm-im-app-postgresql-2: {ports: !override ["28103:8080"]}

  # JOSE-JA: SERVICE 8200-8203 -> SUITE 28200-28203
  jose-ja-app-sqlite-1: {ports: !override ["28200:8080"]}
  jose-ja-app-sqlite-2: {ports: !override ["28201:8080"]}
  jose-ja-app-postgresql-1: {ports: !override ["28202:8080"]}
  jose-ja-app-postgresql-2: {ports: !override ["28203:8080"]}

  # PKI-CA: SERVICE 8300-8303 -> SUITE 28300-28303
  pki-ca-app-sqlite-1: {ports: !override ["28300:8080"]}
  pki-ca-app-sqlite-2: {ports: !override ["28301:8080"]}
  pki-ca-app-postgresql-1: {ports: !override ["28302:8080"]}
  pki-ca-app-postgresql-2: {ports: !override ["28303:8080"]}

  # IDENTITY-AUTHZ: SERVICE 8400-8403 -> SUITE 28400-28403
  identity-authz-app-sqlite-1: {ports: !override ["28400:8080"]}
  identity-authz-app-sqlite-2: {ports: !override ["28401:8080"]}
  identity-authz-app-postgresql-1: {ports: !override ["28402:8080"]}
  identity-authz-app-postgresql-2: {ports: !override ["28403:8080"]}

  # IDENTITY-IDP: SERVICE 8500-8503 -> SUITE 28500-28503
  identity-idp-app-sqlite-1: {ports: !override ["28500:8080"]}
  identity-idp-app-sqlite-2: {ports: !override ["28501:8080"]}
  identity-idp-app-postgresql-1: {ports: !override ["28502:8080"]}
  identity-idp-app-postgresql-2: {ports: !override ["28503:8080"]}

  # IDENTITY-RS: SERVICE 8600-8603 -> SUITE 28600-28603
  identity-rs-app-sqlite-1: {ports: !override ["28600:8080"]}
  identity-rs-app-sqlite-2: {ports: !override ["28601:8080"]}
  identity-rs-app-postgresql-1: {ports: !override ["28602:8080"]}
  identity-rs-app-postgresql-2: {ports: !override ["28603:8080"]}

  # IDENTITY-RP: SERVICE 8700-8703 -> SUITE 28700-28703
  identity-rp-app-sqlite-1: {ports: !override ["28700:8080"]}
  identity-rp-app-sqlite-2: {ports: !override ["28701:8080"]}
  identity-rp-app-postgresql-1: {ports: !override ["28702:8080"]}
  identity-rp-app-postgresql-2: {ports: !override ["28703:8080"]}

  # IDENTITY-SPA: SERVICE 8800-8803 -> SUITE 28800-28803
  identity-spa-app-sqlite-1: {ports: !override ["28800:8080"]}
  identity-spa-app-sqlite-2: {ports: !override ["28801:8080"]}
  identity-spa-app-postgresql-1: {ports: !override ["28802:8080"]}
  identity-spa-app-postgresql-2: {ports: !override ["28803:8080"]}

  # SKELETON-TEMPLATE: SERVICE 8900-8903 -> SUITE 28900-28903
  skeleton-template-app-sqlite-1: {ports: !override ["28900:8080"]}
  skeleton-template-app-sqlite-2: {ports: !override ["28901:8080"]}
  skeleton-template-app-postgresql-1: {ports: !override ["28902:8080"]}
  skeleton-template-app-postgresql-2: {ports: !override ["28903:8080"]}

secrets:
  unseal-1of5.secret: {file: ./secrets/unseal-1of5.secret}
  unseal-2of5.secret: {file: ./secrets/unseal-2of5.secret}
  unseal-3of5.secret: {file: ./secrets/unseal-3of5.secret}
  unseal-4of5.secret: {file: ./secrets/unseal-4of5.secret}
  unseal-5of5.secret: {file: ./secrets/unseal-5of5.secret}
  hash-pepper-v3.secret: {file: ./secrets/hash-pepper-v3.secret}
  postgres-url.secret: {file: ./secrets/postgres-url.secret}
  postgres-username.secret: {file: ./secrets/postgres-username.secret}
  postgres-password.secret: {file: ./secrets/postgres-password.secret}
  postgres-database.secret: {file: ./secrets/postgres-database.secret}
