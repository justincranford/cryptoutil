# identity-idp Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'identity-idp-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8501"
  - "https://127.0.0.1:8501"
  - "https://[::1]:8501"

otlp-service: identity-idp-sqlite-2
otlp-hostname: identity-idp-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-idp/private-https-mutual-entity-identity-idp-sqlite-2/private-https-mutual-entity-identity-idp-sqlite-2.crt
server-admin-tls-key-file: /certs/identity-idp/private-https-mutual-entity-identity-idp-sqlite-2/private-https-mutual-entity-identity-idp-sqlite-2.key
server-admin-tls-ca-file: /certs/identity-idp/private-https-mutual-issuing-ca-identity-idp-sqlite-2/truststore/private-https-mutual-issuing-ca-identity-idp-sqlite-2.crt
