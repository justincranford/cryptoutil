# identity-idp Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the 'identity-idp-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:8503"
  - "https://127.0.0.1:8503"
  - "https://[::1]:8503"

otlp-service: identity-idp-postgresql-2
otlp-hostname: identity-idp-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/identity-idp/postgres-tls-client-entity-leader-identity-idp-postgres-2/postgres-tls-client-entity-leader-identity-idp-postgres-2.crt
database-sslkey: /certs/identity-idp/postgres-tls-client-entity-leader-identity-idp-postgres-2/postgres-tls-client-entity-leader-identity-idp-postgres-2.key
database-sslrootcert: /certs/identity-idp/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-idp/private-https-mutual-entity-identity-idp-postgres-2/private-https-mutual-entity-identity-idp-postgres-2.crt
server-admin-tls-key-file: /certs/identity-idp/private-https-mutual-entity-identity-idp-postgres-2/private-https-mutual-entity-identity-idp-postgres-2.key
server-admin-tls-ca-file: /certs/identity-idp/private-https-mutual-issuing-ca-identity-idp-postgres-2/truststore/private-https-mutual-issuing-ca-identity-idp-postgres-2.crt
