# identity-idp Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-idp-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8500"
  - "https://127.0.0.1:8500"
  - "https://[::1]:8500"

otlp-service: identity-idp-sqlite-1
otlp-hostname: identity-idp-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-idp/private-https-mutual-entity-identity-idp-sqlite-1/private-https-mutual-entity-identity-idp-sqlite-1.crt
server-admin-tls-key-file: /certs/identity-idp/private-https-mutual-entity-identity-idp-sqlite-1/private-https-mutual-entity-identity-idp-sqlite-1.key
server-admin-tls-ca-file: /certs/identity-idp/private-https-mutual-issuing-ca-identity-idp-sqlite-1/truststore/private-https-mutual-issuing-ca-identity-idp-sqlite-1.crt
