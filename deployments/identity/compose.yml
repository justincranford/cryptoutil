# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# IDENTITY Product Docker Compose Configuration
#
# PRODUCT-level deployment for Identity.
# Recursive includes: IDENTITY product (5 services: authz, idp, rs, rp, spa) (which include shared-postgres and shared-telemetry).
#
# Port allocation (PRODUCT level: SERVICE + 10000).
#
# Usage:
#   docker compose -f compose.yml up -d
#   docker compose -f compose.yml logs -f
#   docker compose -f compose.yml down -v
#

include:
  - path: ../identity-authz/compose.yml
  - path: ../identity-idp/compose.yml
  - path: ../identity-rs/compose.yml
  - path: ../identity-rp/compose.yml
  - path: ../identity-spa/compose.yml

services:
  # PRODUCT-level port overrides: SERVICE ports + 10000.
  # Service definitions (image, command, volumes, secrets, depends_on) are inherited from PS-ID includes.

  # PRODUCT-level PKI init (overrides PS-ID cert material).
  pki-init:
    image: cryptoutil-identity-authz:dev
    command: ["/app/identity-authz", "init", "--domain=identity", "--output-dir=/certs"]
    volumes:
      - ./certs/:/certs/:rw
    depends_on:
      builder-identity-authz:
        condition: service_completed_successfully

  identity-authz-app-sqlite-1:
    ports: !override
      - "18400:8080"

  identity-authz-app-sqlite-2:
    ports: !override
      - "18401:8080"

  identity-authz-app-postgresql-1:
    ports: !override
      - "18402:8080"

  identity-authz-app-postgresql-2:
    ports: !override
      - "18403:8080"

  identity-idp-app-sqlite-1:
    ports: !override
      - "18500:8080"

  identity-idp-app-sqlite-2:
    ports: !override
      - "18501:8080"

  identity-idp-app-postgresql-1:
    ports: !override
      - "18502:8080"

  identity-idp-app-postgresql-2:
    ports: !override
      - "18503:8080"

  identity-rs-app-sqlite-1:
    ports: !override
      - "18600:8080"

  identity-rs-app-sqlite-2:
    ports: !override
      - "18601:8080"

  identity-rs-app-postgresql-1:
    ports: !override
      - "18602:8080"

  identity-rs-app-postgresql-2:
    ports: !override
      - "18603:8080"

  identity-rp-app-sqlite-1:
    ports: !override
      - "18700:8080"

  identity-rp-app-sqlite-2:
    ports: !override
      - "18701:8080"

  identity-rp-app-postgresql-1:
    ports: !override
      - "18702:8080"

  identity-rp-app-postgresql-2:
    ports: !override
      - "18703:8080"

  identity-spa-app-sqlite-1:
    ports: !override
      - "18800:8080"

  identity-spa-app-sqlite-2:
    ports: !override
      - "18801:8080"

  identity-spa-app-postgresql-1:
    ports: !override
      - "18802:8080"

  identity-spa-app-postgresql-2:
    ports: !override
      - "18803:8080"

secrets:
  # PRODUCT-level secrets override PS-ID secrets (paths resolve relative to this file).
  # CRITICAL: ALL IDENTITY instances MUST use the SAME unseal secrets
  # to enable shared encryption/decryption of data in the database.
  # NEVER create instance-specific or PS-ID-specific secrets.
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
