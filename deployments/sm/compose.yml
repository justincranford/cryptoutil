# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# SM Product Docker Compose Configuration
#
# PRODUCT-level deployment for SM product (2 services: kms, im).
# Recursive includes: sm-kms and sm-im (which include shared-postgres and shared-telemetry).
#
# Port allocation (PRODUCT level: SERVICE + 10000):
#   sm-kms (SERVICE 8000-8003):
#   - sm-kms-app-sqlite-1:      18000
#   - sm-kms-app-sqlite-2:      18001
#   - sm-kms-app-postgresql-1:  18002
#   - sm-kms-app-postgresql-2:  18003
#   sm-im (SERVICE 8100-8103):
#   - sm-im-app-sqlite-1:       18100
#   - sm-im-app-sqlite-2:       18101
#   - sm-im-app-postgresql-1:   18102
#   - sm-im-app-postgresql-2:   18103
#
# Usage:
#   docker compose -f compose.yml up -d
#   docker compose -f compose.yml logs -f
#   docker compose -f compose.yml down -v
#
# Health Checks:
#   - sm-kms: https://localhost:18000/browser/api/v1/health
#   - sm-im:  https://localhost:18100/browser/api/v1/health
#   - Admin:  https://127.0.0.1:9090/admin/api/v1/livez (container-internal only)
#

include:
  - path: ../sm-kms/compose.yml
  - path: ../sm-im/compose.yml

services:
  # PRODUCT-level port overrides: SERVICE ports + 10000.
  # Service definitions (image, command, volumes, secrets, depends_on) are inherited from PS-ID includes.

  # PRODUCT-level PKI init (overrides PS-ID cert material).
  pki-init:
    image: cryptoutil-sm-kms:dev
    command: ["/app/sm-kms", "init", "--domain=sm", "--output-dir=/certs"]
    volumes:
      - ./certs/:/certs/:rw
    depends_on:
      builder-sm-kms:
        condition: service_completed_successfully

  sm-kms-app-sqlite-1:
    ports: !override
      - "18000:8080"

  sm-kms-app-sqlite-2:
    ports: !override
      - "18001:8080"

  sm-kms-app-postgresql-1:
    ports: !override
      - "18002:8080"

  sm-kms-app-postgresql-2:
    ports: !override
      - "18003:8080"

  sm-im-app-sqlite-1:
    ports: !override
      - "18100:8080"

  sm-im-app-sqlite-2:
    ports: !override
      - "18101:8080"

  sm-im-app-postgresql-1:
    ports: !override
      - "18102:8080"

  sm-im-app-postgresql-2:
    ports: !override
      - "18103:8080"

secrets:
  # PRODUCT-level secrets override PS-ID secrets (paths resolve relative to this file).
  # CRITICAL: ALL SM instances MUST use the SAME unseal secrets
  # to enable shared encryption/decryption of data in the database.
  # NEVER create instance-specific or PS-ID-specific secrets.
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
