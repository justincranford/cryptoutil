# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# IDENTITY-RS Docker Compose Configuration
#
# SERVICE-level deployment for Resource Server.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: 8600-8699):
#   - identity-rs-app-sqlite-1:      8600
#   - identity-rs-app-sqlite-2:      8601
#   - identity-rs-app-postgresql-1:  8602
#   - identity-rs-app-postgresql-2:  8603
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                            # All instances
#   docker compose -f compose.yml up identity-rs-app-sqlite-1 -d   # Single instance
#   docker compose -f compose.yml logs -f                          # View logs
#   docker compose -f compose.yml down -v                          # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:8600/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command: ["sh", "-c", "ls -l /run/secrets/*.secret"]
    networks:
      - identity-rs-network

  # Build identity-rs image from source.
  builder-identity-rs:
    image: cryptoutil-identity-rs:dev
    build:
      context: ../..
      dockerfile: deployments/identity-rs/Dockerfile
      args:
        APP_VERSION: "dev"
        VCS_REF: "local"
        BUILD_DATE: "2026-02-17T00:00:00Z"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: cryptoutil-identity-rs:dev
    command: ["/app/identity-rs", "init", "--domain=identity-rs", "--output-dir=/certs"]
    volumes:
      - ./certs/:/certs/:rw
    depends_on:
      builder-identity-rs:
        condition: service_completed_successfully
    networks:
      - identity-rs-network

  # identity-rs server with SQLite backend (instance 1).
  identity-rs-app-sqlite-1:
    image: cryptoutil-identity-rs:dev
    command: /bin/sh -c "exec /app/identity-rs server --config=/certs/tls-config.yml --config=/app/config/identity-rs-app-framework-common.yml --config=/app/config/identity-rs-app-framework-sqlite-1.yml --config=/app/config/identity-rs-app-domain-common.yml --config=/app/config/identity-rs-app-domain-sqlite-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8600:8080" # HTTPS public
    volumes:
      - ./config/identity-rs-app-framework-common.yml:/app/config/identity-rs-app-framework-common.yml:ro
      - ./config/identity-rs-app-framework-sqlite-1.yml:/app/config/identity-rs-app-framework-sqlite-1.yml:ro
      - ./config/identity-rs-app-domain-common.yml:/app/config/identity-rs-app-domain-common.yml:ro
      - ./config/identity-rs-app-domain-sqlite-1.yml:/app/config/identity-rs-app-domain-sqlite-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-identity-rs:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - identity-rs-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # identity-rs server with SQLite backend (instance 2).
  identity-rs-app-sqlite-2:
    image: cryptoutil-identity-rs:dev
    command: /bin/sh -c "exec /app/identity-rs server --config=/certs/tls-config.yml --config=/app/config/identity-rs-app-framework-common.yml --config=/app/config/identity-rs-app-framework-sqlite-2.yml --config=/app/config/identity-rs-app-domain-common.yml --config=/app/config/identity-rs-app-domain-sqlite-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8601:8080" # HTTPS public
    volumes:
      - ./config/identity-rs-app-framework-common.yml:/app/config/identity-rs-app-framework-common.yml:ro
      - ./config/identity-rs-app-framework-sqlite-2.yml:/app/config/identity-rs-app-framework-sqlite-2.yml:ro
      - ./config/identity-rs-app-domain-common.yml:/app/config/identity-rs-app-domain-common.yml:ro
      - ./config/identity-rs-app-domain-sqlite-2.yml:/app/config/identity-rs-app-domain-sqlite-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-identity-rs:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - identity-rs-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # identity-rs server with PostgreSQL backend (instance 1).
  identity-rs-app-postgresql-1:
    image: cryptoutil-identity-rs:dev
    command: /bin/sh -c "exec /app/identity-rs server --config=/certs/tls-config.yml --config=/app/config/identity-rs-app-framework-common.yml --config=/app/config/identity-rs-app-framework-postgresql-1.yml --config=/app/config/identity-rs-app-domain-common.yml --config=/app/config/identity-rs-app-domain-postgresql-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8602:8080" # HTTPS public
    volumes:
      - ./config/identity-rs-app-framework-common.yml:/app/config/identity-rs-app-framework-common.yml:ro
      - ./config/identity-rs-app-framework-postgresql-1.yml:/app/config/identity-rs-app-framework-postgresql-1.yml:ro
      - ./config/identity-rs-app-domain-common.yml:/app/config/identity-rs-app-domain-common.yml:ro
      - ./config/identity-rs-app-domain-postgresql-1.yml:/app/config/identity-rs-app-domain-postgresql-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-identity-rs:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - identity-rs-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # identity-rs server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  identity-rs-app-postgresql-2:
    image: cryptoutil-identity-rs:dev
    command: /bin/sh -c "exec /app/identity-rs server --config=/certs/tls-config.yml --config=/app/config/identity-rs-app-framework-common.yml --config=/app/config/identity-rs-app-framework-postgresql-2.yml --config=/app/config/identity-rs-app-domain-common.yml --config=/app/config/identity-rs-app-domain-postgresql-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8603:8080" # HTTPS public
    volumes:
      - ./config/identity-rs-app-framework-common.yml:/app/config/identity-rs-app-framework-common.yml:ro
      - ./config/identity-rs-app-framework-postgresql-2.yml:/app/config/identity-rs-app-framework-postgresql-2.yml:ro
      - ./config/identity-rs-app-domain-common.yml:/app/config/identity-rs-app-domain-common.yml:ro
      - ./config/identity-rs-app-domain-postgresql-2.yml:/app/config/identity-rs-app-domain-postgresql-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-identity-rs:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      identity-rs-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - identity-rs-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  identity-rs-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
