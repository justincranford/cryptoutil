# identity-rs Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the 'identity-rs-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:8603"
  - "https://127.0.0.1:8603"
  - "https://[::1]:8603"

otlp-service: identity-rs-postgresql-2
otlp-hostname: identity-rs-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/identity-rs/postgres-tls-client-entity-leader-identity-rs-postgres-2/postgres-tls-client-entity-leader-identity-rs-postgres-2.crt
database-sslkey: /certs/identity-rs/postgres-tls-client-entity-leader-identity-rs-postgres-2/postgres-tls-client-entity-leader-identity-rs-postgres-2.key
database-sslrootcert: /certs/identity-rs/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-rs/private-https-mutual-entity-identity-rs-postgres-2/private-https-mutual-entity-identity-rs-postgres-2.crt
server-admin-tls-key-file: /certs/identity-rs/private-https-mutual-entity-identity-rs-postgres-2/private-https-mutual-entity-identity-rs-postgres-2.key
server-admin-tls-ca-file: /certs/identity-rs/private-https-mutual-issuing-ca-identity-rs-postgres-2/truststore/private-https-mutual-issuing-ca-identity-rs-postgres-2.crt
