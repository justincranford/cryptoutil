# identity-rs Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-rs-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:8602"
  - "https://127.0.0.1:8602"
  - "https://[::1]:8602"

otlp-service: identity-rs-postgresql-1
otlp-hostname: identity-rs-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/identity-rs/postgres-tls-client-entity-leader-identity-rs-postgres-1/postgres-tls-client-entity-leader-identity-rs-postgres-1.crt
database-sslkey: /certs/identity-rs/postgres-tls-client-entity-leader-identity-rs-postgres-1/postgres-tls-client-entity-leader-identity-rs-postgres-1.key
database-sslrootcert: /certs/identity-rs/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-rs/private-https-mutual-entity-identity-rs-postgres-1/private-https-mutual-entity-identity-rs-postgres-1.crt
server-admin-tls-key-file: /certs/identity-rs/private-https-mutual-entity-identity-rs-postgres-1/private-https-mutual-entity-identity-rs-postgres-1.key
server-admin-tls-ca-file: /certs/identity-rs/private-https-mutual-issuing-ca-identity-rs-postgres-1/truststore/private-https-mutual-issuing-ca-identity-rs-postgres-1.crt
