# identity-rs Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-rs-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8600"
  - "https://127.0.0.1:8600"
  - "https://[::1]:8600"

otlp-service: identity-rs-sqlite-1
otlp-hostname: identity-rs-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-rs/private-https-mutual-entity-identity-rs-sqlite-1/private-https-mutual-entity-identity-rs-sqlite-1.crt
server-admin-tls-key-file: /certs/identity-rs/private-https-mutual-entity-identity-rs-sqlite-1/private-https-mutual-entity-identity-rs-sqlite-1.key
server-admin-tls-ca-file: /certs/identity-rs/private-https-mutual-issuing-ca-identity-rs-sqlite-1/truststore/private-https-mutual-issuing-ca-identity-rs-sqlite-1.crt
