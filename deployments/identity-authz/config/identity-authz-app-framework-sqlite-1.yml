# identity-authz Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-authz-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8400"
  - "https://127.0.0.1:8400"
  - "https://[::1]:8400"

otlp-service: identity-authz-sqlite-1
otlp-hostname: identity-authz-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-authz/private-https-mutual-entity-identity-authz-sqlite-1/private-https-mutual-entity-identity-authz-sqlite-1.crt
server-admin-tls-key-file: /certs/identity-authz/private-https-mutual-entity-identity-authz-sqlite-1/private-https-mutual-entity-identity-authz-sqlite-1.key
server-admin-tls-ca-file: /certs/identity-authz/private-https-mutual-issuing-ca-identity-authz-sqlite-1/truststore/private-https-mutual-issuing-ca-identity-authz-sqlite-1.crt
