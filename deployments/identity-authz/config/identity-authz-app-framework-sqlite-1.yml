# identity-authz Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-authz-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8400"
  - "https://127.0.0.1:8400"
  - "https://[::1]:8400"

otlp-service: identity-authz-sqlite-1
otlp-hostname: identity-authz-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-authz/private-https-mutual-entity-identity-authz-sqlite-1/private-https-mutual-entity-identity-authz-sqlite-1.crt
server-admin-tls-key-file: /certs/identity-authz/private-https-mutual-entity-identity-authz-sqlite-1/private-https-mutual-entity-identity-authz-sqlite-1.key
server-admin-tls-ca-file: /certs/identity-authz/private-https-mutual-issuing-ca-identity-authz-sqlite-1/truststore/private-https-mutual-issuing-ca-identity-authz-sqlite-1.crt

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/identity-authz/otel-collector-contrib-https-client-entity-identity-authz-sqlite-1/otel-collector-contrib-https-client-entity-identity-authz-sqlite-1.crt
otlp-tls-key-file: /certs/identity-authz/otel-collector-contrib-https-client-entity-identity-authz-sqlite-1/otel-collector-contrib-https-client-entity-identity-authz-sqlite-1.key
otlp-tls-ca-file: /certs/identity-authz/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve public server cert and verify client cert.
server-public-tls-cert-file: /certs/identity-authz/public-https-server-entity-identity-authz-sqlite-1/public-https-server-entity-identity-authz-sqlite-1.crt
server-public-tls-key-file: /certs/identity-authz/public-https-server-entity-identity-authz-sqlite-1/public-https-server-entity-identity-authz-sqlite-1.key
server-public-tls-ca-file: /certs/identity-authz/public-https-client-issuing-ca-identity-authz-sqlite-1/truststore/public-https-client-issuing-ca-identity-authz-sqlite-1.crt
