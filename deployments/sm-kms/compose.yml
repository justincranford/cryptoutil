# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# SM-KMS Docker Compose Configuration
#
# SERVICE-level deployment for Key Management.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: 8000-8099):
#   - sm-kms-app-sqlite-1:      8000
#   - sm-kms-app-sqlite-2:      8001
#   - sm-kms-app-postgresql-1:  8002
#   - sm-kms-app-postgresql-2:  8003
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                        # All instances
#   docker compose -f compose.yml up sm-kms-app-sqlite-1 -d   # Single instance
#   docker compose -f compose.yml logs -f                      # View logs
#   docker compose -f compose.yml down -v                      # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:8000/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml
    env_file: .env.postgres

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command:
      - sh
      - -c
      - |
        test -f /run/secrets/unseal-1of5.secret &&
        test -f /run/secrets/unseal-2of5.secret &&
        test -f /run/secrets/unseal-3of5.secret &&
        test -f /run/secrets/unseal-4of5.secret &&
        test -f /run/secrets/unseal-5of5.secret &&
        test -f /run/secrets/hash-pepper-v3.secret &&
        test -f /run/secrets/postgres-url.secret &&
        test -f /run/secrets/postgres-username.secret &&
        test -f /run/secrets/postgres-password.secret &&
        test -f /run/secrets/postgres-database.secret &&
        test -f /run/secrets/browser-username.secret &&
        test -f /run/secrets/browser-password.secret &&
        test -f /run/secrets/service-username.secret &&
        test -f /run/secrets/service-password.secret &&
        echo All secrets verified
    networks:
      - sm-kms-network

  # Build sm-kms image from source.
  builder-sm-kms:
    image: cryptoutil-sm-kms:local
    build:
      context: ../..
      dockerfile: deployments/sm-kms/Dockerfile
      args:
        APP_VERSION: "local"
        VCS_REF: "local"
        BUILD_DATE: "2026-02-17T00:00:00Z"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Thorough Go binary secrets validation: verifies file presence, naming convention,
  # location (/run/secrets/), content length (>=43 chars), and format (base64url).
  # Runs after builder-sm-kms so the binary is available, before pki-init.
  validate-secrets-sm-kms:
    image: cryptoutil-sm-kms:local
    command: ["/app/sm-kms", "validate-secrets"]
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    depends_on:
      builder-sm-kms:
        condition: service_completed_successfully
    networks:
      - sm-kms-network

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: cryptoutil-sm-kms:local
    user: "0:0"
    command:
      - /bin/sh
      - -ec
      - |
        /app/sm-kms init --domain=sm-kms --output-dir=/certs
        chown -R 65532:65532 /certs
    volumes:
      - sm-kms-certs:/certs
    depends_on:
      builder-sm-kms:
        condition: service_completed_successfully
      validate-secrets-sm-kms:
        condition: service_completed_successfully
    networks:
      - sm-kms-network

  # sm-kms server with SQLite backend (instance 1).
  sm-kms-app-sqlite-1:
    image: cryptoutil-sm-kms:local
    command: /bin/sh -c "exec /app/sm-kms server --config=/certs/tls-config.yml --config=/app/config/sm-kms-app-framework-common.yml --config=/app/config/sm-kms-app-framework-sqlite-1.yml --config=/app/config/sm-kms-app-domain-common.yml --config=/app/config/sm-kms-app-domain-sqlite-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8000:8080" # HTTPS public
    volumes:
      - ./config/sm-kms-app-framework-common.yml:/app/config/sm-kms-app-framework-common.yml:ro
      - ./config/sm-kms-app-framework-sqlite-1.yml:/app/config/sm-kms-app-framework-sqlite-1.yml:ro
      - ./config/sm-kms-app-domain-common.yml:/app/config/sm-kms-app-domain-common.yml:ro
      - ./config/sm-kms-app-domain-sqlite-1.yml:/app/config/sm-kms-app-domain-sqlite-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - sm-kms-certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-kms:
        condition: service_completed_successfully
      validate-secrets-sm-kms:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/sm-kms", "livez", "--cacert", "/certs/issuing-ca.pem", "--cert", "/certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-1/private-https-mutual-entity-sm-kms-sqlite-1.crt", "--key", "/certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-1/private-https-mutual-entity-sm-kms-sqlite-1.key"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-kms-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # sm-kms server with SQLite backend (instance 2).
  sm-kms-app-sqlite-2:
    image: cryptoutil-sm-kms:local
    command: /bin/sh -c "exec /app/sm-kms server --config=/certs/tls-config.yml --config=/app/config/sm-kms-app-framework-common.yml --config=/app/config/sm-kms-app-framework-sqlite-2.yml --config=/app/config/sm-kms-app-domain-common.yml --config=/app/config/sm-kms-app-domain-sqlite-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8001:8080" # HTTPS public
    volumes:
      - ./config/sm-kms-app-framework-common.yml:/app/config/sm-kms-app-framework-common.yml:ro
      - ./config/sm-kms-app-framework-sqlite-2.yml:/app/config/sm-kms-app-framework-sqlite-2.yml:ro
      - ./config/sm-kms-app-domain-common.yml:/app/config/sm-kms-app-domain-common.yml:ro
      - ./config/sm-kms-app-domain-sqlite-2.yml:/app/config/sm-kms-app-domain-sqlite-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - sm-kms-certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-kms:
        condition: service_completed_successfully
      validate-secrets-sm-kms:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/sm-kms", "livez", "--cacert", "/certs/issuing-ca.pem", "--cert", "/certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-2/private-https-mutual-entity-sm-kms-sqlite-2.crt", "--key", "/certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-2/private-https-mutual-entity-sm-kms-sqlite-2.key"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-kms-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # sm-kms server with PostgreSQL backend (instance 1).
  sm-kms-app-postgresql-1:
    image: cryptoutil-sm-kms:local
    restart: "on-failure"
    command: /bin/sh -c "exec /app/sm-kms server --config=/certs/tls-config.yml --config=/app/config/sm-kms-app-framework-common.yml --config=/app/config/sm-kms-app-framework-postgresql-1.yml --config=/app/config/sm-kms-app-domain-common.yml --config=/app/config/sm-kms-app-domain-postgresql-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8002:8080" # HTTPS public
    volumes:
      - ./config/sm-kms-app-framework-common.yml:/app/config/sm-kms-app-framework-common.yml:ro
      - ./config/sm-kms-app-framework-postgresql-1.yml:/app/config/sm-kms-app-framework-postgresql-1.yml:ro
      - ./config/sm-kms-app-domain-common.yml:/app/config/sm-kms-app-domain-common.yml:ro
      - ./config/sm-kms-app-domain-postgresql-1.yml:/app/config/sm-kms-app-domain-postgresql-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - sm-kms-certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-kms:
        condition: service_completed_successfully
      validate-secrets-sm-kms:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/sm-kms", "livez", "--cacert", "/certs/issuing-ca.pem", "--cert", "/certs/sm-kms/private-https-mutual-entity-sm-kms-postgres-1/private-https-mutual-entity-sm-kms-postgres-1.crt", "--key", "/certs/sm-kms/private-https-mutual-entity-sm-kms-postgres-1/private-https-mutual-entity-sm-kms-postgres-1.key"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-kms-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # sm-kms server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  sm-kms-app-postgresql-2:
    image: cryptoutil-sm-kms:local
    restart: "on-failure"
    command: /bin/sh -c "exec /app/sm-kms server --config=/certs/tls-config.yml --config=/app/config/sm-kms-app-framework-common.yml --config=/app/config/sm-kms-app-framework-postgresql-2.yml --config=/app/config/sm-kms-app-domain-common.yml --config=/app/config/sm-kms-app-domain-postgresql-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8003:8080" # HTTPS public
    volumes:
      - ./config/sm-kms-app-framework-common.yml:/app/config/sm-kms-app-framework-common.yml:ro
      - ./config/sm-kms-app-framework-postgresql-2.yml:/app/config/sm-kms-app-framework-postgresql-2.yml:ro
      - ./config/sm-kms-app-domain-common.yml:/app/config/sm-kms-app-domain-common.yml:ro
      - ./config/sm-kms-app-domain-postgresql-2.yml:/app/config/sm-kms-app-domain-postgresql-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - sm-kms-certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-kms:
        condition: service_completed_successfully
      validate-secrets-sm-kms:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      sm-kms-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/sm-kms", "livez", "--cacert", "/certs/issuing-ca.pem", "--cert", "/certs/sm-kms/private-https-mutual-entity-sm-kms-postgres-2/private-https-mutual-entity-sm-kms-postgres-2.crt", "--key", "/certs/sm-kms/private-https-mutual-entity-sm-kms-postgres-2/private-https-mutual-entity-sm-kms-postgres-2.key"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-kms-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # OTel Collector mTLS cert setup: Cat 2 server cert + Cat 8 client issuing CA.
  # Extends the shared-telemetry service with PS-ID-specific cert mounts so the
  # collector can present its server cert and verify app client certs (Cat 2 + Cat 8).
  # Also adds Cat 1 CA truststore and Cat 9 infra client cert for OTelâ†’Grafana mTLS.
  # OTel Collector cert init: copies PS-ID certs from the named cert volume into a
  # writable volume at /etc/pki-init/certs so the distroless otel-collector-contrib
  # image can read them without requiring a shell. Alpine sh is used here (NOT in
  # the distroless image). NEVER use /bin/bash in otel/opentelemetry-collector-contrib.
  otel-certs-init:
    image: alpine:latest
    depends_on:
      pki-init:
        condition: service_completed_successfully
    volumes:
      - sm-kms-certs:/mnt/ps-certs-src:ro
      - sm-kms-otel-certs:/etc/pki-init/certs:rw
    command:
      - sh
      - -c
      - |
        set -e
        mkdir -p /etc/pki-init/certs
        cp -r /mnt/ps-certs-src/sm-kms/public-https-server-entity-otel-collector-contrib /etc/pki-init/certs/
        cp -r /mnt/ps-certs-src/sm-kms/otel-collector-contrib-https-client-issuing-ca /etc/pki-init/certs/
        cp -r /mnt/ps-certs-src/sm-kms/public-https-server-issuing-ca /etc/pki-init/certs/
        cp -r /mnt/ps-certs-src/sm-kms/otel-collector-contrib-https-client-entity-infra /etc/pki-init/certs/
        echo "OTel certs prepared in /etc/pki-init/certs"

  # OTel Collector mTLS cert setup: Cat 2 server cert + Cat 8 client issuing CA.
  # Extends the shared-telemetry service with PS-ID-specific cert mounts so the
  # collector can present its server cert and verify app client certs (Cat 2 + Cat 8).
  # CRITICAL: otel/opentelemetry-collector-contrib is distroless (no bash/sh).
  # Certs are prepared by otel-certs-init (Alpine) into the sm-kms-otel-certs volume.
  opentelemetry-collector-contrib:
    depends_on:
      otel-certs-init:
        condition: service_completed_successfully
    volumes:
      - sm-kms-otel-certs:/etc/pki-init/certs:ro

  # Grafana HTTPS and OTLP ingest mTLS cert setup.
  # Extends the shared-telemetry Grafana service with PS-ID-specific cert mounts.
  grafana-otel-lgtm:
    depends_on:
      pki-init:
        condition: service_completed_successfully
    volumes:
      - sm-kms-certs:/mnt/ps-certs-src:ro
    environment:
      GF_SERVER_CERT_FILE: /mnt/ps-certs-src/sm-kms/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.crt
      GF_SERVER_CERT_KEY: /mnt/ps-certs-src/sm-kms/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.key

  # postgres-leader SSL setup â€” extends shared-postgres service with mTLS cert setup.
  # Runs as root to copy certs into a writable directory, chown to postgres (uid 999),
  # then drops to postgres user via docker-entrypoint.sh.
  postgres-leader:
    user: "0"
    entrypoint:
      - /bin/bash
      - -c
      - |
        SSL=/var/lib/postgresql/ssl
        mkdir -p "$$SSL"
        cp /mnt/ps-certs-src/sm-kms/postgres-tls-server-entity-leader/postgres-tls-server-entity-leader.crt "$$SSL/server.crt" 2>/dev/null || true
        cp /mnt/ps-certs-src/sm-kms/postgres-tls-server-entity-leader/postgres-tls-server-entity-leader.key "$$SSL/server.key" 2>/dev/null || true
        cp /mnt/ps-certs-src/sm-kms/postgres-tls-client-issuing-ca/truststore/postgres-tls-client-issuing-ca.crt "$$SSL/client-ca.crt" 2>/dev/null || true
        chown 999:999 "$$SSL/server.crt" "$$SSL/server.key" "$$SSL/client-ca.crt" 2>/dev/null || true
        chmod 600 "$$SSL/server.key" 2>/dev/null || true
        chmod 644 "$$SSL/server.crt" "$$SSL/client-ca.crt" 2>/dev/null || true
        exec docker-entrypoint.sh postgres -c config_file=/etc/postgresql/postgresql.conf
    depends_on:
      pki-init:
        condition: service_completed_successfully
    volumes:
      - sm-kms-certs:/mnt/ps-certs-src:ro

volumes:
  sm-kms-certs:
  sm-kms-otel-certs:

networks:
  sm-kms-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
