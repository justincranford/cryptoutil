# sm-kms Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'sm-kms-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8001"
  - "https://127.0.0.1:8001"
  - "https://[::1]:8001"

otlp-service: sm-kms-sqlite-2
otlp-hostname: sm-kms-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-2/private-https-mutual-entity-sm-kms-sqlite-2.crt
server-admin-tls-key-file: /certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-2/private-https-mutual-entity-sm-kms-sqlite-2.key
server-admin-tls-ca-file: /certs/sm-kms/private-https-mutual-issuing-ca-sm-kms-sqlite-2/truststore/private-https-mutual-issuing-ca-sm-kms-sqlite-2.crt

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/sm-kms/otel-collector-contrib-https-client-entity-sm-kms-sqlite-2/otel-collector-contrib-https-client-entity-sm-kms-sqlite-2.crt
otlp-tls-key-file: /certs/sm-kms/otel-collector-contrib-https-client-entity-sm-kms-sqlite-2/otel-collector-contrib-https-client-entity-sm-kms-sqlite-2.key
otlp-tls-ca-file: /certs/sm-kms/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve public server cert and verify client cert.
server-public-tls-cert-file: /certs/sm-kms/public-https-server-entity-sm-kms-sqlite-2/public-https-server-entity-sm-kms-sqlite-2.crt
server-public-tls-key-file: /certs/sm-kms/public-https-server-entity-sm-kms-sqlite-2/public-https-server-entity-sm-kms-sqlite-2.key
server-public-tls-ca-file: /certs/sm-kms/public-https-client-issuing-ca-sm-kms-sqlite-2/truststore/public-https-client-issuing-ca-sm-kms-sqlite-2.crt
