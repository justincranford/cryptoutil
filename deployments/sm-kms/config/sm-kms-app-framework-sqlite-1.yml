# sm-kms Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'sm-kms-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8000"
  - "https://127.0.0.1:8000"
  - "https://[::1]:8000"

otlp-service: sm-kms-sqlite-1
otlp-hostname: sm-kms-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-1/private-https-mutual-entity-sm-kms-sqlite-1.crt
server-admin-tls-key-file: /certs/sm-kms/private-https-mutual-entity-sm-kms-sqlite-1/private-https-mutual-entity-sm-kms-sqlite-1.key
server-admin-tls-ca-file: /certs/sm-kms/private-https-mutual-issuing-ca-sm-kms-sqlite-1/truststore/private-https-mutual-issuing-ca-sm-kms-sqlite-1.crt
