# sm-kms Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the 'sm-kms-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:8003"
  - "https://127.0.0.1:8003"
  - "https://[::1]:8003"

otlp-service: sm-kms-postgresql-2
otlp-hostname: sm-kms-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/sm-kms/postgres-tls-client-entity-leader-sm-kms-postgres-2/postgres-tls-client-entity-leader-sm-kms-postgres-2.crt
database-sslkey: /certs/sm-kms/postgres-tls-client-entity-leader-sm-kms-postgres-2/postgres-tls-client-entity-leader-sm-kms-postgres-2.key
database-sslrootcert: /certs/sm-kms/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/sm-kms/private-https-mutual-entity-sm-kms-postgres-2/private-https-mutual-entity-sm-kms-postgres-2.crt
server-admin-tls-key-file: /certs/sm-kms/private-https-mutual-entity-sm-kms-postgres-2/private-https-mutual-entity-sm-kms-postgres-2.key
server-admin-tls-ca-file: /certs/sm-kms/private-https-mutual-issuing-ca-sm-kms-postgres-2/truststore/private-https-mutual-issuing-ca-sm-kms-postgres-2.crt
