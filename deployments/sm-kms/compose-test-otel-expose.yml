# compose-test-otel-expose.yml
#
# Test-only compose override that exposes OTel Collector OTLP ports to the host.
# Use alongside the main compose.yml to allow Go E2E tests to directly dial
# OTel gRPC (:4317) and HTTP (:4318) for TLS handshake verification.
#
# Port offset +10000 from the shared-telemetry Grafana bindings (14317/14318) to
# avoid host-port conflicts when both OTel and Grafana containers run simultaneously
# (full pipeline stack). Grafana binds 14317:4317 / 14318:4318; OTel test binds
# 24317:4317 / 24318:4318 / 24133:13133.
#
# NEVER use this override in production deployments.
# Usage (from deployments/sm-kms/):
#   docker compose -f compose.yml -f compose-test-otel-expose.yml up
#
services:
  opentelemetry-collector-contrib:
    ports:
      - "127.0.0.1:24317:4317" # OTLP gRPC — test-only exposure (offset to avoid Grafana 14317)
      - "127.0.0.1:24318:4318" # OTLP HTTP — test-only exposure (offset to avoid Grafana 14318)
      - "127.0.0.1:24133:13133" # OTel health check — test-only exposure
