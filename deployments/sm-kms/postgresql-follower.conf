# PostgreSQL Follower Configuration
# OLAP (Read-Only Analytics) — logical replication subscriber
# Tuned for analytical queries with larger memory and connection limits.

# Connection Settings
listen_addresses = '*'
max_connections = 200
port = 5432

primary_conninfo = 'host=postgres-leader port=5432 user=replicator'

# Extensions
shared_preload_libraries = 'pg_stat_statements'   # Query stats for OTel/Prometheus monitoring.

# Memory Settings
shared_buffers = 1GB
effective_cache_size = 2GB
maintenance_work_mem = 256MB
work_mem = 32MB

# Checkpointing
checkpoint_completion_target = 0.9
wal_buffers = 32MB
min_wal_size = 512MB
max_wal_size = 2GB

# Query Planner — optimized for analytics
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 500

# Parallel Query — enable for analytics workloads
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# Logging
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_timezone = 'UTC'

# Locale
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
