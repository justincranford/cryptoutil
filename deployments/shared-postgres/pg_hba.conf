# pg_hba.conf — PostgreSQL Host-Based Authentication
#
# Used by both leader and follower PostgreSQL instances.
# Phase 4+: clientcert=verify-full required for app connections.
# Phase 5+: clientcert=verify-full required for replication connections.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD
# local connections (Unix socket — used by pg_isready healthcheck)
local   all             all                                     trust
# IPv4 loopback (admin/maintenance tools only — not for app traffic)
host    all             all             127.0.0.1/32            scram-sha-256
# IPv6 loopback (admin/maintenance tools only — not for app traffic)
host    all             all             ::1/128                 scram-sha-256
# Replication connections from follower (password auth over host, SSL used when available)
host    replication     all             all                     scram-sha-256
# App connections (TLS + client cert required — mTLS enforced)
hostssl all             all             all                     scram-sha-256 clientcert=verify-full
