# identity-rp Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the 'identity-rp-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:8703"
  - "https://127.0.0.1:8703"
  - "https://[::1]:8703"

otlp-service: identity-rp-postgresql-2
otlp-hostname: identity-rp-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/identity-rp/postgres-tls-client-entity-leader-identity-rp-postgres-2/postgres-tls-client-entity-leader-identity-rp-postgres-2.crt
database-sslkey: /certs/identity-rp/postgres-tls-client-entity-leader-identity-rp-postgres-2/postgres-tls-client-entity-leader-identity-rp-postgres-2.key
database-sslrootcert: /certs/identity-rp/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-rp/private-https-mutual-entity-identity-rp-postgres-2/private-https-mutual-entity-identity-rp-postgres-2.crt
server-admin-tls-key-file: /certs/identity-rp/private-https-mutual-entity-identity-rp-postgres-2/private-https-mutual-entity-identity-rp-postgres-2.key
server-admin-tls-ca-file: /certs/identity-rp/private-https-mutual-issuing-ca-identity-rp-postgres-2/truststore/private-https-mutual-issuing-ca-identity-rp-postgres-2.crt
