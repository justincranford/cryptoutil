# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# PKI Product Docker Compose Configuration
#
# PRODUCT-level deployment for PKI.
# Recursive includes: PKI product (1 service: ca) (which include shared-postgres and shared-telemetry).
#
# Port allocation (PRODUCT level: SERVICE + 10000).
#
# Usage:
#   docker compose -f compose.yml up -d
#   docker compose -f compose.yml logs -f
#   docker compose -f compose.yml down -v
#

include:
  - path: ../pki-ca/compose.yml

services:
  # PRODUCT-level port overrides: SERVICE ports + 10000.
  # Service definitions (image, command, volumes, secrets, depends_on) are inherited from PS-ID includes.

  # PRODUCT-level PKI init (overrides PS-ID cert material).
  pki-init:
    image: cryptoutil-pki-ca:local
    command: ["/app/pki-ca", "init", "--domain=pki", "--output-dir=/certs"]
    volumes:
      - ./certs/:/certs/:rw
    depends_on:
      builder-pki-ca:
        condition: service_completed_successfully

  pki-ca-app-sqlite-1:
    ports: !override
      - "18300:8080"

  pki-ca-app-sqlite-2:
    ports: !override
      - "18301:8080"

  pki-ca-app-postgresql-1:
    ports: !override
      - "18302:8080"

  pki-ca-app-postgresql-2:
    ports: !override
      - "18303:8080"

secrets:
  # PRODUCT-level secrets override PS-ID secrets (paths resolve relative to this file).
  # CRITICAL: ALL PKI instances MUST use the SAME unseal secrets
  # to enable shared encryption/decryption of data in the database.
  # NEVER create instance-specific or PS-ID-specific secrets.
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
