# sm-im Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the 'sm-im-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:8102"
  - "https://127.0.0.1:8102"
  - "https://[::1]:8102"

otlp-service: sm-im-postgresql-1
otlp-hostname: sm-im-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/sm-im/postgres-tls-client-entity-leader-sm-im-postgres-1/postgres-tls-client-entity-leader-sm-im-postgres-1.crt
database-sslkey: /certs/sm-im/postgres-tls-client-entity-leader-sm-im-postgres-1/postgres-tls-client-entity-leader-sm-im-postgres-1.key
database-sslrootcert: /certs/sm-im/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/sm-im/private-https-mutual-entity-sm-im-postgres-1/private-https-mutual-entity-sm-im-postgres-1.crt
server-admin-tls-key-file: /certs/sm-im/private-https-mutual-entity-sm-im-postgres-1/private-https-mutual-entity-sm-im-postgres-1.key
server-admin-tls-ca-file: /certs/sm-im/private-https-mutual-issuing-ca-sm-im-postgres-1/truststore/private-https-mutual-issuing-ca-sm-im-postgres-1.crt
