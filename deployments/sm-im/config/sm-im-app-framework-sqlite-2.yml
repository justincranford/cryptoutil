# sm-im Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'sm-im-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8101"
  - "https://127.0.0.1:8101"
  - "https://[::1]:8101"

otlp-service: sm-im-sqlite-2
otlp-hostname: sm-im-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/sm-im/private-https-mutual-entity-sm-im-sqlite-2/private-https-mutual-entity-sm-im-sqlite-2.crt
server-admin-tls-key-file: /certs/sm-im/private-https-mutual-entity-sm-im-sqlite-2/private-https-mutual-entity-sm-im-sqlite-2.key
server-admin-tls-ca-file: /certs/sm-im/private-https-mutual-issuing-ca-sm-im-sqlite-2/truststore/private-https-mutual-issuing-ca-sm-im-sqlite-2.crt
