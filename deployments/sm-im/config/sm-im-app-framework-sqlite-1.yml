# sm-im Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'sm-im-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8100"
  - "https://127.0.0.1:8100"
  - "https://[::1]:8100"

otlp-service: sm-im-sqlite-1
otlp-hostname: sm-im-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/sm-im/private-https-mutual-entity-sm-im-sqlite-1/private-https-mutual-entity-sm-im-sqlite-1.crt
server-admin-tls-key-file: /certs/sm-im/private-https-mutual-entity-sm-im-sqlite-1/private-https-mutual-entity-sm-im-sqlite-1.key
server-admin-tls-ca-file: /certs/sm-im/private-https-mutual-issuing-ca-sm-im-sqlite-1/truststore/private-https-mutual-issuing-ca-sm-im-sqlite-1.crt

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/sm-im/otel-collector-contrib-https-client-entity-sm-im-sqlite-1/otel-collector-contrib-https-client-entity-sm-im-sqlite-1.crt
otlp-tls-key-file: /certs/sm-im/otel-collector-contrib-https-client-entity-sm-im-sqlite-1/otel-collector-contrib-https-client-entity-sm-im-sqlite-1.key
otlp-tls-ca-file: /certs/sm-im/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt
