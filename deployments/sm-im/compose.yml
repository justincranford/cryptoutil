# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# SM-IM Docker Compose Configuration
#
# SERVICE-level deployment for Instant Messenger.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: 8100-8199):
#   - sm-im-app-sqlite-1:      8100
#   - sm-im-app-sqlite-2:      8101
#   - sm-im-app-postgresql-1:  8102
#   - sm-im-app-postgresql-2:  8103
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                        # All instances
#   docker compose -f compose.yml up sm-im-app-sqlite-1 -d    # Single instance
#   docker compose -f compose.yml logs -f                      # View logs
#   docker compose -f compose.yml down -v                      # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:8100/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml
    env_file: .env.postgres

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command:
      - sh
      - -c
      - |
        test -f /run/secrets/unseal-1of5.secret &&
        test -f /run/secrets/unseal-2of5.secret &&
        test -f /run/secrets/unseal-3of5.secret &&
        test -f /run/secrets/unseal-4of5.secret &&
        test -f /run/secrets/unseal-5of5.secret &&
        test -f /run/secrets/hash-pepper-v3.secret &&
        test -f /run/secrets/postgres-url.secret &&
        test -f /run/secrets/postgres-username.secret &&
        test -f /run/secrets/postgres-password.secret &&
        test -f /run/secrets/postgres-database.secret &&
        test -f /run/secrets/browser-username.secret &&
        test -f /run/secrets/browser-password.secret &&
        test -f /run/secrets/service-username.secret &&
        test -f /run/secrets/service-password.secret &&
        echo All secrets verified
    networks:
      - sm-im-network

  # Build sm-im image from source.
  builder-sm-im:
    image: cryptoutil-sm-im:local
    build:
      context: ../..
      dockerfile: deployments/sm-im/Dockerfile
      args:
        APP_VERSION: "local"
        VCS_REF: "local"
        BUILD_DATE: "2026-02-17T00:00:00Z"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Thorough Go binary secrets validation: verifies file presence, naming convention,
  # location (/run/secrets/), content length (>=43 chars), and format (base64url).
  # Runs after builder-sm-im so the binary is available, before pki-init.
  validate-secrets-sm-im:
    image: cryptoutil-sm-im:local
    command: ["/app/sm-im", "validate-secrets"]
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    depends_on:
      builder-sm-im:
        condition: service_completed_successfully
    networks:
      - sm-im-network

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: cryptoutil-sm-im:local
    command: ["/app/sm-im", "init", "--domain=sm-im", "--output-dir=/certs"]
    volumes:
      - ./certs:/certs:rw
    depends_on:
      builder-sm-im:
        condition: service_completed_successfully
      validate-secrets-sm-im:
        condition: service_completed_successfully
    networks:
      - sm-im-network

  # sm-im server with SQLite backend (instance 1).
  sm-im-app-sqlite-1:
    image: cryptoutil-sm-im:local
    command: /bin/sh -c "exec /app/sm-im server --config=/certs/tls-config.yml --config=/app/config/sm-im-app-framework-common.yml --config=/app/config/sm-im-app-framework-sqlite-1.yml --config=/app/config/sm-im-app-domain-common.yml --config=/app/config/sm-im-app-domain-sqlite-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8100:8080" # HTTPS public
    volumes:
      - ./config/sm-im-app-framework-common.yml:/app/config/sm-im-app-framework-common.yml:ro
      - ./config/sm-im-app-framework-sqlite-1.yml:/app/config/sm-im-app-framework-sqlite-1.yml:ro
      - ./config/sm-im-app-domain-common.yml:/app/config/sm-im-app-domain-common.yml:ro
      - ./config/sm-im-app-domain-sqlite-1.yml:/app/config/sm-im-app-domain-sqlite-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-im:
        condition: service_completed_successfully
      validate-secrets-sm-im:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/sm-im", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-im-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # sm-im server with SQLite backend (instance 2).
  sm-im-app-sqlite-2:
    image: cryptoutil-sm-im:local
    command: /bin/sh -c "exec /app/sm-im server --config=/certs/tls-config.yml --config=/app/config/sm-im-app-framework-common.yml --config=/app/config/sm-im-app-framework-sqlite-2.yml --config=/app/config/sm-im-app-domain-common.yml --config=/app/config/sm-im-app-domain-sqlite-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8101:8080" # HTTPS public
    volumes:
      - ./config/sm-im-app-framework-common.yml:/app/config/sm-im-app-framework-common.yml:ro
      - ./config/sm-im-app-framework-sqlite-2.yml:/app/config/sm-im-app-framework-sqlite-2.yml:ro
      - ./config/sm-im-app-domain-common.yml:/app/config/sm-im-app-domain-common.yml:ro
      - ./config/sm-im-app-domain-sqlite-2.yml:/app/config/sm-im-app-domain-sqlite-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-im:
        condition: service_completed_successfully
      validate-secrets-sm-im:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/sm-im", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-im-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # sm-im server with PostgreSQL backend (instance 1).
  sm-im-app-postgresql-1:
    image: cryptoutil-sm-im:local
    command: /bin/sh -c "exec /app/sm-im server --config=/certs/tls-config.yml --config=/app/config/sm-im-app-framework-common.yml --config=/app/config/sm-im-app-framework-postgresql-1.yml --config=/app/config/sm-im-app-domain-common.yml --config=/app/config/sm-im-app-domain-postgresql-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8102:8080" # HTTPS public
    volumes:
      - ./config/sm-im-app-framework-common.yml:/app/config/sm-im-app-framework-common.yml:ro
      - ./config/sm-im-app-framework-postgresql-1.yml:/app/config/sm-im-app-framework-postgresql-1.yml:ro
      - ./config/sm-im-app-domain-common.yml:/app/config/sm-im-app-domain-common.yml:ro
      - ./config/sm-im-app-domain-postgresql-1.yml:/app/config/sm-im-app-domain-postgresql-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-im:
        condition: service_completed_successfully
      validate-secrets-sm-im:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/sm-im", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-im-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # sm-im server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  sm-im-app-postgresql-2:
    image: cryptoutil-sm-im:local
    command: /bin/sh -c "exec /app/sm-im server --config=/certs/tls-config.yml --config=/app/config/sm-im-app-framework-common.yml --config=/app/config/sm-im-app-framework-postgresql-2.yml --config=/app/config/sm-im-app-domain-common.yml --config=/app/config/sm-im-app-domain-postgresql-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8103:8080" # HTTPS public
    volumes:
      - ./config/sm-im-app-framework-common.yml:/app/config/sm-im-app-framework-common.yml:ro
      - ./config/sm-im-app-framework-postgresql-2.yml:/app/config/sm-im-app-framework-postgresql-2.yml:ro
      - ./config/sm-im-app-domain-common.yml:/app/config/sm-im-app-domain-common.yml:ro
      - ./config/sm-im-app-domain-postgresql-2.yml:/app/config/sm-im-app-domain-postgresql-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-sm-im:
        condition: service_completed_successfully
      validate-secrets-sm-im:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      sm-im-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/sm-im", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sm-im-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # postgres-leader SSL setup — extends shared-postgres service with mTLS cert setup.
  # Runs as root to copy certs into a writable directory, chown to postgres (uid 999),
  # then drops to postgres user via docker-entrypoint.sh.
  postgres-leader:
    user: "0"
    entrypoint:
      - /bin/bash
      - -c
      - |
        SSL=/var/lib/postgresql/ssl
        mkdir -p "$SSL"
        cp /ssl-in/server.crt "$SSL/server.crt" 2>/dev/null || true
        cp /ssl-in/server.key "$SSL/server.key" 2>/dev/null || true
        cp /ssl-in/client-ca.crt "$SSL/client-ca.crt" 2>/dev/null || true
        chown 999:999 "$SSL/server.crt" "$SSL/server.key" "$SSL/client-ca.crt" 2>/dev/null || true
        chmod 600 "$SSL/server.key" 2>/dev/null || true
        chmod 644 "$SSL/server.crt" "$SSL/client-ca.crt" 2>/dev/null || true
        exec docker-entrypoint.sh postgres -c config_file=/etc/postgresql/postgresql.conf
    depends_on:
      pki-init:
        condition: service_completed_successfully
    volumes:
      - ./certs/sm-im/postgres-tls-server-entity-leader/postgres-tls-server-entity-leader.crt:/ssl-in/server.crt:ro
      - ./certs/sm-im/postgres-tls-server-entity-leader/postgres-tls-server-entity-leader.key:/ssl-in/server.key:ro
      - ./certs/sm-im/postgres-tls-client-issuing-ca/truststore/postgres-tls-client-issuing-ca.crt:/ssl-in/client-ca.crt:ro

networks:
  sm-im-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
