# skeleton-template Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the 'skeleton-template-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:8902"
  - "https://127.0.0.1:8902"
  - "https://[::1]:8902"

otlp-service: skeleton-template-postgresql-1
otlp-hostname: skeleton-template-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/skeleton-template/postgres-tls-client-entity-leader-skeleton-template-postgres-1/postgres-tls-client-entity-leader-skeleton-template-postgres-1.crt
database-sslkey: /certs/skeleton-template/postgres-tls-client-entity-leader-skeleton-template-postgres-1/postgres-tls-client-entity-leader-skeleton-template-postgres-1.key
database-sslrootcert: /certs/skeleton-template/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-postgres-1/private-https-mutual-entity-skeleton-template-postgres-1.crt
server-admin-tls-key-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-postgres-1/private-https-mutual-entity-skeleton-template-postgres-1.key
server-admin-tls-ca-file: /certs/skeleton-template/private-https-mutual-issuing-ca-skeleton-template-postgres-1/truststore/private-https-mutual-issuing-ca-skeleton-template-postgres-1.crt
