# skeleton-template Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'skeleton-template-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8901"
  - "https://127.0.0.1:8901"
  - "https://[::1]:8901"

otlp-service: skeleton-template-sqlite-2
otlp-hostname: skeleton-template-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and explicitly require-and-verify client certs for the private admin API.
server-admin-tls-cert-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-sqlite-2/private-https-mutual-entity-skeleton-template-sqlite-2.crt
server-admin-tls-key-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-sqlite-2/private-https-mutual-entity-skeleton-template-sqlite-2.key
server-admin-tls-ca-file: /certs/skeleton-template/private-https-mutual-issuing-ca-skeleton-template-sqlite-2/truststore/private-https-mutual-issuing-ca-skeleton-template-sqlite-2.crt
server-admin-tls-client-policy: require-and-verify

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/skeleton-template/otel-collector-contrib-https-client-entity-skeleton-template-sqlite-2/otel-collector-contrib-https-client-entity-skeleton-template-sqlite-2.crt
otlp-tls-key-file: /certs/skeleton-template/otel-collector-contrib-https-client-entity-skeleton-template-sqlite-2/otel-collector-contrib-https-client-entity-skeleton-template-sqlite-2.key
otlp-tls-ca-file: /certs/skeleton-template/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve the public server cert and explicitly require-and-verify client certs.
server-public-tls-cert-file: /certs/skeleton-template/public-https-server-entity-skeleton-template-sqlite-2/public-https-server-entity-skeleton-template-sqlite-2.crt
server-public-tls-key-file: /certs/skeleton-template/public-https-server-entity-skeleton-template-sqlite-2/public-https-server-entity-skeleton-template-sqlite-2.key
server-public-tls-ca-file: /certs/skeleton-template/public-https-client-issuing-ca-skeleton-template-sqlite-2/truststore/public-https-client-issuing-ca-skeleton-template-sqlite-2.crt
server-public-tls-client-policy: require-and-verify
