# skeleton-template Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'skeleton-template-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8901"
  - "https://127.0.0.1:8901"
  - "https://[::1]:8901"

otlp-service: skeleton-template-sqlite-2
otlp-hostname: skeleton-template-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-sqlite-2/private-https-mutual-entity-skeleton-template-sqlite-2.crt
server-admin-tls-key-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-sqlite-2/private-https-mutual-entity-skeleton-template-sqlite-2.key
server-admin-tls-ca-file: /certs/skeleton-template/private-https-mutual-issuing-ca-skeleton-template-sqlite-2/truststore/private-https-mutual-issuing-ca-skeleton-template-sqlite-2.crt
