# skeleton-template Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'skeleton-template-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8900"
  - "https://127.0.0.1:8900"
  - "https://[::1]:8900"

otlp-service: skeleton-template-sqlite-1
otlp-hostname: skeleton-template-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-sqlite-1/private-https-mutual-entity-skeleton-template-sqlite-1.crt
server-admin-tls-key-file: /certs/skeleton-template/private-https-mutual-entity-skeleton-template-sqlite-1/private-https-mutual-entity-skeleton-template-sqlite-1.key
server-admin-tls-ca-file: /certs/skeleton-template/private-https-mutual-issuing-ca-skeleton-template-sqlite-1/truststore/private-https-mutual-issuing-ca-skeleton-template-sqlite-1.crt
