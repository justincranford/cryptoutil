# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# SKELETON-TEMPLATE Docker Compose Configuration
#
# SERVICE-level deployment for Template.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: 8900-8999):
#   - skeleton-template-app-sqlite-1:      8900
#   - skeleton-template-app-sqlite-2:      8901
#   - skeleton-template-app-postgresql-1:  8902
#   - skeleton-template-app-postgresql-2:  8903
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                                  # All instances
#   docker compose -f compose.yml up skeleton-template-app-sqlite-1 -d   # Single instance
#   docker compose -f compose.yml logs -f                                # View logs
#   docker compose -f compose.yml down -v                                # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:8900/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command: ["sh", "-c", "ls -l /run/secrets/*.secret"]
    networks:
      - skeleton-template-network

  # Build skeleton-template image from source.
  builder-skeleton-template:
    image: cryptoutil-skeleton-template:dev
    build:
      context: ../..
      dockerfile: deployments/skeleton-template/Dockerfile
      args:
        APP_VERSION: "dev"
        VCS_REF: "local"
        BUILD_DATE: "2026-02-17T00:00:00Z"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: cryptoutil-skeleton-template:dev
    command: ["init", "--output-dir=/certs"]
    volumes:
      - ./certs/:/certs/:rw
    depends_on:
      builder-skeleton-template:
        condition: service_completed_successfully
    networks:
      - skeleton-template-network

  # skeleton-template server with SQLite backend (instance 1).
  skeleton-template-app-sqlite-1:
    image: cryptoutil-skeleton-template:dev
    command: ["server", "--bind-public-port=8080", "--config=/certs/tls-config.yml", "--config=/app/config/skeleton-template-app-sqlite-1.yml", "--config=/app/config/skeleton-template-app-common.yml", "--config=/app/otel/otel.yml", "-u", "sqlite://file::memory:?cache=shared"]
    working_dir: /tmp
    ports:
      - "8900:8080" # HTTPS public
    volumes:
      - ./config/skeleton-template-app-sqlite-1.yml:/app/config/skeleton-template-app-sqlite-1.yml:ro
      - ./config/skeleton-template-app-common.yml:/app/config/skeleton-template-app-common.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-skeleton-template:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skeleton-template-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # skeleton-template server with SQLite backend (instance 2).
  skeleton-template-app-sqlite-2:
    image: cryptoutil-skeleton-template:dev
    command: ["server", "--bind-public-port=8080", "--config=/certs/tls-config.yml", "--config=/app/config/skeleton-template-app-sqlite-2.yml", "--config=/app/config/skeleton-template-app-common.yml", "--config=/app/otel/otel.yml", "-u", "sqlite://file::memory:?cache=shared"]
    working_dir: /tmp
    ports:
      - "8901:8080" # HTTPS public
    volumes:
      - ./config/skeleton-template-app-sqlite-2.yml:/app/config/skeleton-template-app-sqlite-2.yml:ro
      - ./config/skeleton-template-app-common.yml:/app/config/skeleton-template-app-common.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-skeleton-template:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skeleton-template-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # skeleton-template server with PostgreSQL backend (instance 1).
  skeleton-template-app-postgresql-1:
    image: cryptoutil-skeleton-template:dev
    command: ["server", "--bind-public-port=8080", "--config=/certs/tls-config.yml", "--config=/app/config/skeleton-template-app-postgresql-1.yml", "--config=/app/config/skeleton-template-app-common.yml", "--config=/app/otel/otel.yml", "-u", "file:///run/secrets/postgres-url.secret"]
    working_dir: /tmp
    ports:
      - "8902:8080" # HTTPS public
    volumes:
      - ./config/skeleton-template-app-postgresql-1.yml:/app/config/skeleton-template-app-postgresql-1.yml:ro
      - ./config/skeleton-template-app-common.yml:/app/config/skeleton-template-app-common.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-skeleton-template:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skeleton-template-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # skeleton-template server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  skeleton-template-app-postgresql-2:
    image: cryptoutil-skeleton-template:dev
    command: ["server", "--bind-public-port=8080", "--config=/certs/tls-config.yml", "--config=/app/config/skeleton-template-app-postgresql-2.yml", "--config=/app/config/skeleton-template-app-common.yml", "--config=/app/otel/otel.yml", "-u", "file:///run/secrets/postgres-url.secret"]
    working_dir: /tmp
    ports:
      - "8903:8080" # HTTPS public
    volumes:
      - ./config/skeleton-template-app-postgresql-2.yml:/app/config/skeleton-template-app-postgresql-2.yml:ro
      - ./config/skeleton-template-app-common.yml:/app/config/skeleton-template-app-common.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs/:/certs/:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-skeleton-template:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      skeleton-template-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--ca-certificate=/certs/root-ca.pem", "-q", "-O", "/dev/null", "https://127.0.0.1:9090/admin/api/v1/livez"]
      start_period: 60s
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - skeleton-template-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  skeleton-template-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
