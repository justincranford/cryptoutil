################################################################################
# Grafana OTEL-LGTM — OTel Collector TLS Override
# -------------------------------------------------------
# Applied via OTELCOL_EXTRA_ARGS="--config=file:/etc/grafana-otel-lgtm/otelcol-tls-override.yaml"
#
# This overlay overrides ONLY the OTLP receiver protocols to add mTLS.
# The base config at ./otelcol-config.yaml remains unchanged inside the image.
#
# mTLS enforcement:
#   - Cat 2 server cert: public-https-server-entity-grafana-otel-lgtm (Grafana server identity)
#   - Cat 8 client CA: grafana-otel-lgtm-https-client-issuing-ca (verifies OTel collector)
################################################################################

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /etc/pki-init/certs/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.crt
          key_file: /etc/pki-init/certs/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.key
          client_ca_file: /etc/pki-init/certs/grafana-otel-lgtm-https-client-issuing-ca/truststore/grafana-otel-lgtm-https-client-issuing-ca.crt
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - http://*
        tls:
          cert_file: /etc/pki-init/certs/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.crt
          key_file: /etc/pki-init/certs/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.key
          client_ca_file: /etc/pki-init/certs/grafana-otel-lgtm-https-client-issuing-ca/truststore/grafana-otel-lgtm-https-client-issuing-ca.crt
