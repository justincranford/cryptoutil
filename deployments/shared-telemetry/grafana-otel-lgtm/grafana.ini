################################################################################
# Grafana Configuration — HTTPS with Cat 2 server cert
# -------------------------------------------------------
# Enables HTTPS on port 3000 using the Cat 2 public server certificate issued
# by the shared public-https-server-issuing-ca (Cat 1).
#
# Cert dirs are mounted into the container from the PS-ID cert directory.
# Container paths use the /etc/pki-init/certs/ base (same as OTel collector).
################################################################################

[server]
protocol = https
http_port = 3000
cert_file = /etc/pki-init/certs/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.crt
cert_key = /etc/pki-init/certs/public-https-server-entity-grafana-otel-lgtm/public-https-server-entity-grafana-otel-lgtm.key

[security]
admin_user = admin
allow_embedding = false
cookie_secure = true
cookie_samesite = strict
