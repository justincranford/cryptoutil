# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# SKELETON Product Docker Compose Configuration
#
# PRODUCT-level deployment for SKELETON product (1 service: template).
# Recursive includes: skeleton-template (which includes shared-postgres and shared-telemetry).
#
# Port allocation (PRODUCT level: SERVICE + 10000):
#   skeleton-template (SERVICE 8900-8903):
#   - skeleton-template-app-sqlite-1:      18900
#   - skeleton-template-app-sqlite-2:      18901
#   - skeleton-template-app-postgresql-1:  18902  [--profile postgres]
#   - skeleton-template-app-postgresql-2:  18903  [--profile postgres]
#
# Usage:
#   docker compose -f compose.yml up -d                        # SQLite (dev profile)
#   docker compose -f compose.yml --profile postgres up -d     # All instances
#   docker compose -f compose.yml --profile ci up -d           # CI mode
#   docker compose -f compose.yml logs -f                      # View logs
#   docker compose -f compose.yml down -v                      # Stop and clean up
#
# Health Checks:
#   - skeleton-template: https://localhost:18900/browser/api/v1/health
#   - Admin:             https://127.0.0.1:9090/admin/api/v1/livez (container-internal only)
#

include:
  - path: ../skeleton-template/compose.yml

services:
  # PRODUCT-level port overrides: SERVICE ports + 10000.
  # Service definitions (image, command, volumes, secrets, depends_on) are inherited from PS-ID include.

  skeleton-template-app-sqlite-1:
    ports: !override
      - "18900:8080"

  skeleton-template-app-sqlite-2:
    ports: !override
      - "18901:8080"

  skeleton-template-app-postgresql-1:
    ports: !override
      - "18902:8080"

  skeleton-template-app-postgresql-2:
    ports: !override
      - "18903:8080"

secrets:
  # PRODUCT-level secrets override PS-ID secrets (paths resolve relative to this file).
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
