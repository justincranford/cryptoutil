# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# JOSE-JA Docker Compose Configuration
#
# SERVICE-level deployment for JWK Authority.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: 8200-8299):
#   - jose-ja-app-sqlite-1:      8200
#   - jose-ja-app-sqlite-2:      8201
#   - jose-ja-app-postgresql-1:  8202
#   - jose-ja-app-postgresql-2:  8203
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                        # All instances
#   docker compose -f compose.yml up jose-ja-app-sqlite-1 -d   # Single instance
#   docker compose -f compose.yml logs -f                      # View logs
#   docker compose -f compose.yml down -v                      # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:8200/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command:
      - sh
      - -c
      - |
        test -f /run/secrets/unseal-1of5.secret &&
        test -f /run/secrets/unseal-2of5.secret &&
        test -f /run/secrets/unseal-3of5.secret &&
        test -f /run/secrets/unseal-4of5.secret &&
        test -f /run/secrets/unseal-5of5.secret &&
        test -f /run/secrets/hash-pepper-v3.secret &&
        test -f /run/secrets/postgres-url.secret &&
        test -f /run/secrets/postgres-username.secret &&
        test -f /run/secrets/postgres-password.secret &&
        test -f /run/secrets/postgres-database.secret &&
        test -f /run/secrets/browser-username.secret &&
        test -f /run/secrets/browser-password.secret &&
        test -f /run/secrets/service-username.secret &&
        test -f /run/secrets/service-password.secret &&
        echo All secrets verified
    networks:
      - jose-ja-network

  # Build jose-ja image from source.
  builder-jose-ja:
    image: cryptoutil-jose-ja:local
    build:
      context: ../..
      dockerfile: deployments/jose-ja/Dockerfile
      args:
        APP_VERSION: "local"
        VCS_REF: "local"
        BUILD_DATE: "2026-02-17T00:00:00Z"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Thorough Go binary secrets validation: verifies file presence, naming convention,
  # location (/run/secrets/), content length (>=43 chars), and format (base64url).
  # Runs after builder-jose-ja so the binary is available, before pki-init.
  validate-secrets-jose-ja:
    image: cryptoutil-jose-ja:local
    command: ["/app/jose-ja", "validate-secrets"]
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    depends_on:
      builder-jose-ja:
        condition: service_completed_successfully
    networks:
      - jose-ja-network

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: cryptoutil-jose-ja:local
    command: ["/app/jose-ja", "init", "--domain=jose-ja", "--output-dir=/certs"]
    volumes:
      - ./certs:/certs:rw
    depends_on:
      builder-jose-ja:
        condition: service_completed_successfully
      validate-secrets-jose-ja:
        condition: service_completed_successfully
    networks:
      - jose-ja-network

  # jose-ja server with SQLite backend (instance 1).
  jose-ja-app-sqlite-1:
    image: cryptoutil-jose-ja:local
    command: /bin/sh -c "exec /app/jose-ja server --config=/certs/tls-config.yml --config=/app/config/jose-ja-app-framework-common.yml --config=/app/config/jose-ja-app-framework-sqlite-1.yml --config=/app/config/jose-ja-app-domain-common.yml --config=/app/config/jose-ja-app-domain-sqlite-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8200:8080" # HTTPS public
    volumes:
      - ./config/jose-ja-app-framework-common.yml:/app/config/jose-ja-app-framework-common.yml:ro
      - ./config/jose-ja-app-framework-sqlite-1.yml:/app/config/jose-ja-app-framework-sqlite-1.yml:ro
      - ./config/jose-ja-app-domain-common.yml:/app/config/jose-ja-app-domain-common.yml:ro
      - ./config/jose-ja-app-domain-sqlite-1.yml:/app/config/jose-ja-app-domain-sqlite-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-jose-ja:
        condition: service_completed_successfully
      validate-secrets-jose-ja:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/jose-ja", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start-period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jose-ja-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # jose-ja server with SQLite backend (instance 2).
  jose-ja-app-sqlite-2:
    image: cryptoutil-jose-ja:local
    command: /bin/sh -c "exec /app/jose-ja server --config=/certs/tls-config.yml --config=/app/config/jose-ja-app-framework-common.yml --config=/app/config/jose-ja-app-framework-sqlite-2.yml --config=/app/config/jose-ja-app-domain-common.yml --config=/app/config/jose-ja-app-domain-sqlite-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8201:8080" # HTTPS public
    volumes:
      - ./config/jose-ja-app-framework-common.yml:/app/config/jose-ja-app-framework-common.yml:ro
      - ./config/jose-ja-app-framework-sqlite-2.yml:/app/config/jose-ja-app-framework-sqlite-2.yml:ro
      - ./config/jose-ja-app-domain-common.yml:/app/config/jose-ja-app-domain-common.yml:ro
      - ./config/jose-ja-app-domain-sqlite-2.yml:/app/config/jose-ja-app-domain-sqlite-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-jose-ja:
        condition: service_completed_successfully
      validate-secrets-jose-ja:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/jose-ja", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start-period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jose-ja-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # jose-ja server with PostgreSQL backend (instance 1).
  jose-ja-app-postgresql-1:
    image: cryptoutil-jose-ja:local
    command: /bin/sh -c "exec /app/jose-ja server --config=/certs/tls-config.yml --config=/app/config/jose-ja-app-framework-common.yml --config=/app/config/jose-ja-app-framework-postgresql-1.yml --config=/app/config/jose-ja-app-domain-common.yml --config=/app/config/jose-ja-app-domain-postgresql-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8202:8080" # HTTPS public
    volumes:
      - ./config/jose-ja-app-framework-common.yml:/app/config/jose-ja-app-framework-common.yml:ro
      - ./config/jose-ja-app-framework-postgresql-1.yml:/app/config/jose-ja-app-framework-postgresql-1.yml:ro
      - ./config/jose-ja-app-domain-common.yml:/app/config/jose-ja-app-domain-common.yml:ro
      - ./config/jose-ja-app-domain-postgresql-1.yml:/app/config/jose-ja-app-domain-postgresql-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-jose-ja:
        condition: service_completed_successfully
      validate-secrets-jose-ja:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/jose-ja", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start-period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jose-ja-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # jose-ja server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  jose-ja-app-postgresql-2:
    image: cryptoutil-jose-ja:local
    command: /bin/sh -c "exec /app/jose-ja server --config=/certs/tls-config.yml --config=/app/config/jose-ja-app-framework-common.yml --config=/app/config/jose-ja-app-framework-postgresql-2.yml --config=/app/config/jose-ja-app-domain-common.yml --config=/app/config/jose-ja-app-domain-postgresql-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8203:8080" # HTTPS public
    volumes:
      - ./config/jose-ja-app-framework-common.yml:/app/config/jose-ja-app-framework-common.yml:ro
      - ./config/jose-ja-app-framework-postgresql-2.yml:/app/config/jose-ja-app-framework-postgresql-2.yml:ro
      - ./config/jose-ja-app-domain-common.yml:/app/config/jose-ja-app-domain-common.yml:ro
      - ./config/jose-ja-app-domain-postgresql-2.yml:/app/config/jose-ja-app-domain-postgresql-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - ./certs:/certs:ro
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-jose-ja:
        condition: service_completed_successfully
      validate-secrets-jose-ja:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      jose-ja-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/jose-ja", "health", "--url", "https://127.0.0.1:8080/service/api/v1"]
      start-period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jose-ja-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M


networks:
  jose-ja-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
