# jose-ja Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the 'jose-ja-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:8202"
  - "https://127.0.0.1:8202"
  - "https://[::1]:8202"

otlp-service: jose-ja-postgresql-1
otlp-hostname: jose-ja-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/jose-ja/postgres-tls-client-entity-leader-jose-ja-postgres-1/postgres-tls-client-entity-leader-jose-ja-postgres-1.crt
database-sslkey: /certs/jose-ja/postgres-tls-client-entity-leader-jose-ja-postgres-1/postgres-tls-client-entity-leader-jose-ja-postgres-1.key
database-sslrootcert: /certs/jose-ja/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-postgres-1/private-https-mutual-entity-jose-ja-postgres-1.crt
server-admin-tls-key-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-postgres-1/private-https-mutual-entity-jose-ja-postgres-1.key
server-admin-tls-ca-file: /certs/jose-ja/private-https-mutual-issuing-ca-jose-ja-postgres-1/truststore/private-https-mutual-issuing-ca-jose-ja-postgres-1.crt
