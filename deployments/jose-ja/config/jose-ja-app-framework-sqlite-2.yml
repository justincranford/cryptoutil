# jose-ja Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'jose-ja-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8201"
  - "https://127.0.0.1:8201"
  - "https://[::1]:8201"

otlp-service: jose-ja-sqlite-2
otlp-hostname: jose-ja-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-sqlite-2/private-https-mutual-entity-jose-ja-sqlite-2.crt
server-admin-tls-key-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-sqlite-2/private-https-mutual-entity-jose-ja-sqlite-2.key
server-admin-tls-ca-file: /certs/jose-ja/private-https-mutual-issuing-ca-jose-ja-sqlite-2/truststore/private-https-mutual-issuing-ca-jose-ja-sqlite-2.crt

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/jose-ja/otel-collector-contrib-https-client-entity-jose-ja-sqlite-2/otel-collector-contrib-https-client-entity-jose-ja-sqlite-2.crt
otlp-tls-key-file: /certs/jose-ja/otel-collector-contrib-https-client-entity-jose-ja-sqlite-2/otel-collector-contrib-https-client-entity-jose-ja-sqlite-2.key
otlp-tls-ca-file: /certs/jose-ja/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt
