# jose-ja Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the 'jose-ja-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:8203"
  - "https://127.0.0.1:8203"
  - "https://[::1]:8203"

otlp-service: jose-ja-postgresql-2
otlp-hostname: jose-ja-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/jose-ja/postgres-tls-client-entity-leader-jose-ja-postgres-2/postgres-tls-client-entity-leader-jose-ja-postgres-2.crt
database-sslkey: /certs/jose-ja/postgres-tls-client-entity-leader-jose-ja-postgres-2/postgres-tls-client-entity-leader-jose-ja-postgres-2.key
database-sslrootcert: /certs/jose-ja/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and explicitly require-and-verify client certs for the private admin API.
server-admin-tls-cert-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-postgres-2/private-https-mutual-entity-jose-ja-postgres-2.crt
server-admin-tls-key-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-postgres-2/private-https-mutual-entity-jose-ja-postgres-2.key
server-admin-tls-ca-file: /certs/jose-ja/private-https-mutual-issuing-ca-jose-ja-postgres-2/truststore/private-https-mutual-issuing-ca-jose-ja-postgres-2.crt
server-admin-tls-client-policy: require-and-verify

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/jose-ja/otel-collector-contrib-https-client-entity-jose-ja-postgres-2/otel-collector-contrib-https-client-entity-jose-ja-postgres-2.crt
otlp-tls-key-file: /certs/jose-ja/otel-collector-contrib-https-client-entity-jose-ja-postgres-2/otel-collector-contrib-https-client-entity-jose-ja-postgres-2.key
otlp-tls-ca-file: /certs/jose-ja/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve the public server cert and explicitly require-and-verify client certs.
server-public-tls-cert-file: /certs/jose-ja/public-https-server-entity-jose-ja-postgres-2/public-https-server-entity-jose-ja-postgres-2.crt
server-public-tls-key-file: /certs/jose-ja/public-https-server-entity-jose-ja-postgres-2/public-https-server-entity-jose-ja-postgres-2.key
server-public-tls-ca-file: /certs/jose-ja/public-https-client-issuing-ca-jose-ja-postgres/truststore/public-https-client-issuing-ca-jose-ja-postgres.crt
server-public-tls-client-policy: require-and-verify