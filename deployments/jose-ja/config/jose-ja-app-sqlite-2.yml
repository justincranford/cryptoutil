# jose-ja SQLite Instance 2 Configuration
# Settings UNIQUE to the 'jose-ja-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8201"
  - "https://127.0.0.1:8201"
  - "https://[::1]:8201"

otlp-service: jose-ja-sqlite-2
otlp-hostname: jose-ja-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"
