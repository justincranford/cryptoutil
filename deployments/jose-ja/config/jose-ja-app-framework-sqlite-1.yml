# jose-ja Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'jose-ja-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8200"
  - "https://127.0.0.1:8200"
  - "https://[::1]:8200"

otlp-service: jose-ja-sqlite-1
otlp-hostname: jose-ja-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-sqlite-1/private-https-mutual-entity-jose-ja-sqlite-1.crt
server-admin-tls-key-file: /certs/jose-ja/private-https-mutual-entity-jose-ja-sqlite-1/private-https-mutual-entity-jose-ja-sqlite-1.key
server-admin-tls-ca-file: /certs/jose-ja/private-https-mutual-issuing-ca-jose-ja-sqlite-1/truststore/private-https-mutual-issuing-ca-jose-ja-sqlite-1.crt
