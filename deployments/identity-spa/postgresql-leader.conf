# PostgreSQL Leader Configuration
# OLTP (Read-Write) — 30 logical databases
# Tuned for transactional workloads with logical replication enabled.

# Connection Settings
listen_addresses = '*'
max_connections = 500
port = 5432

# Extensions
shared_preload_libraries = 'pg_stat_statements'   # Query stats for OTel/Prometheus monitoring.

# Memory Settings
shared_buffers = 512MB
effective_cache_size = 1GB
maintenance_work_mem = 128MB
work_mem = 16MB

# Write-Ahead Log (WAL) — Logical Replication
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on

# Checkpointing
checkpoint_completion_target = 0.9
wal_buffers = 16MB
min_wal_size = 256MB
max_wal_size = 1GB

# Query Planner
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_timezone = 'UTC'

# Locale
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
# SSL/TLS — mTLS for app connections; SSL available for replication.
ssl = on
ssl_cert_file = '/var/lib/postgresql/ssl/server.crt'
ssl_key_file = '/var/lib/postgresql/ssl/server.key'
ssl_ca_file = '/var/lib/postgresql/ssl/client-ca.crt'
