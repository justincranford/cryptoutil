# identity-spa Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-spa-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8800"
  - "https://127.0.0.1:8800"
  - "https://[::1]:8800"

otlp-service: identity-spa-sqlite-1
otlp-hostname: identity-spa-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and explicitly require-and-verify client certs for the private admin API.
server-admin-tls-cert-file: /certs/identity-spa/private-https-mutual-entity-identity-spa-sqlite-1/private-https-mutual-entity-identity-spa-sqlite-1.crt
server-admin-tls-key-file: /certs/identity-spa/private-https-mutual-entity-identity-spa-sqlite-1/private-https-mutual-entity-identity-spa-sqlite-1.key
server-admin-tls-ca-file: /certs/identity-spa/private-https-mutual-issuing-ca-identity-spa-sqlite-1/truststore/private-https-mutual-issuing-ca-identity-spa-sqlite-1.crt
server-admin-tls-client-policy: require-and-verify

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/identity-spa/otel-collector-contrib-https-client-entity-identity-spa-sqlite-1/otel-collector-contrib-https-client-entity-identity-spa-sqlite-1.crt
otlp-tls-key-file: /certs/identity-spa/otel-collector-contrib-https-client-entity-identity-spa-sqlite-1/otel-collector-contrib-https-client-entity-identity-spa-sqlite-1.key
otlp-tls-ca-file: /certs/identity-spa/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve the public server cert and explicitly require-and-verify client certs.
server-public-tls-cert-file: /certs/identity-spa/public-https-server-entity-identity-spa-sqlite-1/public-https-server-entity-identity-spa-sqlite-1.crt
server-public-tls-key-file: /certs/identity-spa/public-https-server-entity-identity-spa-sqlite-1/public-https-server-entity-identity-spa-sqlite-1.key
server-public-tls-ca-file: /certs/identity-spa/public-https-client-issuing-ca-identity-spa-sqlite-1/truststore/public-https-client-issuing-ca-identity-spa-sqlite-1.crt
server-public-tls-client-policy: require-and-verify