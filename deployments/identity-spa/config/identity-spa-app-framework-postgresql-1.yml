# identity-spa Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the 'identity-spa-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:8802"
  - "https://127.0.0.1:8802"
  - "https://[::1]:8802"

otlp-service: identity-spa-postgresql-1
otlp-hostname: identity-spa-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/identity-spa/postgres-tls-client-entity-leader-identity-spa-postgres-1/postgres-tls-client-entity-leader-identity-spa-postgres-1.crt
database-sslkey: /certs/identity-spa/postgres-tls-client-entity-leader-identity-spa-postgres-1/postgres-tls-client-entity-leader-identity-spa-postgres-1.key
database-sslrootcert: /certs/identity-spa/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/identity-spa/private-https-mutual-entity-identity-spa-postgres-1/private-https-mutual-entity-identity-spa-postgres-1.crt
server-admin-tls-key-file: /certs/identity-spa/private-https-mutual-entity-identity-spa-postgres-1/private-https-mutual-entity-identity-spa-postgres-1.key
server-admin-tls-ca-file: /certs/identity-spa/private-https-mutual-issuing-ca-identity-spa-postgres-1/truststore/private-https-mutual-issuing-ca-identity-spa-postgres-1.crt

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/identity-spa/otel-collector-contrib-https-client-entity-identity-spa-postgres-1/otel-collector-contrib-https-client-entity-identity-spa-postgres-1.crt
otlp-tls-key-file: /certs/identity-spa/otel-collector-contrib-https-client-entity-identity-spa-postgres-1/otel-collector-contrib-https-client-entity-identity-spa-postgres-1.key
otlp-tls-ca-file: /certs/identity-spa/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve public server cert and verify client cert.
server-public-tls-cert-file: /certs/identity-spa/public-https-server-entity-identity-spa-postgres-1/public-https-server-entity-identity-spa-postgres-1.crt
server-public-tls-key-file: /certs/identity-spa/public-https-server-entity-identity-spa-postgres-1/public-https-server-entity-identity-spa-postgres-1.key
server-public-tls-ca-file: /certs/identity-spa/public-https-client-issuing-ca-identity-spa-postgres/truststore/public-https-client-issuing-ca-identity-spa-postgres.crt
