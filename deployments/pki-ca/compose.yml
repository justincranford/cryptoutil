# $schema: https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json
#
# PKI-CA Docker Compose Configuration
#
# SERVICE-level deployment for Certificate Authority.
# Supports 4 instances: 2 SQLite + 2 PostgreSQL.
#
# Port allocation (SERVICE level: 8300-8399):
#   - pki-ca-app-sqlite-1:      8300
#   - pki-ca-app-sqlite-2:      8301
#   - pki-ca-app-postgresql-1:  8302
#   - pki-ca-app-postgresql-2:  8303
#
# Dual Role: Standalone deployable AND include target for PRODUCT/SUITE compose files.
# Usage:
#   docker compose -f compose.yml up -d                        # All instances
#   docker compose -f compose.yml up pki-ca-app-sqlite-1 -d   # Single instance
#   docker compose -f compose.yml logs -f                      # View logs
#   docker compose -f compose.yml down -v                      # Stop and clean up
#
# Health Checks:
#   - Public health endpoint: https://localhost:8300/browser/api/v1/health
#   - Admin livez endpoint: https://127.0.0.1:9090/admin/api/v1/livez (internal only)
#
include:
  - path: ../shared-telemetry/compose.yml
  - path: ../shared-postgres/compose.yml

services:
  # Healthcheck for Docker secrets availability.
  healthcheck-secrets:
    image: alpine:latest
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    command:
      - sh
      - -c
      - |
        test -f /run/secrets/unseal-1of5.secret &&
        test -f /run/secrets/unseal-2of5.secret &&
        test -f /run/secrets/unseal-3of5.secret &&
        test -f /run/secrets/unseal-4of5.secret &&
        test -f /run/secrets/unseal-5of5.secret &&
        test -f /run/secrets/hash-pepper-v3.secret &&
        test -f /run/secrets/postgres-url.secret &&
        test -f /run/secrets/postgres-username.secret &&
        test -f /run/secrets/postgres-password.secret &&
        test -f /run/secrets/postgres-database.secret &&
        test -f /run/secrets/browser-username.secret &&
        test -f /run/secrets/browser-password.secret &&
        test -f /run/secrets/service-username.secret &&
        test -f /run/secrets/service-password.secret &&
        echo All secrets verified
    networks:
      - pki-ca-network

  # Build pki-ca image from source.
  builder-pki-ca:
    image: cryptoutil-pki-ca:local
    build:
      context: ../..
      dockerfile: deployments/pki-ca/Dockerfile
      args:
        APP_VERSION: "local"
        VCS_REF: "local"
        BUILD_DATE: "2026-02-17T00:00:00Z"
    entrypoint: ["sh", "-c"]
    command: ["echo 'Build completed successfully'"]
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully

  # Thorough Go binary secrets validation: verifies file presence, naming convention,
  # location (/run/secrets/), content length (>=43 chars), and format (base64url).
  # Runs after builder-pki-ca so the binary is available, before pki-init.
  validate-secrets-pki-ca:
    image: cryptoutil-pki-ca:local
    command: ["/app/pki-ca", "validate-secrets"]
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - hash-pepper-v3.secret
      - postgres-url.secret
      - postgres-username.secret
      - postgres-password.secret
      - postgres-database.secret
      - browser-username.secret
      - browser-password.secret
      - service-username.secret
      - service-password.secret
    depends_on:
      builder-pki-ca:
        condition: service_completed_successfully
    networks:
      - pki-ca-network

  # Init job: bootstraps service prerequisites before app startup.
  pki-init:
    image: cryptoutil-pki-ca:local
    command: ["/app/pki-ca", "init", "--domain=pki-ca", "--output-dir=/certs"]
    volumes:
      - pki-ca-certs:/certs:rw
    depends_on:
      builder-pki-ca:
        condition: service_completed_successfully
      validate-secrets-pki-ca:
        condition: service_completed_successfully
    networks:
      - pki-ca-network

  # pki-ca server with SQLite backend (instance 1).
  pki-ca-app-sqlite-1:
    image: cryptoutil-pki-ca:local
    command: /bin/sh -c "exec /app/pki-ca server --config=/certs/tls-config.yml --config=/app/config/pki-ca-app-framework-common.yml --config=/app/config/pki-ca-app-framework-sqlite-1.yml --config=/app/config/pki-ca-app-domain-common.yml --config=/app/config/pki-ca-app-domain-sqlite-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8300:8080" # HTTPS public
    volumes:
      - ./config/pki-ca-app-framework-common.yml:/app/config/pki-ca-app-framework-common.yml:ro
      - ./config/pki-ca-app-framework-sqlite-1.yml:/app/config/pki-ca-app-framework-sqlite-1.yml:ro
      - ./config/pki-ca-app-domain-common.yml:/app/config/pki-ca-app-domain-common.yml:ro
      - ./config/pki-ca-app-domain-sqlite-1.yml:/app/config/pki-ca-app-domain-sqlite-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - pki-ca-certs:/certs:ro
      - ./ca-crls:/app/crls
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-pki-ca:
        condition: service_completed_successfully
      validate-secrets-pki-ca:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/pki-ca", "livez", "--cacert", "/certs/root-ca.pem"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pki-ca-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # pki-ca server with SQLite backend (instance 2).
  pki-ca-app-sqlite-2:
    image: cryptoutil-pki-ca:local
    command: /bin/sh -c "exec /app/pki-ca server --config=/certs/tls-config.yml --config=/app/config/pki-ca-app-framework-common.yml --config=/app/config/pki-ca-app-framework-sqlite-2.yml --config=/app/config/pki-ca-app-domain-common.yml --config=/app/config/pki-ca-app-domain-sqlite-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u sqlite://file::memory:?cache=shared $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8301:8080" # HTTPS public
    volumes:
      - ./config/pki-ca-app-framework-common.yml:/app/config/pki-ca-app-framework-common.yml:ro
      - ./config/pki-ca-app-framework-sqlite-2.yml:/app/config/pki-ca-app-framework-sqlite-2.yml:ro
      - ./config/pki-ca-app-domain-common.yml:/app/config/pki-ca-app-domain-common.yml:ro
      - ./config/pki-ca-app-domain-sqlite-2.yml:/app/config/pki-ca-app-domain-sqlite-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - pki-ca-certs:/certs:ro
      - ./ca-crls:/app/crls
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-pki-ca:
        condition: service_completed_successfully
      validate-secrets-pki-ca:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/pki-ca", "livez", "--cacert", "/certs/root-ca.pem"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pki-ca-network
      - telemetry-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # pki-ca server with PostgreSQL backend (instance 1).
  pki-ca-app-postgresql-1:
    image: cryptoutil-pki-ca:local
    command: /bin/sh -c "exec /app/pki-ca server --config=/certs/tls-config.yml --config=/app/config/pki-ca-app-framework-common.yml --config=/app/config/pki-ca-app-framework-postgresql-1.yml --config=/app/config/pki-ca-app-domain-common.yml --config=/app/config/pki-ca-app-domain-postgresql-1.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8302:8080" # HTTPS public
    volumes:
      - ./config/pki-ca-app-framework-common.yml:/app/config/pki-ca-app-framework-common.yml:ro
      - ./config/pki-ca-app-framework-postgresql-1.yml:/app/config/pki-ca-app-framework-postgresql-1.yml:ro
      - ./config/pki-ca-app-domain-common.yml:/app/config/pki-ca-app-domain-common.yml:ro
      - ./config/pki-ca-app-domain-postgresql-1.yml:/app/config/pki-ca-app-domain-postgresql-1.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - pki-ca-certs:/certs:ro
      - ./ca-crls:/app/crls
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-pki-ca:
        condition: service_completed_successfully
      validate-secrets-pki-ca:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/pki-ca", "livez", "--cacert", "/certs/root-ca.pem"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pki-ca-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # pki-ca server with PostgreSQL backend (instance 2 - shared DB with instance 1).
  pki-ca-app-postgresql-2:
    image: cryptoutil-pki-ca:local
    command: /bin/sh -c "exec /app/pki-ca server --config=/certs/tls-config.yml --config=/app/config/pki-ca-app-framework-common.yml --config=/app/config/pki-ca-app-framework-postgresql-2.yml --config=/app/config/pki-ca-app-domain-common.yml --config=/app/config/pki-ca-app-domain-postgresql-2.yml --config=/app/otel/otel.yml --bind-public-port=8080 -u file:///run/secrets/postgres-url.secret $$SUITE_ARGS"
    working_dir: /tmp
    ports:
      - "8303:8080" # HTTPS public
    volumes:
      - ./config/pki-ca-app-framework-common.yml:/app/config/pki-ca-app-framework-common.yml:ro
      - ./config/pki-ca-app-framework-postgresql-2.yml:/app/config/pki-ca-app-framework-postgresql-2.yml:ro
      - ./config/pki-ca-app-domain-common.yml:/app/config/pki-ca-app-domain-common.yml:ro
      - ./config/pki-ca-app-domain-postgresql-2.yml:/app/config/pki-ca-app-domain-postgresql-2.yml:ro
      - ../shared-telemetry/otel/cryptoutil-otel.yml:/app/otel/otel.yml:ro
      - pki-ca-certs:/certs:ro
      - ./ca-crls:/app/crls
    secrets:
      - unseal-1of5.secret
      - unseal-2of5.secret
      - unseal-3of5.secret
      - unseal-4of5.secret
      - unseal-5of5.secret
      - postgres-url.secret
    depends_on:
      healthcheck-secrets:
        condition: service_completed_successfully
      builder-pki-ca:
        condition: service_completed_successfully
      validate-secrets-pki-ca:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
      postgres-leader:
        condition: service_healthy
      opentelemetry-collector-contrib:
        condition: service_started
      healthcheck-opentelemetry-collector-contrib:
        condition: service_completed_successfully
      pki-ca-app-postgresql-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/pki-ca", "livez", "--cacert", "/certs/root-ca.pem"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pki-ca-network
      - telemetry-network
      - postgres-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  pki-ca-certs:

networks:
  pki-ca-network:
    driver: bridge

secrets:
  unseal-1of5.secret:
    file: ./secrets/unseal-1of5.secret # pragma: allowlist secret
  unseal-2of5.secret:
    file: ./secrets/unseal-2of5.secret
  unseal-3of5.secret:
    file: ./secrets/unseal-3of5.secret
  unseal-4of5.secret:
    file: ./secrets/unseal-4of5.secret
  unseal-5of5.secret:
    file: ./secrets/unseal-5of5.secret
  hash-pepper-v3.secret:
    file: ./secrets/hash-pepper-v3.secret
  postgres-url.secret:
    file: ./secrets/postgres-url.secret
  postgres-username.secret:
    file: ./secrets/postgres-username.secret
  postgres-password.secret:
    file: ./secrets/postgres-password.secret
  postgres-database.secret:
    file: ./secrets/postgres-database.secret
  browser-username.secret:
    file: ./secrets/browser-username.secret
  browser-password.secret:
    file: ./secrets/browser-password.secret
  service-username.secret:
    file: ./secrets/service-username.secret
  service-password.secret:
    file: ./secrets/service-password.secret
