# pki-ca Framework SQLite Instance 1 Configuration
# Framework settings UNIQUE to the 'pki-ca-app-sqlite-1' compose service.

cors-origins:
  - "https://localhost:8300"
  - "https://127.0.0.1:8300"
  - "https://[::1]:8300"

otlp-service: pki-ca-sqlite-1
otlp-hostname: pki-ca-sqlite-1

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-sqlite-1/private-https-mutual-entity-pki-ca-sqlite-1.crt
server-admin-tls-key-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-sqlite-1/private-https-mutual-entity-pki-ca-sqlite-1.key
server-admin-tls-ca-file: /certs/pki-ca/private-https-mutual-issuing-ca-pki-ca-sqlite-1/truststore/private-https-mutual-issuing-ca-pki-ca-sqlite-1.crt
