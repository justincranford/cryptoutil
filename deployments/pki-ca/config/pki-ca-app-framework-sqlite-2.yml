# pki-ca Framework SQLite Instance 2 Configuration
# Framework settings UNIQUE to the 'pki-ca-app-sqlite-2' compose service.

cors-origins:
  - "https://localhost:8301"
  - "https://127.0.0.1:8301"
  - "https://[::1]:8301"

otlp-service: pki-ca-sqlite-2
otlp-hostname: pki-ca-sqlite-2

database-url: "sqlite://file::memory:?cache=shared"

# Admin mTLS (Cat 7 + Cat 6): present server cert and explicitly require-and-verify client certs for the private admin API.
server-admin-tls-cert-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-sqlite-2/private-https-mutual-entity-pki-ca-sqlite-2.crt
server-admin-tls-key-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-sqlite-2/private-https-mutual-entity-pki-ca-sqlite-2.key
server-admin-tls-ca-file: /certs/pki-ca/private-https-mutual-issuing-ca-pki-ca-sqlite-2/truststore/private-https-mutual-issuing-ca-pki-ca-sqlite-2.crt
server-admin-tls-client-policy: require-and-verify

# OTLP mTLS (Cat 9 + Cat 1): present client cert and verify OTel Collector server cert.
otlp-tls-cert-file: /certs/pki-ca/otel-collector-contrib-https-client-entity-pki-ca-sqlite-2/otel-collector-contrib-https-client-entity-pki-ca-sqlite-2.crt
otlp-tls-key-file: /certs/pki-ca/otel-collector-contrib-https-client-entity-pki-ca-sqlite-2/otel-collector-contrib-https-client-entity-pki-ca-sqlite-2.key
otlp-tls-ca-file: /certs/pki-ca/public-https-server-issuing-ca/truststore/public-https-server-issuing-ca.crt

# Public HTTPS mTLS (Cat 3 + Cat 4): serve the public server cert and explicitly require-and-verify client certs.
server-public-tls-cert-file: /certs/pki-ca/public-https-server-entity-pki-ca-sqlite-2/public-https-server-entity-pki-ca-sqlite-2.crt
server-public-tls-key-file: /certs/pki-ca/public-https-server-entity-pki-ca-sqlite-2/public-https-server-entity-pki-ca-sqlite-2.key
server-public-tls-ca-file: /certs/pki-ca/public-https-client-issuing-ca-pki-ca-sqlite-2/truststore/public-https-client-issuing-ca-pki-ca-sqlite-2.crt
server-public-tls-client-policy: require-and-verify
