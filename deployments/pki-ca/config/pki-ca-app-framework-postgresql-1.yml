# pki-ca Framework PostgreSQL Instance 1 Configuration
# Framework settings UNIQUE to the 'pki-ca-app-postgresql-1' compose service.

cors-origins:
  - "https://localhost:8302"
  - "https://127.0.0.1:8302"
  - "https://[::1]:8302"

otlp-service: pki-ca-postgresql-1
otlp-hostname: pki-ca-postgresql-1

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/pki-ca/postgres-tls-client-entity-leader-pki-ca-postgres-1/postgres-tls-client-entity-leader-pki-ca-postgres-1.crt
database-sslkey: /certs/pki-ca/postgres-tls-client-entity-leader-pki-ca-postgres-1/postgres-tls-client-entity-leader-pki-ca-postgres-1.key
database-sslrootcert: /certs/pki-ca/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-postgres-1/private-https-mutual-entity-pki-ca-postgres-1.crt
server-admin-tls-key-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-postgres-1/private-https-mutual-entity-pki-ca-postgres-1.key
server-admin-tls-ca-file: /certs/pki-ca/private-https-mutual-issuing-ca-pki-ca-postgres-1/truststore/private-https-mutual-issuing-ca-pki-ca-postgres-1.crt
