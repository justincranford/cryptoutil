# pki-ca Framework PostgreSQL Instance 2 Configuration
# Framework settings UNIQUE to the 'pki-ca-app-postgresql-2' compose service.

cors-origins:
  - "https://localhost:8303"
  - "https://127.0.0.1:8303"
  - "https://[::1]:8303"

otlp-service: pki-ca-postgresql-2
otlp-hostname: pki-ca-postgresql-2

# PostgreSQL mTLS (Cat 10 + Cat 14): require server cert verification and present client cert.
database-sslmode: verify-full
database-sslcert: /certs/pki-ca/postgres-tls-client-entity-leader-pki-ca-postgres-2/postgres-tls-client-entity-leader-pki-ca-postgres-2.crt
database-sslkey: /certs/pki-ca/postgres-tls-client-entity-leader-pki-ca-postgres-2/postgres-tls-client-entity-leader-pki-ca-postgres-2.key
database-sslrootcert: /certs/pki-ca/postgres-tls-server-issuing-ca/truststore/postgres-tls-server-issuing-ca.crt

# Admin mTLS (Cat 7 + Cat 6): present server cert and verify client cert for private admin API.
server-admin-tls-cert-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-postgres-2/private-https-mutual-entity-pki-ca-postgres-2.crt
server-admin-tls-key-file: /certs/pki-ca/private-https-mutual-entity-pki-ca-postgres-2/private-https-mutual-entity-pki-ca-postgres-2.key
server-admin-tls-ca-file: /certs/pki-ca/private-https-mutual-issuing-ca-pki-ca-postgres-2/truststore/private-https-mutual-issuing-ca-pki-ca-postgres-2.crt
