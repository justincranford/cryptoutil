# yamllint configuration for cryptoutil
# Extends the relaxed profile, overriding line-length to match other linters (200 chars).
# new-lines type: unix — repository enforces LF everywhere via .gitattributes * text=auto eol=lf.
# Run: yamllint .
extends: relaxed

ignore: |
  api/cryptosuite-registry/templates/

rules:
  line-length:
    max: 200
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: true
  new-lines:
    type: unix
