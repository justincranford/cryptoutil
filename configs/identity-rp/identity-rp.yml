# Identity Relying Party Configuration
# This file provides the default configuration for the Identity RP server.
# Override with environment-specific configs in deployments/identity-rp/config/

# Server binding
bind-public-address: "127.0.0.1"
bind-public-port: 8700
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS configuration for HTTPS
tls-enabled: true
tls-cert-file: "" # Set in deployment config
tls-key-file: "" # Set in deployment config

# CORS configuration - HTTPS origins only
cors-origins:
  - "https://localhost:8700"
  - "https://127.0.0.1:8700"

# OTLP telemetry
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "identity-rp"
otlp-hostname: "localhost"

# Logging
log-level: "INFO"

# Database (in-memory SQLite by default)
database-url: "sqlite://file::memory:?cache=shared"

# OAuth 2.1 Provider settings
authz-server-url: "https://localhost:8400"
client-id: "" # Must be configured
client-secret: "" # Must be configured via Docker secret
redirect-uri: "" # Must be configured
spa-origin: "https://localhost:8800"
session-secret: "" # Must be configured via Docker secret
