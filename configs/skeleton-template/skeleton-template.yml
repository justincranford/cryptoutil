# Skeleton Template Configuration
# Local development config for skeleton-template.
# Override with deployment configs in deployments/skeleton-template/config/

# Server binding (local development).
bind-public-address: "127.0.0.1"
bind-public-port: 8900
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS (auto-generated for local dev).
tls-enabled: true
tls-cert-file: ""
tls-key-file: ""

# CORS (local development ports).
cors-origins:
  - "https://localhost:8900"
  - "https://127.0.0.1:8900"

# Telemetry (disabled for local dev).
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "skeleton-template"
otlp-hostname: "localhost"

# Logging.
log-level: "INFO"
#     key: "generate-secure-key-here"
#     scopes: ["read", "write", "delete"]
