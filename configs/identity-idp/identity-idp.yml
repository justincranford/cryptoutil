# Identity Provider Configuration
# This file provides the default configuration for the Identity IdP server.
# Override with environment-specific configs in deployments/identity-idp/config/

# Server binding
bind-public-address: "127.0.0.1"
bind-public-port: 8500
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS configuration for HTTPS
tls-enabled: true
tls-cert-file: "" # Set in deployment config
tls-key-file: "" # Set in deployment config

# CORS configuration - HTTPS origins only
cors-origins:
  - "https://localhost:8500"
  - "https://127.0.0.1:8500"

# OTLP telemetry
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "identity-idp"
otlp-hostname: "localhost"

# Logging
log-level: "INFO"

# Database (in-memory SQLite by default)
database-url: "sqlite://file::memory:?cache=shared"

# Identity Provider settings
issuer: "https://localhost:8500"
token-lifetime: 3600
refresh-token-lifetime: 86400
authorization-code-ttl: 600
enable-discovery: true
enable-dynamic-registration: false
