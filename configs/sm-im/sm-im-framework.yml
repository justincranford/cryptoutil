# Secrets Manager Instant Messenger Framework Configuration
# Local development framework config for sm-im.
# Override with deployment configs in deployments/sm-im/config/

# Server binding (local development).
bind-public-address: "127.0.0.1"
bind-public-port: 8100
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS (auto-generated for local dev).
tls-enabled: true
tls-cert-file: ""
tls-key-file: ""

# CORS (local development ports).
cors-origins:
  - "https://localhost:8100"
  - "https://127.0.0.1:8100"

# Telemetry (disabled for local dev).
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "sm-im"
otlp-hostname: "localhost"

# Logging.
log-level: "INFO"

# Database (in-memory SQLite by default).
database-url: "sqlite://file::memory:?cache=shared"

# Session Configuration
# Browser session algorithm (OPAQUE, JWS, JWE)
browser-session-algorithm: "JWS"
browser-session-jws-algorithm: "HS256"
browser-session-jwe-algorithm: "dir+A256GCM"

# Service session algorithm (OPAQUE, JWS, JWE)
service-session-algorithm: "JWS"
service-session-jws-algorithm: "HS256"
service-session-jwe-algorithm: "dir+A256GCM"
