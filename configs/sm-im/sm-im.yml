# Secrets Manager Instant Messenger Configuration
# This file provides the default configuration for the SM-IM server.
# Override with environment-specific configs in deployments/sm-im/config/

# Server binding
bind-public-address: "127.0.0.1"
bind-public-port: 8100
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS configuration for HTTPS
tls-enabled: true
tls-cert-file: "" # Set in deployment config
tls-key-file: "" # Set in deployment config

# CORS configuration - HTTPS origins only
cors-origins:
  - "https://localhost:8100"
  - "https://127.0.0.1:8100"

# OTLP telemetry
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "sm-im"
otlp-hostname: "localhost"

# Logging
log-level: "INFO"

# Database (in-memory SQLite by default)
database-url: "sqlite://file::memory:?cache=shared"

# Session Configuration
# Browser session algorithm (OPAQUE, JWS, JWE)
browser-session-algorithm: "JWS"
browser-session-jws-algorithm: "HS256" # HS256 for faster testing (symmetric key)
browser-session-jwe-algorithm: "dir+A256GCM"

# Service session algorithm (OPAQUE, JWS, JWE)
service-session-algorithm: "JWS"
service-session-jws-algorithm: "HS256" # HS256 for faster testing (symmetric key)
service-session-jwe-algorithm: "dir+A256GCM"
