# Secrets Manager Key Management Configuration
# Local development config for sm-kms.
# Override with deployment configs in deployments/sm-kms/config/

# Server binding (local development).
bind-public-address: "127.0.0.1"
bind-public-port: 8000
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS (auto-generated for local dev).
tls-enabled: true
tls-cert-file: ""
tls-key-file: ""

# CORS (local development ports).
cors-origins:
  - "https://localhost:8000"
  - "https://127.0.0.1:8000"

# Telemetry (disabled for local dev).
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "sm-kms"
otlp-hostname: "localhost"

# Logging.
log-level: "INFO"

# Database (in-memory SQLite by default).
database-url: "sqlite://file::memory:?cache=shared"
