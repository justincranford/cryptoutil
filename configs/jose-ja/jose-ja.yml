# JOSE JWK Authority Configuration
# Local development config for jose-ja.
# Override with deployment configs in deployments/jose-ja/config/

# Server binding (local development).
bind-public-address: "127.0.0.1"
bind-public-port: 8200
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS (auto-generated for local dev).
tls-enabled: true
tls-cert-file: ""
tls-key-file: ""

# CORS (local development ports).
cors-origins:
  - "https://localhost:8200"
  - "https://127.0.0.1:8200"

# Telemetry (disabled for local dev).
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "jose-ja"
otlp-hostname: "localhost"

# Logging.
log-level: "INFO"
#     key: "generate-secure-key-here"
#     scopes: ["read", "write", "delete"]
