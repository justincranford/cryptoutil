# Identity Single Page App Configuration
# Local development config for identity-spa.
# Override with deployment configs in deployments/identity-spa/config/

# Server binding (local development).
bind-public-address: "127.0.0.1"
bind-public-port: 8800
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS (auto-generated for local dev).
tls-enabled: true
tls-cert-file: ""
tls-key-file: ""

# CORS (local development ports).
cors-origins:
  - "https://localhost:8800"
  - "https://127.0.0.1:8800"

# Telemetry (disabled for local dev).
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "identity-spa"
otlp-hostname: "localhost"

# Logging.
log-level: "INFO"

# Database (in-memory SQLite by default).
database-url: "sqlite://file::memory:?cache=shared"

# SPA-specific settings
static-files-path: "./static"
index-file: "index.html"
rp-origin: "" # Optional: Relying Party (BFF) origin for API proxying
