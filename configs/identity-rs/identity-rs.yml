# Identity Resource Server Configuration
# This file provides the default configuration for the Identity RS server.
# Override with environment-specific configs in deployments/identity-rs/config/

# Server binding
bind-public-address: "127.0.0.1"
bind-public-port: 8600
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS configuration for HTTPS
tls-enabled: true
tls-cert-file: "" # Set in deployment config
tls-key-file: "" # Set in deployment config

# CORS configuration - HTTPS origins only
cors-origins:
  - "https://localhost:8600"
  - "https://127.0.0.1:8600"

# OTLP telemetry
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "identity-rs"
otlp-hostname: "localhost"

# Logging
log-level: "INFO"

# Database (in-memory SQLite by default)
database-url: "sqlite://file::memory:?cache=shared"

# Resource Server settings
issuer: "https://localhost:8600"
token-lifetime: 3600
refresh-token-lifetime: 86400
authorization-code-ttl: 600
