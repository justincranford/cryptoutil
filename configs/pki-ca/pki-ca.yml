# PKI Certificate Authority Configuration
# Local development config for pki-ca.
# Override with deployment configs in deployments/pki-ca/config/

# Server binding (local development).
bind-public-address: "127.0.0.1"
bind-public-port: 8300
bind-admin-address: "127.0.0.1"
bind-admin-port: 9090

# TLS (auto-generated for local dev).
tls-enabled: true
tls-cert-file: ""
tls-key-file: ""

# CORS (local development ports).
cors-origins:
  - "https://localhost:8300"
  - "https://127.0.0.1:8300"

# Telemetry (disabled for local dev).
otlp-enabled: false
otlp-endpoint: ""
otlp-service: "pki-ca"
otlp-hostname: "localhost"

# Logging.
log-level: "INFO"

# Development mode - creates self-signed CA on startup.
dev: false

# CA configuration.
ca:
  name: "cryptoutil-ca"
  description: "Cryptoutil Certificate Authority"
  type: "root"
  subject:
    common_name: "Cryptoutil Root CA"
    organization: "Cryptoutil"
    organizational_unit: "Security"
    country: "US"
  key:
    algorithm: "ECDSA"
    curve_or_size: "P-384"
  validity:
    days: 3650 # 10 years for root CA

# Certificate storage
storage:
  type: "memory"
  # For SQLite: dsn: "file:ca.db?cache=shared&mode=rwc"

# Revocation services
revocation:
  crl:
    enabled: true
    validity_hours: 24
    next_update_hours: 12
  ocsp:
    enabled: true
    validity_minutes: 10

# TSA (Time Stamp Authority) - disabled by default
tsa:
  enabled: false
  policy_oid: "1.2.3.4.5.6.7.8.9"
  accepted_algorithms:
    - "SHA-256"
    - "SHA-384"
    - "SHA-512"

# EST (Enrollment over Secure Transport) - disabled by default
est:
  enabled: false
  mtls_required: true

# Certificate profiles
profiles:
  - id: "tls-server"
    name: "TLS Server Certificate"
    category: "tls"
    path: "configs/pki-ca/profiles/tls-server.yml"
  - id: "tls-client"
    name: "TLS Client Certificate"
    category: "tls"
    path: "configs/pki-ca/profiles/tls-client.yml"
