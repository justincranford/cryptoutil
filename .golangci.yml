# golangci-lint configuration
# ALWAYS use latest v2 syntax from https://golangci-lint.run/usage/configuration/
# $schema: https://json.schemastore.org/golangci-lint.json
version: "2"

run:
  timeout: 10m
  issues-exit-code: 1
  tests: true
  concurrency: 0

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - godot
    - copyloopvar
    - goconst
    - importas
    - gosec
    - noctx
    - wrapcheck
    - errorlint
    # testpackage: Removed. skip-regexp matched all test files, making it a no-op.
    # Migration to external test packages is too large-scope; honest to remove.
    - gomodguard
    - gomoddirectives
    - bodyclose
    - mnd
    - wsl_v5
    - nlreturn
    # - goheader  # Disabled: file corruption bug in golangci-lint v2; monitor v2.8+ for fix.
    - depguard
    - exhaustive
    - nilnil
    - nilerr
    - makezero
    - prealloc
    - godox
    - forcetypeassert
    - nosprintfhostport
  disable:
    - dupl
    - gocyclo

  exclusions:
    paths:
      - api/client
      - api/model
      - api/server
      - api/idp
      - api/authz
      - test-output
      - workflow-reports
      - vendor
    rules:
      # Exclude nilnil from pool.go (intentional "nothing to report" pattern).
      - path: "internal/shared/pool/pool\\.go$"
        linters: [nilnil]
      # Exclude nilnil from datetime.go (intentional "not found" pattern).
      - path: "internal/shared/util/datetime/datetime\\.go$"
        linters: [nilnil]
      # Exclude nilnil from test files (mock implementations).
      - path: "_test\\.go$"
        linters: [nilnil]
      # Exclude wrapcheck from test files (test error helpers don't require wrapping).
      - path: "_test\\.go$"
        linters: [wrapcheck]
      # Exclude nilnil from step_up_auth.go (intentional pattern).
      - path: "internal/apps/identity-idp/userauth/step_up_auth\\.go$"
        linters: [nilnil]
      # Exclude nilnil from oam_orm_mapper.go (intentional pattern).
      - path: "internal/apps/sm-kms/server/businesslogic/oam_orm_mapper\\.go$"
        linters: [nilnil]
      # Exclude nilnil from nullable_uuid.go (sql.Scanner pattern).
      - path: "internal/apps/identity/domain/nullable_uuid\\.go$"
        linters: [nilnil]
      # Exclude nilnil from secret_rotation_service.go (intentional pattern).
      - path: "internal/apps/identity/rotation/secret_rotation_service\\.go$"
        linters: [nilnil]
      # Exclude nilnil from realm_service.go (intentional "no realms found" pattern).
      - path: "internal/apps/framework/service/server/service/realm_service\\.go$"
        linters: [nilnil]
      # Exclude nilerr from jwk_util.go (intentional type-check pattern).
      - path: "internal/shared/crypto/jose/jwk_util\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_naming.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_naming\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_kebab_case.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_kebab_case\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_template_pattern.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_template_pattern\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_ports.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_ports\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_telemetry.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_telemetry\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_admin.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_admin\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_secrets.go (error captured in result.Errors; callers check result.Valid).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_secrets\\.go$"
        linters: [nilerr]
      # Exclude nilerr from validate_all.go (WalkDir callback returns nil on error to continue walking).
      - path: "internal/apps/tools/cicd_lint/lint_deployments/validate_all\\.go$"
        linters: [nilerr]

      # Exclude wrapcheck from template session manager barrier wrappers (internal package delegation).
      - path: "internal/apps/framework/service/server/businesslogic/session_manager\\.go$"
        linters: [wrapcheck]
      # Exclude wrapcheck from template registration handlers (Fiber HTTP response helpers).
      - path: "internal/apps/framework/service/server/apis/registration_handlers\\.go$"
        linters: [wrapcheck]

      # Exclude revive package-comments from doc.go (false positive with block comments).
      - path: "internal/shared/crypto/digests/doc\\.go$"
        linters: [revive]
        text: "package-comments"
      # Exclude revive package-comments from hash/doc.go (false positive with block comments).
      - path: "internal/shared/crypto/hash/doc\\.go$"
        linters: [revive]
        text: "package-comments"
      # Exclude gosec G402 from TLS validation test (intentional InsecureSkipVerify test fixture).
      - path: "internal/shared/crypto/tls/tls_validate_test\\.go$"
        linters: [gosec]

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    gosec:
      confidence: medium
      excludes:
        - G204 # G204: Subprocess launched with variable - required for CLI tooling.
        - G301 # G301: Directory created with permissive mode - intentional for cert/config dirs.
        - G302 # G302: File created with permissive mode - intentional for cert files.
        - G304 # G304: File path provided as taint input - required for config/cert file reading.
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 1
      min-occurrences: 2
      numbers: true
    mnd:
      ignored-numbers: ['2']
      ignored-functions: ['math.*', 'len', 'make']
    dupl:
      threshold: 100
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
    godot:
      scope: declarations
      capital: false
    godox:
      keywords: [TODO, FIXME, BUG, HACK]
    exhaustive:
      default-signifies-exhaustive: true
    thelper:
      test:
        begin: true
    goheader:
      template: |-
        Copyright (c) {{ YEAR }} Justin Cranford
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/pkg/errors
              desc: "Use Go 1.13+ error wrapping instead"
        cgo-sqlite:
          deny:
            - pkg: github.com/mattn/go-sqlite3
              desc: "CGO-required SQLite driver; use modernc.org/sqlite (CGO-free)"
            - pkg: github.com/golang-migrate/migrate/v4/database/sqlite3
              desc: "CGO-required SQLite migrate driver; use modernc.org/sqlite (CGO-free)"
        fips-crypto:
          deny:
            - pkg: golang.org/x/crypto/argon2
              desc: "Not FIPS 140-3 approved; use PBKDF2 or HKDF"
            - pkg: golang.org/x/crypto/scrypt
              desc: "Not FIPS 140-3 approved; use PBKDF2 or HKDF"
            - pkg: golang.org/x/crypto/bcrypt
              desc: "Not FIPS 140-3 approved; use PBKDF2 or HKDF"
            - pkg: crypto/des
              desc: "DES/3DES not FIPS 140-3 approved; use AES"
            - pkg: crypto/md5
              desc: "MD5 not FIPS 140-3 approved; use SHA-256 or SHA-512"
            - pkg: crypto/rc4
              desc: "RC4 not FIPS 140-3 approved; use AES"
        fips-rand:
          deny:
            - pkg: math/rand
              desc: "Not cryptographically secure; use crypto/rand"

    importas:
      no-unaliased: true
      alias:
        # JOSE libraries
        - {pkg: "github.com/lestrrat-go/jwx/v3/jwe", alias: joseJwe}
        - {pkg: "github.com/lestrrat-go/jwx/v3/jwk", alias: joseJwk}
        - {pkg: "github.com/lestrrat-go/jwx/v3/jws", alias: joseJws}
        - {pkg: "github.com/lestrrat-go/jwx/v3/jwa", alias: joseJwa}
        # Third-party
        - {pkg: "github.com/google/uuid", alias: googleUuid}
        - {pkg: "encoding/json", alias: json}
        - {pkg: "encoding/xml", alias: xml}
        - {pkg: "net/http", alias: http}
        - {pkg: "github.com/gofiber/fiber/v2", alias: fiber}
        - {pkg: "github.com/stretchr/testify", alias: testify}
        # Cryptoutil API
        - {pkg: "cryptoutil/api/client", alias: cryptoutilOpenapiClient}
        - {pkg: "cryptoutil/api/pki-ca/client", alias: cryptoutilApiCaClient}
        - {pkg: "cryptoutil/api/pki-ca/models", alias: cryptoutilApiCaModels}
        - {pkg: "cryptoutil/api/pki-ca/server", alias: cryptoutilApiCaServer}
        - {pkg: "cryptoutil/api/identity-authz", alias: cryptoutilApiIdentityAuthz}
        - {pkg: "cryptoutil/api/identity-idp", alias: cryptoutilApiIdentityIdp}
        - {pkg: "cryptoutil/api/identity-rs", alias: cryptoutilApiIdentityRs}
        - {pkg: "cryptoutil/api/jose-ja/client", alias: cryptoutilApiJoseClient}
        # Cryptoutil cmd
        - pkg: "cryptoutil/internal/cmd"
          alias: cryptoutilCmd
        - pkg: "cryptoutil/internal/cmd/cicd_lint"
          alias: cryptoutilCmdCicd
        - pkg: "cryptoutil/internal/cmd/cryptoutil"
          alias: cryptoutilCmdCryptoutil
        # Cryptoutil shared
        - pkg: "cryptoutil/internal/shared/apperr"
          alias: cryptoutilSharedApperr
        - pkg: "cryptoutil/internal/shared/testutil"
          alias: cryptoutilSharedTestutil
        - pkg: "cryptoutil/internal/shared/util"
          alias: cryptoutilSharedUtil
        - pkg: "cryptoutil/internal/shared/util/cache"
          alias: cryptoutilSharedUtilCache
        - pkg: "cryptoutil/internal/shared/util/files"
          alias: cryptoutilSharedUtilFiles
        - pkg: "cryptoutil/internal/shared/util/network"
          alias: cryptoutilSharedUtilNetwork
        - pkg: "cryptoutil/internal/shared/util/random"
          alias: cryptoutilSharedUtilRandom
        - pkg: "cryptoutil/internal/shared/container"
          alias: cryptoutilSharedContainer
        - pkg: "cryptoutil/internal/shared/crypto/asn1"
          alias: cryptoutilSharedCryptoAsn1
        - pkg: "cryptoutil/internal/shared/crypto/certificate"
          alias: cryptoutilSharedCryptoCertificate
        - pkg: "cryptoutil/internal/shared/crypto/digests"
          alias: cryptoutilSharedCryptoDigests
        - pkg: "cryptoutil/internal/shared/crypto/hash"
          alias: cryptoutilSharedCryptoHash
        - pkg: "cryptoutil/internal/shared/crypto/jose"
          alias: cryptoutilSharedCryptoJose
        - pkg: "cryptoutil/internal/shared/crypto/keygen"
          alias: cryptoutilSharedCryptoKeygen
        - pkg: "cryptoutil/internal/shared/crypto/password"
          alias: cryptoutilSharedCryptoPassword
        - pkg: "cryptoutil/internal/shared/crypto/pbkdf2"
          alias: cryptoutilSharedCryptoPbkdf2
        - pkg: "cryptoutil/internal/shared/crypto/tls"
          alias: cryptoutilSharedCryptoTls
        - pkg: "cryptoutil/internal/shared/magic"
          alias: cryptoutilSharedMagic
        - pkg: "cryptoutil/internal/shared/pool"
          alias: cryptoutilSharedPool
        - pkg: "cryptoutil/internal/shared/pwdgen"
          alias: cryptoutilSharedPwdgen
        - pkg: "cryptoutil/internal/shared/telemetry"
          alias: cryptoutilSharedTelemetry
        - pkg: "cryptoutil/internal/shared/util/combinations"
          alias: cryptoutilSharedUtilCombinations
        - pkg: "cryptoutil/internal/shared/util/datetime"
          alias: cryptoutilSharedUtilDatetime
        - pkg: "cryptoutil/internal/shared/util/sysinfo"
          alias: cryptoutilSharedUtilSysinfo
        # Cryptoutil apps
        - pkg: "cryptoutil/internal/apps/sm"
          alias: cryptoutilAppsSm
        - pkg: "cryptoutil/internal/apps/sm/im"
          alias: cryptoutilAppsSmIm
        - pkg: "cryptoutil/internal/apps/framework/service/server"
          alias: cryptoutilAppsFrameworkServiceServer
        - pkg: "cryptoutil/internal/apps/framework/service/server/repository"
          alias: cryptoutilAppsFrameworkServiceServerRepository
        - pkg: "cryptoutil/internal/apps/framework/service/client"
          alias: cryptoutilAppsFrameworkServiceClient
        - pkg: "cryptoutil/internal/apps/framework/service/config"
          alias: cryptoutilAppsFrameworkServiceConfig
        - pkg: "cryptoutil/internal/apps/framework/service/config/tls_generator"
          alias: cryptoutilAppsFrameworkServiceConfigTlsGenerator
        - pkg: "cryptoutil/internal/apps/framework/tls"
          alias: cryptoutilAppsFrameworkTls
        - pkg: "cryptoutil/internal/apps/framework/product/cli"
          alias: cryptoutilAppsFrameworkProductCli
        - pkg: "cryptoutil/internal/apps/framework/suite/cli"
          alias: cryptoutilAppsFrameworkSuiteCli
        - pkg: "cryptoutil/internal/apps/tools/cicd_workflow"
          alias: cryptoutilAppsToolsCicdWorkflow
        - pkg: "cryptoutil/internal/apps/framework/service/server/apis"
          alias: cryptoutilAppsFrameworkServiceServerApis
        - pkg: "cryptoutil/internal/apps/framework/service/server/application"
          alias: cryptoutilAppsFrameworkServiceServerApplication
        - pkg: "cryptoutil/internal/apps/framework/service/server/barrier"
          alias: cryptoutilAppsFrameworkServiceServerBarrier
        - pkg: "cryptoutil/internal/apps/framework/service/server/builder"
          alias: cryptoutilAppsFrameworkServiceServerBuilder
        - pkg: "cryptoutil/internal/apps/framework/service/server/businesslogic"
          alias: cryptoutilAppsFrameworkServiceServerBusinesslogic
        - pkg: "cryptoutil/internal/apps/framework/service/server/domain"
          alias: cryptoutilAppsFrameworkServiceServerDomain
        - pkg: "cryptoutil/internal/apps/framework/service/server/listener"
          alias: cryptoutilAppsFrameworkServiceServerListener
        - pkg: "cryptoutil/internal/apps/framework/service/server/middleware"
          alias: cryptoutilAppsFrameworkServiceServerMiddleware
        - pkg: "cryptoutil/internal/apps/framework/service/server/realms"
          alias: cryptoutilAppsFrameworkServiceServerRealms
        - pkg: "cryptoutil/internal/apps/framework/service/server/service"
          alias: cryptoutilAppsFrameworkServiceServerService
        - pkg: "cryptoutil/internal/apps/framework/service/server/testutil"
          alias: cryptoutilAppsFrameworkServiceServerTestutil
        - pkg: "cryptoutil/internal/apps/framework/service/testing/httpservertests"
          alias: cryptoutilAppsFrameworkServiceTestingHttpservertests
        - pkg: "cryptoutil/internal/apps/framework/service/testutil"
          alias: cryptoutilAppsFrameworkServiceTestutil
        # Crypto packages
        - {pkg: "crypto/aes", alias: aes}
        - {pkg: "crypto/ecdsa", alias: ecdsa}
        - {pkg: "crypto/hmac", alias: hmac}
        - {pkg: "crypto/rsa", alias: rsa}
        - {pkg: "crypto/sha256", alias: sha256}
        - {pkg: "crypto/sha512", alias: sha512}
        - {pkg: "crypto/rand", alias: crand,}

formatters:
  enable:
    - gofumpt # Stricter gofmt rules (superset of gofmt); enforced via gofumpt -w
    - goimports # Automatic import organization and grouping

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
